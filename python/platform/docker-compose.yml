services:
  app:
    build:
      context: ..
      dockerfile: platform/Dockerfile
    container_name: python-platform-app
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - PORT=8080
      - REDIS_URL=redis://redis:6379/0
      - MAX_TIMEOUT=30
      - MAX_MEMORY=256m
      - CONTAINER_CPU=0.5
      - MAX_CONCURRENT=4
    volumes:
      - pip-cache:/root/.cache/pip
      - ..:/app:ro
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - platform-net

  worker:
    build:
      context: ..
      dockerfile: platform/Dockerfile
    container_name: python-platform-worker
    command: ["python", "-m", "platform.queue.worker"]
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MAX_TIMEOUT=30
      - MAX_MEMORY=256m
      - CONTAINER_CPU=0.5
      - MAX_CONCURRENT=4
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - pip-cache:/root/.cache/pip
      - ..:/app:ro
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - platform-net
    privileged: false
    group_add:
      - "${DOCKER_GID:-999}"

  redis:
    image: redis:7-alpine
    container_name: python-platform-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - platform-net

volumes:
  pip-cache:
    driver: local
  redis-data:
    driver: local

networks:
  platform-net:
    driver: bridge
