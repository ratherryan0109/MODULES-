<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Python Introduction - Playground</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #1e293b; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; }
    .header { background: #0f172a; padding: 12px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #334155; }
    .header h1 { font-size: 1.1em; color: #FFD43B; flex: 1; }
    .status { display: flex; align-items: center; gap: 6px; font-size: 0.8em; }
    .status .dot { width: 8px; height: 8px; border-radius: 50%; }
    .status .dot.ready { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
    .status .dot.loading { background: #fbbf24; animation: pulse 1s infinite; }
    .status .dot.error { background: #f87171; box-shadow: 0 0 6px #f87171; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .status .label { color: #94a3b8; }
    .header button { background: #306998; color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 0.85em; font-weight: 600; }
    .header button:hover { background: #1e415e; }
    .header button:disabled { opacity: 0.4; cursor: not-allowed; }
    .snippets { background: #0f172a; padding: 8px 20px; display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid #334155; }
    .snippets button { background: #334155; color: #cbd5e1; border: 1px solid #475569; padding: 4px 14px; border-radius: 16px; cursor: pointer; font-size: 0.8em; }
    .snippets button.active { background: #306998; color: white; border-color: #306998; }
    .snippets button:hover { background: #475569; }
    .main { display: flex; flex: 1; overflow: hidden; }
    .editor-pane { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #334155; }
    .editor-pane textarea { flex: 1; background: #0f172a; color: #e2e8f0; border: none; padding: 16px; font-family: "JetBrains Mono", "Fira Code", monospace; font-size: 13px; line-height: 1.6; resize: none; outline: none; tab-size: 4; white-space: pre; overflow-wrap: normal; overflow-x: auto; }
    .output-pane { flex: 1; display: flex; flex-direction: column; }
    .output-pane .label { background: #0f172a; padding: 8px 16px; font-size: 0.8em; color: #94a3b8; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; }
    .output-pane .label .time { color: #64748b; }
    .output-pane .content { flex: 1; padding: 16px; font-family: "JetBrains Mono", "Fira Code", monospace; font-size: 13px; line-height: 1.6; overflow-y: auto; white-space: pre-wrap; }
    .output-pane .content .error { color: #f87171; }
    .output-pane .content .success { color: #4ade80; }
    @media (max-width: 768px) { .main { flex-direction: column; } .editor-pane { border-right: none; border-bottom: 1px solid #334155; height: 50%; } }
  </style>
</head>
<body>
  <div class="header">
    <h1>Python Playground</h1>
    <div class="status">
      <span class="dot loading" id="statusDot"></span>
      <span class="label" id="statusLabel">Starting Python...</span>
    </div>
    <button id="runBtn" onclick="runCode()" disabled>Run</button>
    <button onclick="resetCode()">Reset</button>
  </div>
  <div class="snippets" id="snippetTabs">
    <button class="active" onclick="loadSnippet(0)">Hello World</button>
    <button onclick="loadSnippet(1)">Print Numbers</button>
    <button onclick="loadSnippet(2)">Custom Separator</button>
    <button onclick="loadSnippet(3)">Inline Print</button>
    <button onclick="loadSnippet(4)">ASCII Art</button>
  </div>
  <div class="main">
    <div class="editor-pane">
      <textarea id="codeEditor" spellcheck="false"></textarea>
    </div>
    <div class="output-pane">
      <div class="label">
        <span>Output</span>
        <span class="time" id="execTime"></span>
      </div>
      <div class="content" id="output"></div>
    </div>
  </div>
  <script src="../../wasm/python-loader.js"></script>
  <script>
    const WORKER_PATH = '../../wasm/dist/python.worker.js';

    const snippets = [
      "# Hello, World!\n# Your first Python program\n\nprint(\"Hello, World!\")\n\n# Try changing the text inside the quotes",
      "# Printing different types of data\n\nprint(42)            # Integer\nprint(3.14159)       # Float\nprint(2 + 2)         # Expression\nprint(\"The answer is\", 42)  # Mixed",
      "# Using the sep parameter\n\nprint(\"apple\", \"banana\", \"cherry\")              # Default: space\nprint(\"apple\", \"banana\", \"cherry\", sep=\", \")    # Comma + space\nprint(\"apple\", \"banana\", \"cherry\", sep=\" | \")  # Pipe\nprint(\"apple\", \"banana\", \"cherry\", sep=\"\")      # None",
      "# Using the end parameter\n\nprint(\"Hello \", end=\"\")\nprint(\"World\")\n\nprint(\"Counting: \", end=\"\")\nprint(1, 2, 3, 4, 5)",
      "# ASCII Art with print()\n\n# A simple cat face\nprint(\"  /\\\\\\\\_/\\\\\\\\\")\nprint(\" ( o o )\")\nprint(\" (  =  )\")\n\n# A diamond pattern\nprint(\"  *\")\nprint(\" ***\")\nprint(\"*****\")\nprint(\" ***\")\nprint(\"  *\")"
    ];

    const editor = document.getElementById("codeEditor");
    const output = document.getElementById("output");
    const runBtn = document.getElementById("runBtn");
    const statusDot = document.getElementById("statusDot");
    const statusLabel = document.getElementById("statusLabel");
    const execTime = document.getElementById("execTime");

    function setStatus(state, text) {
      statusDot.className = 'dot ' + state;
      statusLabel.textContent = text;
    }

    async function initPython() {
      setStatus('loading', 'Starting Python...');
      try {
        await WasmPython.init(WORKER_PATH);
        setStatus('ready', 'Python ready');
        runBtn.disabled = false;
      } catch (err) {
        setStatus('error', 'Failed: ' + err.message);
        output.innerHTML = '<span class="error">Error loading Python WASM: ' + err.message +
          '</span>\n\n<span class="success">Make sure files are served via HTTP (not file://).\n' +
          'Run: <b>python -m http.server</b> in the project directory.</span>';
      }
    }

    async function runCode() {
      const code = editor.value;
      if (!code.trim()) return;
      output.innerHTML = '<span style="color:#94a3b8">Running...</span>';
      execTime.textContent = '';
      runBtn.disabled = true;
      runBtn.textContent = 'Running...';
      try {
        const result = await WasmPython.run(code, 10000);
        if (result.error && result.returnCode !== 0) {
          output.innerHTML = '<span class="error">' + result.error.replace(/</g, '&lt;') + '</span>';
          if (result.output) {
            output.innerHTML += '<br><br><span class="success">' + result.output.replace(/</g, '&lt;') + '</span>';
          }
        } else {
          output.textContent = result.output || '(no output)';
        }
        execTime.textContent = result.time + 's';
      } catch (e) {
        output.innerHTML = '<span class="error">Execution error: ' + e.message.replace(/</g, '&lt;') + '</span>';
      }
      runBtn.disabled = false;
      runBtn.textContent = 'Run';
    }

    function loadSnippet(index) {
      if (snippets[index]) {
        editor.value = snippets[index];
        document.querySelectorAll(".snippets button").forEach(function(b, i) {
          b.classList.toggle("active", i === index);
        });
        output.innerHTML = '';
        execTime.textContent = '';
      }
    }

    function resetCode() {
      loadSnippet(0);
    }

    editor.addEventListener("keydown", function(e) {
      if (e.key === "Tab") {
        e.preventDefault();
        var start = editor.selectionStart;
        var end = editor.selectionEnd;
        editor.value = editor.value.substring(0, start) + "    " + editor.value.substring(end);
        editor.selectionStart = editor.selectionEnd = start + 4;
      }
      if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) { runCode(); }
    });

    initPython();
    loadSnippet(0);
  </script>
</body>
</html>
