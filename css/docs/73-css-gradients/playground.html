<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Gradients Playground</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Courier New', monospace; background: #0f172a; color: #e2e8f0; padding: 1rem; }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { color: #38bdf8; margin-bottom: 1rem; }
    .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 800px) { .layout { grid-template-columns: 1fr; } }
    .panel { background: #1e293b; border: 1px solid #334155; border-radius: 8px; overflow: hidden; }
    .panel h2 { background: #334155; padding: 0.5rem 1rem; font-size: 0.8rem; color: #94a3b8; margin: 0; }
    textarea { width: 100%; min-height: 300px; background: #1e293b; color: #e2e8f0; border: none; padding: 1rem; font-family: 'Courier New', monospace; font-size: 0.85rem; resize: vertical; }
    textarea:focus { outline: none; }
    .preview-area { min-height: 300px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; position: relative; overflow: hidden; }
    .gradient-preview { width: 100%; height: 300px; border-radius: 8px; }
    .controls { display: flex; gap: 0.5rem; padding: 0.5rem 1rem; background: #1e293b; border-top: 1px solid #334155; flex-wrap: wrap; align-items: center; }
    .controls button, .controls label { background: #334155; color: #e2e8f0; border: 1px solid #475569; padding: 0.3rem 0.6rem; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
    .presets { display: flex; gap: 0.25rem; flex-wrap: wrap; }
    .presets button { font-size: 0.65rem; background: #1e293b; }
    .presets button.active { background: #3b82f6; }
  </style>
</head>
<body>
  <div class="container">
    <h1> CSS Gradients Playground</h1>
    <div class="layout">
      <div class="panel">
        <h2>CSS Gradient Code</h2>
        <textarea id="cssInput">background: linear-gradient(135deg, #667eea, #764ba2);</textarea>
      </div>
      <div>
        <div class="panel">
          <h2>Preview</h2>
          <div class="preview-area">
            <div class="gradient-preview" id="gradientPreview"></div>
            <code id="gradientCode" style="font-size:0.8rem;color:#94a3b8;background:#1e293b;padding:0.5rem;border-radius:4px;width:100%;text-align:center;">background: linear-gradient(135deg, #667eea, #764ba2);</code>
          </div>
        </div>
        <div class="controls">
          <div class="presets">
            <button onclick="loadPreset('linear-gradient(135deg, #667eea, #764ba2)')">Sunset</button>
            <button onclick="loadPreset('linear-gradient(90deg, #4facfe, #00f2fe)')">Ocean</button>
            <button onclick="loadPreset('radial-gradient(circle, #f093fb, #f5576c)')">Radial</button>
            <button onclick="loadPreset('conic-gradient(red, yellow, lime, aqua, blue, magenta, red)')">Conic</button>
            <button onclick="loadPreset('repeating-linear-gradient(45deg, #3b82f6, #3b82f6 10px, #1e40af 10px, #1e40af 20px)')">Stripes</button>
          </div>
          <button onclick="render()">Apply</button>
        </div>
      </div>
    </div>
  </div>
  <script>
    const cssInput = document.getElementById('cssInput');
    const preview = document.getElementById('gradientPreview');
    const codeEl = document.getElementById('gradientCode');

    function render() {
      const css = cssInput.value.trim();
      preview.style.cssText = css;
      codeEl.textContent = css;
    }

    function loadPreset(grad) {
      cssInput.value = grad;
      render();
    }

    cssInput.addEventListener('input', () => {
      const css = cssInput.value.trim();
      preview.style.cssText = css;
      codeEl.textContent = css;
    });

    render();
  </script>
</body>
</html>
