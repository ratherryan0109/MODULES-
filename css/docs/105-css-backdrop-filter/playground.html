<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Backdrop Filter - Playground</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Courier New', monospace; background: #1e1e2e; color: #cdd6f4; padding: 1.5rem; }
    h1 { color: #89b4fa; margin-bottom: 1rem; }
    .container { display: grid; grid-template-columns: 300px 1fr; gap: 1.5rem; max-width: 1200px; margin: 0 auto; }
    @media (max-width: 800px) { .container { grid-template-columns: 1fr; } }
    .panel { background: #313244; border-radius: 12px; padding: 1.5rem; border: 1px solid #45475a; }
    .preview-panel { min-height: 400px; display: flex; align-items: center; justify-content: center; background: repeating-linear-gradient(45deg, #667eea 0px, #667eea 20px, #764ba2 20px, #764ba2 40px); position: relative; overflow: hidden; }

    .control-group { margin-bottom: 0.75rem; }
    .control-group label { display: block; color: #a6e3a1; font-weight: 700; margin-bottom: 0.25rem; font-size: 0.85rem; }
    .control-group select, .control-group input[type="color"] { width: 100%; padding: 0.4rem; border-radius: 6px; border: 1px solid #45475a; background: #181825; color: #cdd6f4; font-family: monospace; }
    .control-group input[type="range"] { width: 100%; }

    #glassBox {
      width: 280px;
      padding: 32px;
      border-radius: 16px;
      text-align: center;
      font-weight: 700;
      transition: all 0.3s ease;
    }

    .fallback-note { background: #45475a; padding: 12px; border-radius: 8px; font-size: 0.8rem; color: #f9e2af; text-align: center; }

    .code-output { background: #181825; padding: 1rem; border-radius: 8px; margin-top: 1rem; font-family: monospace; font-size: 0.8rem; white-space: pre-wrap; border: 1px solid #45475a; max-height: 200px; overflow-y: auto; }

    button.primary { background: #89b4fa; color: #1e1e2e; border: none; padding: 0.5rem; border-radius: 6px; cursor: pointer; font-weight: 700; width: 100%; margin-top: 0.5rem; }

    .bg-preview { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
    .bg-swatch { width: 40px; height: 40px; border-radius: 6px; cursor: pointer; border: 2px solid transparent; }
    .bg-swatch.active { border-color: #89b4fa; }
  </style>
</head>
<body>
  <h1>CSS Backdrop Filter Playground</h1>
  <div class="container">
    <div class="panel">
      <h2 style="color:#a6e3a1;margin-bottom:1rem;">Controls</h2>

      <div class="control-group">
        <label>Blur Radius (px)</label>
        <input type="range" id="blur" min="0" max="30" step="0.5" value="12">
        <span id="blurVal">12px</span>
      </div>

      <div class="control-group">
        <label>Brightness</label>
        <input type="range" id="brightness" min="0.1" max="2" step="0.1" value="1">
        <span id="brightVal">1.0</span>
      </div>

      <div class="control-group">
        <label>Saturation</label>
        <input type="range" id="saturation" min="0" max="3" step="0.1" value="1">
        <span id="satVal">1.0</span>
      </div>

      <div class="control-group">
        <label>Background Opacity</label>
        <input type="range" id="bgOpacity" min="0" max="1" step="0.05" value="0.15">
        <span id="opacityVal">0.15</span>
      </div>

      <div class="control-group">
        <label>Background Color</label>
        <input type="color" id="bgColor" value="#ffffff">
      </div>

      <div class="control-group">
        <label>Border Opacity</label>
        <input type="range" id="borderOpacity" min="0" max="1" step="0.05" value="0.25">
        <span id="borderVal">0.25</span>
      </div>

      <div class="control-group">
        <label>Background Pattern</label>
        <div class="bg-preview">
          <div class="bg-swatch active" data-bg="gradient1" style="background:linear-gradient(135deg,#667eea,#764ba2);" onclick="setBg('gradient1')"></div>
          <div class="bg-swatch" data-bg="gradient2" style="background:linear-gradient(135deg,#f093fb,#f5576c);" onclick="setBg('gradient2')"></div>
          <div class="bg-swatch" data-bg="gradient3" style="background:linear-gradient(135deg,#4facfe,#00f2fe);" onclick="setBg('gradient3')"></div>
          <div class="bg-swatch" data-bg="gradient4" style="background:linear-gradient(135deg,#43e97b,#38f9d7);" onclick="setBg('gradient4')"></div>
          <div class="bg-swatch" data-bg="stripes" style="background:repeating-linear-gradient(45deg,#667eea 0px,#667eea 20px,#764ba2 20px,#764ba2 40px);" onclick="setBg('stripes')"></div>
          <div class="bg-swatch" data-bg="dots" style="background:radial-gradient(circle,#45475a 2px,transparent 2px);background-size:20px 20px;background-color:#1e1e2e;" onclick="setBg('dots')"></div>
        </div>
      </div>

      <button class="primary" id="resetBtn">Reset to Defaults</button>
    </div>
    <div class="panel preview-panel" id="previewBg">
      <div id="glassBox">
        <h2 style="margin-bottom:8px;">Glass Panel</h2>
        <p style="font-size:0.85rem;font-weight:400;opacity:0.8;">Adjust the controls to see how backdrop-filter affects the appearance.</p>
      </div>
    </div>
  </div>
  <div class="code-output" id="codeOutput">/* CSS generated by controls */</div>

  <script>
    const glassBox = document.getElementById('glassBox');
    const previewBg = document.getElementById('previewBg');
    const blur = document.getElementById('blur');
    const blurVal = document.getElementById('blurVal');
    const brightness = document.getElementById('brightness');
    const brightVal = document.getElementById('brightVal');
    const saturation = document.getElementById('saturation');
    const satVal = document.getElementById('satVal');
    const bgOpacity = document.getElementById('bgOpacity');
    const opacityVal = document.getElementById('opacityVal');
    const bgColor = document.getElementById('bgColor');
    const borderOpacity = document.getElementById('borderOpacity');
    const borderVal = document.getElementById('borderVal');
    const codeOutput = document.getElementById('codeOutput');
    const resetBtn = document.getElementById('resetBtn');

    let currentBg = 'gradient1';

    function setBg(type) {
      currentBg = type;
      document.querySelectorAll('.bg-swatch').forEach(s => s.classList.toggle('active', s.dataset.bg === type));
      const bgMap = {
        gradient1: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
        gradient2: 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
        gradient3: 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
        gradient4: 'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)',
        stripes: 'repeating-linear-gradient(45deg, #667eea 0px, #667eea 20px, #764ba2 20px, #764ba2 40px)',
        dots: 'radial-gradient(circle, #45475a 2px, transparent 2px), #1e1e2e',
      };
      previewBg.style.background = bgMap[type];
    }

    function update() {
      const b = parseFloat(blur.value);
      const br = parseFloat(brightness.value);
      const sat = parseFloat(saturation.value);
      const op = parseFloat(bgOpacity.value);
      const bc = bgColor.value;
      const bo = parseFloat(borderOpacity.value);

      blurVal.textContent = b + 'px';
      brightVal.textContent = br.toFixed(1);
      satVal.textContent = sat.toFixed(1);
      opacityVal.textContent = op.toFixed(2);
      borderVal.textContent = bo.toFixed(2);

      // Build RGBA from color
      const r = parseInt(bc.slice(1,3), 16);
      const g = parseInt(bc.slice(3,5), 16);
      const b2 = parseInt(bc.slice(5,7), 16);

      glassBox.style.background = `rgba(${r}, ${g}, ${b2}, ${op})`;
      glassBox.style.backdropFilter = `blur(${b}px) brightness(${br}) saturate(${sat})`;
      glassBox.style.WebkitBackdropFilter = `blur(${b}px) brightness(${br}) saturate(${sat})`;
      glassBox.style.border = `1px solid rgba(255, 255, 255, ${bo})`;
      glassBox.style.color = 'white';

      const lines = [
        `.glass-panel {`,
        `  background: rgba(${r}, ${g}, ${b2}, ${op});`,
        `  backdrop-filter: blur(${b}px) brightness(${br}) saturate(${sat});`,
        `  -webkit-backdrop-filter: blur(${b}px) brightness(${br}) saturate(${sat});`,
        `  border: 1px solid rgba(255, 255, 255, ${bo});`,
        `  border-radius: 16px;`,
        `  padding: 32px;`,
        `}`,
        ``,
        `/* Fallback for unsupported browsers */`,
        `.glass-panel {`,
        `  background: rgba(${r}, ${g}, ${b2}, 0.9);`,
        `}`
      ];
      codeOutput.textContent = lines.join('\n');
    }

    [blur, brightness, saturation, bgOpacity, bgColor, borderOpacity].forEach(el => el.addEventListener('input', update));

    resetBtn.addEventListener('click', () => {
      blur.value = '12';
      brightness.value = '1';
      saturation.value = '1';
      bgOpacity.value = '0.15';
      bgColor.value = '#ffffff';
      borderOpacity.value = '0.25';
      setBg('gradient1');
      update();
    });

    // Initial
    setBg('gradient1');
    update();
  </script>
</body>
</html>
