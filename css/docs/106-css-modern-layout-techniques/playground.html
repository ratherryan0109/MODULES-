<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Modern Layout - Playground</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Courier New', monospace; background: #1e1e2e; color: #cdd6f4; padding: 1.5rem; }
    h1 { color: #89b4fa; margin-bottom: 1rem; }
    .container { display: grid; grid-template-columns: 280px 1fr; gap: 1.5rem; max-width: 1400px; margin: 0 auto; }
    @media (max-width: 800px) { .container { grid-template-columns: 1fr; } }
    .panel { background: #313244; border-radius: 12px; padding: 1.5rem; border: 1px solid #45475a; }
    .control-group { margin-bottom: 0.75rem; }
    .control-group label { display: block; color: #a6e3a1; font-weight: 700; margin-bottom: 0.25rem; font-size: 0.85rem; }
    .control-group select, .control-group input { width: 100%; padding: 0.4rem; border-radius: 6px; border: 1px solid #45475a; background: #181825; color: #cdd6f4; font-family: monospace; }
    .control-group input[type="range"] { width: 100%; }
    button.primary { background: #89b4fa; color: #1e1e2e; border: none; padding: 0.5rem; border-radius: 6px; cursor: pointer; font-weight: 700; width: 100%; margin-top: 0.5rem; }
    .code-output { background: #181825; padding: 1rem; border-radius: 8px; margin-top: 1rem; font-size: 0.8rem; white-space: pre-wrap; border: 1px solid #45475a; max-height: 200px; overflow-y: auto; }
    .demo-items { display: flex; gap: 8px; flex-wrap: wrap; }
    .demo-item { background: linear-gradient(135deg, #667eea, #764ba2); padding: 12px 16px; border-radius: 6px; color: white; font-weight: 700; text-align: center; }
    .demo-item:nth-child(2n) { background: linear-gradient(135deg, #f093fb, #f5576c); }
    .demo-item:nth-child(3n) { background: linear-gradient(135deg, #4facfe, #00f2fe); }
  </style>
</head>
<body>
  <h1>CSS Modern Layout Playground</h1>
  <div class="container">
    <div class="panel">
      <h2 style="color:#a6e3a1;margin-bottom:1rem;">Controls</h2>

      <div class="control-group">
        <label>Layout Type</label>
        <select id="layoutType">
          <option value="grid-fixed">Grid: Fixed columns (3 x 1fr)</option>
          <option value="grid-auto">Grid: Auto-fill (minmax 150px)</option>
          <option value="grid-areas">Grid: Named areas</option>
          <option value="flex-row">Flexbox: Row</option>
          <option value="flex-wrap">Flexbox: Wrapping</option>
          <option value="flex-grow">Flexbox: Grow distribution</option>
        </select>
      </div>

      <div class="control-group">
        <label>Number of Items</label>
        <input type="range" id="itemCount" min="2" max="20" value="6">
        <span id="countVal">6</span>
      </div>

      <div class="control-group">
        <label>Item Size (flex-basis / min in minmax)</label>
        <input type="range" id="itemSize" min="50" max="300" step="10" value="150">
        <span id="sizeVal">150px</span>
      </div>

      <div class="control-group">
        <label>Gap</label>
        <input type="range" id="gapVal" min="0" max="40" step="2" value="8">
        <span id="gapDisplay">8px</span>
      </div>

      <div class="control-group">
        <label>Justify Content</label>
        <select id="justifyContent">
          <option value="flex-start">flex-start</option>
          <option value="center">center</option>
          <option value="flex-end">flex-end</option>
          <option value="space-between">space-between</option>
          <option value="space-around">space-around</option>
          <option value="space-evenly">space-evenly</option>
        </select>
      </div>

      <div class="control-group">
        <label>Align Items</label>
        <select id="alignItems">
          <option value="stretch">stretch</option>
          <option value="flex-start">flex-start</option>
          <option value="center">center</option>
          <option value="flex-end">flex-end</option>
        </select>
      </div>

      <button class="primary" id="resetBtn">Reset</button>
    </div>

    <div class="panel">
      <h2 style="color:#a6e3a1;margin-bottom:1rem;">Preview</h2>
      <div id="demoContainer" class="demo-items"></div>
      <div class="code-output" id="codeOutput">/* CSS will appear here */</div>
    </div>
  </div>

  <script>
    const container = document.getElementById('demoContainer');
    const layoutType = document.getElementById('layoutType');
    const itemCount = document.getElementById('itemCount');
    const countVal = document.getElementById('countVal');
    const itemSize = document.getElementById('itemSize');
    const sizeVal = document.getElementById('sizeVal');
    const gapVal = document.getElementById('gapVal');
    const gapDisplay = document.getElementById('gapDisplay');
    const justifyContent = document.getElementById('justifyContent');
    const alignItems = document.getElementById('alignItems');
    const codeOutput = document.getElementById('codeOutput');
    const resetBtn = document.getElementById('resetBtn');

    function render() {
      const count = parseInt(itemCount.value);
      const size = parseInt(itemSize.value);
      const gap = parseInt(gapVal.value);
      const jc = justifyContent.value;
      const ai = alignItems.value;
      const type = layoutType.value;

      countVal.textContent = count;
      sizeVal.textContent = size + 'px';
      gapDisplay.textContent = gap + 'px';

      // Generate items
      container.innerHTML = '';
      for (let i = 1; i <= count; i++) {
        const item = document.createElement('div');
        item.className = 'demo-item';
        item.textContent = 'Item ' + i;
        container.appendChild(item);
      }

      const containerStyle = container.style;
      containerStyle.gap = gap + 'px';
      containerStyle.justifyContent = jc;
      containerStyle.alignItems = ai;

      let cssLines = [];
      containerStyle.display = '';

      if (type === 'grid-fixed') {
        containerStyle.display = 'grid';
        containerStyle.gridTemplateColumns = 'repeat(3, 1fr)';
        containerStyle.flexWrap = '';
        cssLines = [
          `.container {`,
          `  display: grid;`,
          `  grid-template-columns: repeat(3, 1fr);`,
          `  gap: ${gap}px;`,
          `  align-items: ${ai};`,
          `}`
        ];
      } else if (type === 'grid-auto') {
        containerStyle.display = 'grid';
        containerStyle.gridTemplateColumns = `repeat(auto-fill, minmax(${size}px, 1fr))`;
        containerStyle.flexWrap = '';
        cssLines = [
          `.container {`,
          `  display: grid;`,
          `  grid-template-columns: repeat(auto-fill, minmax(${size}px, 1fr));`,
          `  gap: ${gap}px;`,
          `  align-items: ${ai};`,
          `}`
        ];
      } else if (type === 'grid-areas') {
        const items = container.children;
        containerStyle.display = 'grid';
        containerStyle.gridTemplateColumns = '1fr 1fr 1fr';
        containerStyle.flexWrap = '';
        if (items.length >= 3) {
          items[0].style.gridColumn = '1 / -1';
          items[0].textContent = 'Header';
          items[1].style.gridColumn = '1 / 2';
          items[1].textContent = 'Sidebar';
          items[2].style.gridColumn = '2 / -1';
          items[2].textContent = 'Main';
          for (let i = 3; i < items.length; i++) {
            items[i].style.gridColumn = '1 / -1';
            items[i].textContent = 'Footer ' + (i - 2);
          }
        }
        cssLines = [
          `.container {`,
          `  display: grid;`,
          `  grid-template-columns: 1fr 1fr 1fr;`,
          `  gap: ${gap}px;`,
          `}`,
          `.header { grid-column: 1 / -1; }`,
          `.sidebar { grid-column: 1 / 2; }`,
          `.main { grid-column: 2 / -1; }`,
        ];
      } else if (type === 'flex-row') {
        containerStyle.display = 'flex';
        containerStyle.flexDirection = 'row';
        containerStyle.flexWrap = 'nowrap';
        containerStyle.gridTemplateColumns = '';
        for (let item of container.children) {
          item.style.flex = '';
          item.style.gridColumn = '';
        }
        cssLines = [
          `.container {`,
          `  display: flex;`,
          `  flex-direction: row;`,
          `  gap: ${gap}px;`,
          `  justify-content: ${jc};`,
          `  align-items: ${ai};`,
          `}`
        ];
      } else if (type === 'flex-wrap') {
        containerStyle.display = 'flex';
        containerStyle.flexDirection = 'row';
        containerStyle.flexWrap = 'wrap';
        containerStyle.gridTemplateColumns = '';
        for (let item of container.children) {
          item.style.flex = `1 1 ${size}px`;
          item.style.gridColumn = '';
        }
        cssLines = [
          `.container {`,
          `  display: flex;`,
          `  flex-wrap: wrap;`,
          `  gap: ${gap}px;`,
          `  justify-content: ${jc};`,
          `  align-items: ${ai};`,
          `}`,
          `.item {`,
          `  flex: 1 1 ${size}px;`,
          `}`
        ];
      } else if (type === 'flex-grow') {
        containerStyle.display = 'flex';
        containerStyle.flexDirection = 'row';
        containerStyle.flexWrap = 'nowrap';
        containerStyle.gridTemplateColumns = '';
        const items = container.children;
        for (let i = 0; i < items.length; i++) {
          items[i].style.flex = `${i + 1} 1 0%`;
          items[i].style.gridColumn = '';
          items[i].textContent = `flex: ${i + 1}`;
        }
        cssLines = [
          `.container {`,
          `  display: flex;`,
          `  gap: ${gap}px;`,
          `}`,
          `.item:nth-child(1) { flex: 1; }`,
          `.item:nth-child(2) { flex: 2; }`,
          `.item:nth-child(3) { flex: 3; }`,
          `/* ... */`
        ];
      }

      codeOutput.textContent = cssLines.join('\n');
    }

    [layoutType, itemCount, itemSize, gapVal, justifyContent, alignItems].forEach(el => el.addEventListener('input', render));

    resetBtn.addEventListener('click', () => {
      layoutType.value = 'grid-auto';
      itemCount.value = '6';
      itemSize.value = '150';
      gapVal.value = '8';
      justifyContent.value = 'flex-start';
      alignItems.value = 'stretch';
      render();
    });

    render();
  </script>
</body>
</html>
