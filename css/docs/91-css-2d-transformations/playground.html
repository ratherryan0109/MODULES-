<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS 2D Transformations - Playground</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Courier New', monospace; background: #1e1e2e; color: #cdd6f4; padding: 2rem; }
    h1 { color: #89b4fa; margin-bottom: 1rem; }
    .container { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; max-width: 1200px; margin: 0 auto; }
    @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
    .panel { background: #313244; border-radius: 12px; padding: 1.5rem; border: 1px solid #45475a; }
    .preview-panel { display: flex; align-items: center; justify-content: center; min-height: 400px; overflow: hidden; }
    label { display: block; margin: 0.75rem 0 0.25rem; color: #a6e3a1; font-weight: 700; }
    input[type="range"] { width: 100%; }
    select { width: 100%; padding: 0.5rem; border-radius: 6px; border: 1px solid #45475a; background: #181825; color: #cdd6f4; }
    .demo-box {
      width: 140px; height: 140px; border-radius: 8px; background: #89b4fa;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: #1e1e2e; transition: transform 0.3s ease;
    }
    .code-output { background: #181825; padding: 1rem; border-radius: 8px; margin-top: 1rem; font-size: 0.85rem; white-space: pre-wrap; border: 1px solid #45475a; }
    button { background: #89b4fa; color: #1e1e2e; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-weight: 700; margin-top: 1rem; }
    button:hover { background: #b4d0fb; }
    .row { display: flex; gap: 1rem; }
    .row > div { flex: 1; }
  </style>
</head>
<body>
  <h1>CSS 2D Transformations Playground</h1>
  <div class="container">
    <div class="panel">
      <h2 style="color:#a6e3a1;margin-bottom:1rem;">Controls</h2>
      <div class="row">
        <div><label>Translate X</label><input type="range" id="tX" min="-100" max="100" value="0"><span id="tXVal">0</span></div>
        <div><label>Translate Y</label><input type="range" id="tY" min="-100" max="100" value="0"><span id="tYVal">0</span></div>
      </div>
      <div class="row">
        <div><label>Rotate</label><input type="range" id="rot" min="0" max="360" value="0"><span id="rotVal">0</span></div>
        <div><label>Scale</label><input type="range" id="scl" min="0.1" max="3" step="0.1" value="1"><span id="sclVal">1</span></div>
      </div>
      <div class="row">
        <div><label>Skew X</label><input type="range" id="skX" min="-30" max="30" value="0"><span id="skXVal">0</span></div>
        <div><label>Skew Y</label><input type="range" id="skY" min="-30" max="30" value="0"><span id="skYVal">0</span></div>
      </div>
      <label>Transform Origin</label>
      <select id="origin">
        <option value="center">center</option>
        <option value="top left">top left</option>
        <option value="top right">top right</option>
        <option value="bottom left">bottom left</option>
        <option value="bottom right">bottom right</option>
      </select>
      <button id="resetBtn">Reset</button>
    </div>
    <div class="panel preview-panel">
      <div id="previewBox" class="demo-box">2D Transform</div>
    </div>
  </div>
  <div class="code-output" id="codeOutput">transform: translate(0px, 0px) rotate(0deg) scale(1) skew(0deg, 0deg);</div>

  <script>
    const box = document.getElementById('previewBox');
    const tX = document.getElementById('tX'), tY = document.getElementById('tY');
    const rot = document.getElementById('rot'), scl = document.getElementById('scl');
    const skX = document.getElementById('skX'), skY = document.getElementById('skY');
    const origin = document.getElementById('origin');
    const code = document.getElementById('codeOutput');
    const resetBtn = document.getElementById('resetBtn');

    function update() {
      const tx = tX.value, ty = tY.value, r = rot.value, s = scl.value, sx = skX.value, sy = skY.value;
      document.getElementById('tXVal').textContent = tx; document.getElementById('tYVal').textContent = ty;
      document.getElementById('rotVal').textContent = r; document.getElementById('sclVal').textContent = s;
      document.getElementById('skXVal').textContent = sx; document.getElementById('skYVal').textContent = sy;

      box.style.transformOrigin = origin.value;
      box.style.transform = `translate(${tx}px, ${ty}px) rotate(${r}deg) scale(${s}) skew(${sx}deg, ${sy}deg)`;
      code.textContent = `transform-origin: ${origin.value};\ntransform: translate(${tx}px, ${ty}px) rotate(${r}deg) scale(${s}) skew(${sx}deg, ${sy}deg);`;
    }

    [tX, tY, rot, scl, skX, skY, origin].forEach(el => el.addEventListener('input', update));
    resetBtn.addEventListener('click', () => {
      tX.value=0; tY.value=0; rot.value=0; scl.value=1; skX.value=0; skY.value=0; origin.value='center'; update();
    });
    update();
  </script>
</body>
</html>
