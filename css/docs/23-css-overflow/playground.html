<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Overflow - Playground</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; background: #1a1a2e; color: #eee; }
    .top-bar { background: #16213e; padding: 15px 20px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
    .top-bar h1 { font-size: 20px; }
    .top-bar label { font-size: 14px; display: flex; align-items: center; gap: 8px; }
    .top-bar select { padding: 6px 12px; border-radius: 4px; border: none; font-size: 14px; }
    .main { display: flex; flex: 1; }
    .editor-panel { flex: 1; display: flex; flex-direction: column; }
    .preview-panel { flex: 1; background: white; position: relative; overflow: hidden; }
    .controls { background: #0f3460; padding: 10px 20px; display: flex; gap: 10px; }
    .controls button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; background: #e94560; color: white; font-weight: bold; }
    .controls button:hover { background: #c73650; }
    #code { flex: 1; background: #1e1e1e; color: #d4d4d4; border: none; padding: 20px; font-family: 'Consolas', monospace; font-size: 14px; resize: none; outline: none; tab-size: 2; }
    #preview { width: 100%; height: 100%; border: none; }
    .label { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; padding: 4px 10px; border-radius: 4px; font-size: 12px; }
  </style>
</head>
<body>
  <div class="top-bar">
    <h1>📦 CSS Overflow Playground</h1>
    <label>Overflow: <select id="overflowSelect">
      <option value="visible">visible</option>
      <option value="hidden">hidden</option>
      <option value="scroll">scroll</option>
      <option value="auto" selected>auto</option>
      <option value="clip">clip</option>
    </select></label>
    <label><input type="checkbox" id="ellipsisToggle"> text-overflow: ellipsis</label>
  </div>
  <div class="main">
    <div class="editor-panel">
      <div class="controls">
        <button onclick="applyCode()">▶ Run</button>
        <button onclick="resetCode()">↺ Reset</button>
        <label><input type="checkbox" id="autoUpdate" checked> Auto-run</label>
      </div>
      <textarea id="code">
<style>
  .box {
    width: 280px;
    height: 120px;
    border: 3px solid #4a90d9;
    padding: 15px;
    margin: 40px auto;
    border-radius: 8px;
    font-size: 15px;
    line-height: 1.5;
    overflow: auto;
  }
</style>
<div class="box">
  <p>This is some content inside a box with a fixed width and height.</p>
  <p>The overflow property controls what happens when this content exceeds the box dimensions.</p>
  <p>Try changing the overflow value to see different behaviors!</p>
</div></textarea>
    </div>
    <div class="preview-panel">
      <iframe id="preview"></iframe>
      <div class="label">Overflow Demo</div>
    </div>
  </div>

  <script>
    const codeEl = document.getElementById('code');
    const preview = document.getElementById('preview');
    const overflowSelect = document.getElementById('overflowSelect');
    const ellipsisToggle = document.getElementById('ellipsisToggle');

    function applyCode() {
      let html = codeEl.value;
      const ov = overflowSelect.value;
      html = html.replace(/overflow:\s*\w+;/, `overflow: ${ov};`);
      if (ellipsisToggle.checked) {
        if (!html.includes('text-overflow')) {
          html = html.replace(/overflow:\s*\w+;/, `overflow: hidden;\n  white-space: nowrap;\n  text-overflow: ellipsis;`);
        } else {
          html = html.replace(/overflow:\s*\w+;/, 'overflow: hidden;');
        }
      } else {
        html = html.replace(/\s*white-space:\s*nowrap;\s*/g, '');
        html = html.replace(/\s*text-overflow:\s*ellipsis;\s*/g, '');
      }
      if (!html.includes('<html')) {
        html = '<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body>' + html + '</body></html>';
      }
      preview.srcdoc = html;
    }

    function resetCode() {
      overflowSelect.value = 'auto';
      ellipsisToggle.checked = false;
      applyCode();
    }

    overflowSelect.addEventListener('change', applyCode);
    ellipsisToggle.addEventListener('change', applyCode);
    codeEl.addEventListener('input', () => {
      if (document.getElementById('autoUpdate').checked) {
        clearTimeout(window._runTimer);
        window._runTimer = setTimeout(applyCode, 300);
      }
    });
    applyCode();
  </script>
</body>
</html>
