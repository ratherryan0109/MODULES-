<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Grid Auto Flow - Playground</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#eee;padding:20px}
h1{color:#ff6b6b}.subtitle{color:#aaa;margin-bottom:20px}
.layout{display:flex;gap:20px;flex-wrap:wrap}
.controls{flex:0 0 280px;background:#16213e;padding:20px;border-radius:10px}
.preview{flex:1;min-width:400px;background:#16213e;padding:20px;border-radius:10px}
.group{margin-bottom:12px}
.group label{display:block;color:#aaa;font-size:13px;margin-bottom:4px}
.group select,.group input{width:100%;padding:8px;background:#1a1a2e;color:#eee;border:1px solid #333;border-radius:4px}
.group input[type="range"]{padding:0;height:6px;cursor:pointer}
.grid-container{display:grid;gap:4px;background:#2d2d44;border-radius:8px;padding:4px;transition:all .3s;min-height:200px}
.el{display:flex;align-items:center;justify-content:center;border-radius:4px;font-weight:bold;font-size:13px;overflow:hidden;min-height:50px}
#css-code{margin-top:15px;background:#1a1a2e;padding:15px;border-radius:8px;font-family:monospace;font-size:13px;color:#a8e6cf;white-space:pre;overflow-x:auto}
.btn-reset{background:#ff6b6b;color:#fff;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;margin-top:5px}
.toggle{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.toggle-btn{background:#2d2d44;color:#aaa;border:1px solid #444;padding:6px 12px;border-radius:4px;cursor:pointer;font-size:12px}
.toggle-btn.active{background:#4ecdc4;color:#1a1a2e;border-color:#4ecdc4}
</style>
</head>
<body>
<h1>Grid Auto Flow Playground</h1>
<p class="subtitle">Experiment with different auto-flow modes, spanning, and dense packing</p>
<div class="layout">
<div class="controls">
<div class="group"><label>Auto Flow Mode</label><select id="flow"><option value="row">row (default)</option><option value="column">column</option><option value="dense">dense</option><option value="row dense">row dense</option><option value="column dense">column dense</option></select></div>
<div class="group"><label>Columns</label><select id="cols"><option value="repeat(3, 1fr)">3 columns</option><option value="repeat(4, 1fr)">4 columns</option><option value="repeat(2, 1fr)">2 columns</option></select></div>
<div class="group"><label>Items</label><input type="range" id="items" min="1" max="20" value="8"><div class="range-value" id="items-val">8</div></div>
<div class="group"><label>Items with span-2</label><input type="range" id="span-count" min="0" max="5" value="1"><div class="range-value" id="span-count-val">1 (item 1)</div></div>
<div class="group"><label>Implicit Row Height</label><input type="range" id="auto-rows" min="30" max="120" value="60"><div class="range-value" id="auto-rows-val">60px</div></div>
<button class="btn-reset" onclick="resetPlayground()">Reset</button>
</div>
<div class="preview">
<div id="grid" class="grid-container"></div>
<div id="css-code">/* CSS will appear here */</div>
</div>
</div>
<script>
const grid=document.getElementById('grid'),code=document.getElementById('css-code');
const flow=document.getElementById('flow'),cols=document.getElementById('cols');
const items=document.getElementById('items'),spanCount=document.getElementById('span-count');
const autoRows=document.getElementById('auto-rows');
const colors=['#ff6b6b','#4ecdc4','#45b7d1','#a29bfe','#ffd93d','#6c5ce7','#fdcb6e','#e17055','#00cec9','#fd79a8','#636e72','#b2bec3'];

function update(){
const f=flow.value,c=cols.value,n=parseInt(items.value),s=parseInt(spanCount.value),ar=parseInt(autoRows.value);
grid.style.gridTemplateColumns=c;
grid.style.gridAutoFlow=f;
grid.style.gridAutoRows=ar+'px';
grid.innerHTML='';
for(let i=1;i<=n;i++){
const el=document.createElement('div');el.className='el';el.style.background=colors[(i-1)%colors.length];el.style.color=i%2===0?'#1a1a2e':'#eee';
if(i<=s){el.style.gridColumn='span 2';el.textContent=`#${i} (span 2)`;}
else el.textContent=`#${i}`;
grid.appendChild(el);
}
document.getElementById('items-val').textContent=n;
document.getElementById('span-count-val').textContent=`${s} (items 1-${s})`;
document.getElementById('auto-rows-val').textContent=ar+'px';
code.textContent=`.container {\n  display: grid;\n  grid-template-columns: ${c};\n  grid-auto-flow: ${f};\n  grid-auto-rows: ${ar}px;\n}\n\n${s>0?`/* Items 1-${s} span 2 columns */\n.items-1-to-${s} { grid-column: span 2; }`:''}`;
}
document.querySelectorAll('.controls select, .controls input').forEach(el=>el.addEventListener('input',update));
function resetPlayground(){flow.value='row';cols.value='repeat(3, 1fr)';items.value=8;spanCount.value=1;autoRows.value=60;update();}
update();
</script>
</body>
</html>
