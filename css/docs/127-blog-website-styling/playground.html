<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Playground - Blog Styling</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#1e293b;color:#fff;height:100vh;display:flex;flex-direction:column}
  .toolbar{background:#0f172a;padding:.5rem 1rem;display:flex;align-items:center;gap:1rem;border-bottom:1px solid #334155;flex-wrap:wrap}
  .toolbar h2{font-size:1rem;font-weight:600}
  .toolbar button,.toolbar select{background:#334155;color:#fff;border:none;padding:.4rem .8rem;border-radius:4px;cursor:pointer;font-size:.875rem}
  .toolbar button:hover{background:#475569}
  .main-split{display:flex;flex:1;overflow:hidden}
  .editor-pane{flex:1;display:flex;flex-direction:column;border-right:1px solid #334155}
  .preview-pane{flex:1;background:#fff;position:relative}
  iframe{width:100%;height:100%;border:none}
  textarea{width:100%;flex:1;background:#1e293b;color:#e2e8f0;border:none;padding:1rem;font-family:'Consolas','Courier New',monospace;font-size:.875rem;resize:none;outline:none;tab-size:2}
  .tabs{display:flex;background:#0f172a;border-bottom:1px solid #334155}
  .tabs button{background:transparent;color:#94a3b8;border:none;padding:.5rem 1rem;cursor:pointer;border-bottom:2px solid transparent}
  .tabs button.active{color:#fff;border-bottom-color:#d97706}
  .error-bar{background:#dc2626;color:#fff;padding:.25rem 1rem;font-size:.8rem;display:none}
  @media(max-width:768px){.main-split{flex-direction:column}}
</style></head>
<body>
<div class="toolbar">
  <h2>Blog Playground</h2>
  <select id="viewportSelect"><option value="100%">Responsive</option><option value="375px">Mobile</option><option value="768px">Tablet</option><option value="1024px">Desktop</option></select>
  <button id="runBtn">&#9654; Run</button>
  <button id="resetBtn">&#8635; Reset</button>
</div>
<div class="main-split">
  <div class="editor-pane">
    <div class="tabs"><button class="active" data-tab="html">HTML</button><button data-tab="css">CSS</button></div>
    <textarea id="htmlEditor"><article style="max-width:720px;padding:2rem;font-family:'Merriweather',serif;line-height:1.8">
  <h1 style="font-size:2.5rem;line-height:1.2">How to Style a Blog</h1>
  <p style="color:#78716c;font-size:.875rem">June 5, 2026 · 5 min read</p>
  <p style="margin-bottom:1.5rem">Modern CSS gives us incredible tools for styling blogs. From CSS Grid for layouts to custom properties for theming, we can create beautiful reading experiences.</p>
  <blockquote style="border-left:4px solid #d97706;padding:1rem 1.5rem;background:#fef3c7;margin:1.5rem 0;border-radius:0 8px 8px 0">
    <p>"Typography is the craft of endowing human language with a durable visual form."</p>
  </blockquote>
</article></textarea>
    <textarea id="cssEditor">/* Blog styling */
body {
  margin: 0;
  font-family: 'Merriweather', Georgia, serif;
  background: #fafaf9;
  color: #1c1917;
}
blockquote { border-left: 4px solid #d97706; }</textarea>
  </div>
  <div class="preview-pane"><div class="error-bar" id="errorBar"></div><iframe id="preview"></iframe></div>
</div>
<script>
  const h=document.getElementById('htmlEditor'),c=document.getElementById('cssEditor'),p=document.getElementById('preview'),e=document.getElementById('errorBar'),vs=document.getElementById('viewportSelect'),r=document.getElementById('runBtn'),rs=document.getElementById('resetBtn'),tb=document.querySelectorAll('[data-tab]');
  function render(){const d='<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Preview</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Merriweather:wght@400;700&display=swap" rel="stylesheet"><style>*,*::before,*::after{box-sizing:border-box}body{margin:0}img{max-width:100%}'+c.value+'</style></head><body>'+h.value+'</body></html>';try{p.src='data:text/html;charset=utf-8,'+encodeURIComponent(d);e.style.display='none'}catch(ex){e.textContent='Error: '+ex.message;e.style.display='block'}}
  function reset(){h.value='<article style="max-width:720px;padding:2rem;font-family:\'Merriweather\',serif;line-height:1.8">\n  <h1 style="font-size:2.5rem;line-height:1.2">How to Style a Blog</h1>\n  <p style="color:#78716c;font-size:.875rem">June 5, 2026 · 5 min read</p>\n  <p style="margin-bottom:1.5rem">Modern CSS gives us incredible tools for styling blogs. From CSS Grid for layouts to custom properties for theming, we can create beautiful reading experiences.</p>\n  <blockquote style="border-left:4px solid #d97706;padding:1rem 1.5rem;background:#fef3c7;margin:1.5rem 0;border-radius:0 8px 8px 0">\n    <p>"Typography is the craft of endowing human language with a durable visual form."</p>\n  </blockquote>\n</article>';c.value='/* Blog styling */\nbody {\n  margin: 0;\n  font-family: \'Merriweather\', Georgia, serif;\n  background: #fafaf9;\n  color: #1c1917;\n}\nblockquote { border-left: 4px solid #d97706; }';render()}
  vs.addEventListener('change',()=>{p.style.width=vs.value;p.style.margin=vs.value==='100%'?'0':'0 auto'});
  r.addEventListener('click',render);rs.addEventListener('click',reset);
  tb.forEach(b=>{b.addEventListener('click',()=>{tb.forEach(x=>x.classList.remove('active'));b.classList.add('active');document.querySelectorAll('.editor-pane textarea').forEach(t=>t.style.display='none');if(b.dataset.tab==='html')h.style.display='block';if(b.dataset.tab==='css')c.style.display='block'})});
  h.style.display='block';c.style.display='none';render();
</script></body></html>
