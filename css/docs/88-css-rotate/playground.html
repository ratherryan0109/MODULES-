<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Rotate - Playground</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Courier New', monospace; background: #1e1e2e; color: #cdd6f4; padding: 2rem; }
    h1 { color: #89b4fa; margin-bottom: 1rem; }
    .container { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; max-width: 1200px; margin: 0 auto; }
    @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
    .panel { background: #313244; border-radius: 12px; padding: 1.5rem; border: 1px solid #45475a; }
    .preview-panel { display: flex; align-items: center; justify-content: center; min-height: 400px; overflow: hidden; }
    label { display: block; margin: 0.75rem 0 0.25rem; color: #a6e3a1; font-weight: 700; }
    input[type="range"] { width: 100%; }
    select { width: 100%; padding: 0.5rem; border-radius: 6px; border: 1px solid #45475a; background: #181825; color: #cdd6f4; }
    .demo-box {
      width: 150px; height: 150px; border-radius: 12px; background: #89b4fa;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: #1e1e2e; transition: rotate 0.3s ease;
    }
    .code-output { background: #181825; padding: 1rem; border-radius: 8px; margin-top: 1rem; font-size: 0.85rem; white-space: pre-wrap; border: 1px solid #45475a; }
    button { background: #89b4fa; color: #1e1e2e; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-weight: 700; margin-top: 1rem; }
    button:hover { background: #b4d0fb; }
    .row { display: flex; gap: 1rem; }
    .row > div { flex: 1; }
  </style>
</head>
<body>
  <h1>CSS Rotate Playground</h1>
  <div class="container">
    <div class="panel">
      <h2 style="color:#a6e3a1;margin-bottom:1rem;">Controls</h2>

      <label>Angle (deg)</label>
      <input type="range" id="angle" min="0" max="720" value="0">
      <span id="angleVal">0deg</span>

      <label>Rotation Axis</label>
      <select id="axis">
        <option value="Z">Z (2D)</option>
        <option value="X">X (3D)</option>
        <option value="Y">Y (3D)</option>
      </select>

      <label>Transform Origin</label>
      <select id="origin">
        <option value="center">center</option>
        <option value="top left">top left</option>
        <option value="top right">top right</option>
        <option value="bottom left">bottom left</option>
        <option value="bottom right">bottom right</option>
      </select>

      <label>Parent Perspective (0 = none)</label>
      <input type="range" id="perspective" min="0" max="1000" step="10" value="0">
      <span id="perspectiveVal">0</span>

      <button id="resetBtn">Reset</button>
    </div>
    <div class="panel preview-panel">
      <div id="wrapper" style="perspective:none;">
        <div id="previewBox" class="demo-box">Rotate</div>
      </div>
    </div>
  </div>
  <div class="code-output" id="codeOutput">rotate: 0deg;</div>

  <script>
    const box = document.getElementById('previewBox');
    const wrapper = document.getElementById('wrapper');
    const angle = document.getElementById('angle');
    const axis = document.getElementById('axis');
    const origin = document.getElementById('origin');
    const persp = document.getElementById('perspective');
    const code = document.getElementById('codeOutput');
    const resetBtn = document.getElementById('resetBtn');

    function update() {
      const a = angle.value;
      const ax = axis.value;
      const o = origin.value;
      const p = persp.value;

      document.getElementById('angleVal').textContent = a + 'deg';
      document.getElementById('perspectiveVal').textContent = p;

      wrapper.style.perspective = p > 0 ? p + 'px' : 'none';
      box.style.transformOrigin = o;
      box.style.rotate = ax === 'Z' ? `${a}deg` : `${ax} ${a}deg`;

      code.textContent = `rotate: ${ax === 'Z' ? '' : ax + ' '}${a}deg;\ntransform-origin: ${o};\n${p > 0 ? `perspective: ${p}px;` : ''}`;
    }

    [angle, axis, origin, persp].forEach(el => el.addEventListener('input', update));
    resetBtn.addEventListener('click', () => {
      angle.value = 0;
      axis.value = 'Z';
      origin.value = 'center';
      persp.value = 0;
      update();
    });
    update();
  </script>
</body>
</html>
