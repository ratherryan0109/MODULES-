<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playground - Responsive Landing Page</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1e293b; color: #fff; height: 100vh; display: flex; flex-direction: column; }
    .toolbar { background: #0f172a; padding: 0.5rem 1rem; display: flex; align-items: center; gap: 1rem; border-bottom: 1px solid #334155; flex-wrap: wrap; }
    .toolbar h2 { font-size: 1rem; font-weight: 600; }
    .toolbar button, .toolbar select { background: #334155; color: #fff; border: none; padding: 0.4rem 0.8rem; border-radius: 4px; cursor: pointer; font-size: 0.875rem; }
    .toolbar button:hover { background: #475569; }
    .toolbar label { font-size: 0.875rem; display: flex; align-items: center; gap: 0.5rem; }
    .main-split { display: flex; flex: 1; overflow: hidden; }
    .editor-pane { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #334155; }
    .preview-pane { flex: 1; background: #fff; position: relative; }
    iframe { width: 100%; height: 100%; border: none; }
    textarea { width: 100%; flex: 1; background: #1e293b; color: #e2e8f0; border: none; padding: 1rem; font-family: 'Consolas', 'Courier New', monospace; font-size: 0.875rem; resize: none; outline: none; tab-size: 2; }
    .tabs { display: flex; background: #0f172a; border-bottom: 1px solid #334155; }
    .tabs button { background: transparent; color: #94a3b8; border: none; padding: 0.5rem 1rem; cursor: pointer; border-bottom: 2px solid transparent; }
    .tabs button.active { color: #fff; border-bottom-color: #6366f1; }
    .error-bar { background: #dc2626; color: #fff; padding: 0.25rem 1rem; font-size: 0.8rem; display: none; }
    @media (max-width: 768px) { .main-split { flex-direction: column; } }
  </style>
</head>
<body>
  <div class="toolbar">
    <h2>CSS Playground — Landing Page</h2>
    <label>
      <span>Width:</span>
      <select id="viewportSelect">
        <option value="100%">Responsive</option>
        <option value="375px">375px (Mobile)</option>
        <option value="768px">768px (Tablet)</option>
        <option value="1024px">1024px (Desktop)</option>
      </select>
    </label>
    <button id="runBtn">&#9654; Run</button>
    <button id="resetBtn">&#8635; Reset</button>
  </div>
  <div class="main-split">
    <div class="editor-pane">
      <div class="tabs">
        <button class="active" data-tab="html">HTML</button>
        <button data-tab="css">CSS</button>
      </div>
      <textarea id="htmlEditor"><!-- Landing Page Playground -->
<section style="padding:2rem;font-family:sans-serif">
  <h1 style="color:#6366f1;font-size:2.5rem">Build Better Products</h1>
  <p style="color:#64748b;font-size:1.125rem;max-width:500px">Create stunning landing pages with modern CSS. Try editing the HTML or CSS!</p>
  <div style="display:flex;gap:1rem;margin-top:1.5rem">
    <a href="#" style="background:#6366f1;color:#fff;padding:0.75rem 1.5rem;border-radius:8px;text-decoration:none">Get Started</a>
    <a href="#" style="border:2px solid #6366f1;color:#6366f1;padding:0.75rem 1.5rem;border-radius:8px;text-decoration:none">Learn More</a>
  </div>
</section></textarea>
      <textarea id="cssEditor">/* Add your custom styles here */
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #f8fafc;
}</textarea>
    </div>
    <div class="preview-pane">
      <div class="error-bar" id="errorBar"></div>
      <iframe id="preview"></iframe>
    </div>
  </div>
  <script>
    const htmlEditor = document.getElementById('htmlEditor');
    const cssEditor = document.getElementById('cssEditor');
    const preview = document.getElementById('preview');
    const errorBar = document.getElementById('errorBar');
    const viewportSelect = document.getElementById('viewportSelect');
    const runBtn = document.getElementById('runBtn');
    const resetBtn = document.getElementById('resetBtn');
    const tabs = document.querySelectorAll('[data-tab]');

    function render() {
      const html = htmlEditor.value;
      const css = cssEditor.value;
      const doc = `
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after { box-sizing: border-box; }
  body { margin: 0; font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; }
  img { max-width: 100%; }
  ${css}
</style></head><body>${html}</body></html>`;
      try {
        preview.src = 'data:text/html;charset=utf-8,' + encodeURIComponent(doc);
        errorBar.style.display = 'none';
      } catch (e) {
        errorBar.textContent = 'Error: ' + e.message;
        errorBar.style.display = 'block';
      }
    }

    function resetCode() {
      htmlEditor.value = '<!-- Landing Page Playground -->\n<section style="padding:2rem;font-family:sans-serif">\n  <h1 style="color:#6366f1;font-size:2.5rem">Build Better Products</h1>\n  <p style="color:#64748b;font-size:1.125rem;max-width:500px">Create stunning landing pages with modern CSS. Try editing the HTML or CSS!</p>\n  <div style="display:flex;gap:1rem;margin-top:1.5rem">\n    <a href="#" style="background:#6366f1;color:#fff;padding:0.75rem 1.5rem;border-radius:8px;text-decoration:none">Get Started</a>\n    <a href="#" style="border:2px solid #6366f1;color:#6366f1;padding:0.75rem 1.5rem;border-radius:8px;text-decoration:none">Learn More</a>\n  </div>\n</section>';
      cssEditor.value = '/* Add your custom styles here */\nbody {\n  margin: 0;\n  font-family: \'Inter\', sans-serif;\n  background: #f8fafc;\n}';
      render();
    }

    viewportSelect.addEventListener('change', () => {
      preview.style.width = viewportSelect.value;
      preview.style.margin = viewportSelect.value === '100%' ? '0' : '0 auto';
    });

    runBtn.addEventListener('click', render);

    resetBtn.addEventListener('click', resetCode);

    tabs.forEach(btn => {
      btn.addEventListener('click', () => {
        tabs.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.editor-pane textarea').forEach(t => t.style.display = 'none');
        if (btn.dataset.tab === 'html') htmlEditor.style.display = 'block';
        if (btn.dataset.tab === 'css') cssEditor.style.display = 'block';
      });
    });

    htmlEditor.style.display = 'block';
    cssEditor.style.display = 'none';

    render();
  </script>
</body>
</html>
