<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Image Gallery Examples</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; margin: 0; }
    section { background: #fff; padding: 20px; margin-bottom: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

    /* Grid Gallery */
    .grid-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }
    .grid-gallery img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 8px;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .grid-gallery img:hover {
      transform: scale(1.03);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    /* Gallery with Captions */
    .caption-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }
    .caption-card {
      position: relative;
      overflow: hidden;
      border-radius: 8px;
    }
    .caption-card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      display: block;
    }
    .caption-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.7);
      color: #fff;
      padding: 12px 16px;
      transform: translateY(100%);
      transition: transform 0.3s;
    }
    .caption-card:hover .caption-overlay {
      transform: translateY(0);
    }

    /* Masonry-like gallery */
    .masonry {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      grid-auto-rows: 200px;
      gap: 12px;
    }
    .masonry img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 6px;
    }
    .masonry .tall { grid-row: span 2; }
    .masonry .wide { grid-column: span 2; }
  </style>
</head>
<body>
  <h1>CSS Image Gallery Examples</h1>

  <section>
    <h2>Simple Grid Gallery</h2>
    <div class="grid-gallery">
      <img src="https://placehold.co/300x200/007bff/fff?text=1" alt="Gallery image 1">
      <img src="https://placehold.co/300x200/6610f2/fff?text=2" alt="Gallery image 2">
      <img src="https://placehold.co/300x200/e83e8c/fff?text=3" alt="Gallery image 3">
      <img src="https://placehold.co/300x200/fd7e14/fff?text=4" alt="Gallery image 4">
      <img src="https://placehold.co/300x200/20c997/fff?text=5" alt="Gallery image 5">
      <img src="https://placehold.co/300x200/6f42c1/fff?text=6" alt="Gallery image 6">
    </div>
  </section>

  <section>
    <h2>Gallery with Caption Overlays</h2>
    <div class="caption-gallery">
      <div class="caption-card">
        <img src="https://placehold.co/400x300/28a745/fff?text=Nature" alt="Nature">
        <div class="caption-overlay">Beautiful Nature</div>
      </div>
      <div class="caption-card">
        <img src="https://placehold.co/400x300/17a2b8/fff?text=City" alt="City">
        <div class="caption-overlay">City Skyline</div>
      </div>
      <div class="caption-card">
        <img src="https://placehold.co/400x300/dc3545/fff?text=Sunset" alt="Sunset">
        <div class="caption-overlay">Golden Sunset</div>
      </div>
    </div>
  </section>

  <section>
    <h2>Masonry-Style with Span Classes</h2>
    <div class="masonry">
      <img src="https://placehold.co/300x200/007bff/fff?text=1" alt="1" class="tall">
      <img src="https://placehold.co/300x200/6610f2/fff?text=2" alt="2">
      <img src="https://placehold.co/300x200/e83e8c/fff?text=3" alt="3">
      <img src="https://placehold.co/300x200/fd7e14/fff?text=4" alt="4" class="wide">
      <img src="https://placehold.co/300x200/20c997/fff?text=5" alt="5">
      <img src="https://placehold.co/300x200/6f42c1/fff?text=6" alt="6" class="tall">
    </div>
  </section>
</body>
</html>
