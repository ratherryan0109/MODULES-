<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Functions — Playground</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; padding: 2rem; color: #eee; }
    h1 { margin-bottom: 0.5rem; }
    p.subtitle { color: #aaa; margin-bottom: 2rem; }
    .container { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; max-width: 1400px; margin: 0 auto; }
    @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }
    .controls { background: #16213e; border-radius: 12px; padding: 1.5rem; }
    .controls h2 { margin-bottom: 1rem; font-size: 1.1rem; color: #a8d8ea; }
    .control-group { margin-bottom: 1.2rem; }
    .control-group label { display: block; margin-bottom: 0.3rem; font-size: 0.85rem; color: #aaa; }
    .control-group input[type="range"] { width: 100%; }
    .control-group select { width: 100%; padding: 0.5rem; border-radius: 6px; border: 1px solid #333; background: #0f3460; color: #eee; }
    .control-group .value { float: right; font-size: 0.8rem; color: #a8d8ea; }
    .tab-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .tab-bar button { padding: 0.5rem 1rem; border: none; border-radius: 6px; background: #0f3460; color: #aaa; cursor: pointer; }
    .tab-bar button.active { background: #e94560; color: white; }
    .preview-area { background: #16213e; border-radius: 12px; padding: 2rem; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px; }
    .preview-box { width: 300px; height: 300px; background: linear-gradient(135deg, #e74c3c, #3498db); border-radius: 16px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1rem; font-weight: bold; text-align: center; transition: all 0.2s; }
    .code-output { background: #0a0a1a; border-radius: 8px; padding: 1rem; margin-top: 1.5rem; font-family: 'Courier New', monospace; font-size: 0.85rem; color: #a8d8ea; white-space: pre-wrap; word-break: break-all; width: 100%; }
  </style>
</head>
<body>
  <h1>CSS Functions Playground</h1>
  <p class="subtitle">Experiment with CSS functions: math, transforms, and colors</p>

  <div class="container">
    <div class="controls">
      <div class="tab-bar">
        <button id="tabCalc" class="active" onclick="switchTab('calc')">calc / clamp</button>
        <button id="tabTransform" onclick="switchTab('transform')">Transform</button>
        <button id="tabColor" onclick="switchTab('color')">Color</button>
      </div>

      <div id="calcControls">
        <h2>Math Functions</h2>
        <div class="control-group">
          <label>Function</label>
          <select id="mathFunc" onchange="updateMath()">
            <option value="calc">calc()</option>
            <option value="min">min()</option>
            <option value="max">max()</option>
            <option value="clamp">clamp()</option>
          </select>
        </div>
        <div class="control-group">
          <label>Value 1 <span class="value" id="valM1">300</span></label>
          <input type="range" id="m1" min="100" max="500" value="300" oninput="updateMath()">
        </div>
        <div class="control-group">
          <label>Value 2 <span class="value" id="valM2">200</span></label>
          <input type="range" id="m2" min="50" max="400" value="200" oninput="updateMath()">
        </div>
        <div class="control-group">
          <label>Value 3 (clamp only) <span class="value" id="valM3">400</span></label>
          <input type="range" id="m3" min="100" max="600" value="400" oninput="updateMath()">
        </div>
      </div>

      <div id="transformControls" style="display:none">
        <h2>Transform Functions</h2>
        <div class="control-group">
          <label>Translate X <span class="value" id="valTx">0</span></label>
          <input type="range" id="tx" min="-100" max="100" value="0" oninput="updateTransform()">
        </div>
        <div class="control-group">
          <label>Translate Y <span class="value" id="valTy">0</span></label>
          <input type="range" id="ty" min="-100" max="100" value="0" oninput="updateTransform()">
        </div>
        <div class="control-group">
          <label>Scale <span class="value" id="valScale">1.0</span></label>
          <input type="range" id="scale" min="0.5" max="2" value="1" step="0.05" oninput="updateTransform()">
        </div>
        <div class="control-group">
          <label>Rotate (deg) <span class="value" id="valRotate">0</span></label>
          <input type="range" id="rotate" min="0" max="360" value="0" oninput="updateTransform()">
        </div>
        <div class="control-group">
          <label>Skew X (deg) <span class="value" id="valSkewX">0</span></label>
          <input type="range" id="skewX" min="0" max="45" value="0" oninput="updateTransform()">
        </div>
        <div class="control-group">
          <label>Skew Y (deg) <span class="value" id="valSkewY">0</span></label>
          <input type="range" id="skewY" min="0" max="45" value="0" oninput="updateTransform()">
        </div>
      </div>

      <div id="colorControls" style="display:none">
        <h2>Color Functions</h2>
        <div class="control-group">
          <label>Color Function</label>
          <select id="colorFunc" onchange="updateColor()">
            <option value="rgb">rgb()</option>
            <option value="hsl">hsl()</option>
            <option value="hwb">hwb()</option>
          </select>
        </div>
        <div class="control-group">
          <label>Hue / R <span class="value" id="valC1">200</span></label>
          <input type="range" id="c1" min="0" max="360" value="200" oninput="updateColor()">
        </div>
        <div class="control-group">
          <label>Sat / G / W <span class="value" id="valC2">70</span></label>
          <input type="range" id="c2" min="0" max="100" value="70" oninput="updateColor()">
        </div>
        <div class="control-group">
          <label>Light / B / B <span class="value" id="valC3">50</span></label>
          <input type="range" id="c3" min="0" max="100" value="50" oninput="updateColor()">
        </div>
      </div>
    </div>

    <div>
      <div class="preview-area">
        <div class="preview-box" id="previewBox">
          CSS Functions
        </div>
      </div>
      <div class="code-output" id="codeOutput">width: calc(…);</div>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      ['calc', 'transform', 'color'].forEach(t => {
        document.getElementById(t + 'Controls').style.display = t === tab ? 'block' : 'none';
        document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).className = t === tab ? 'active' : '';
      });
      if (tab === 'calc') updateMath();
      else if (tab === 'transform') updateTransform();
      else updateColor();
    }

    function updateMath() {
      const func = document.getElementById('mathFunc').value;
      const m1 = parseInt(document.getElementById('m1').value);
      const m2 = parseInt(document.getElementById('m2').value);
      const m3 = parseInt(document.getElementById('m3').value);

      document.getElementById('valM1').textContent = m1;
      document.getElementById('valM2').textContent = m2;
      document.getElementById('valM3').textContent = m3;

      const box = document.getElementById('previewBox');
      let css, label;

      switch (func) {
        case 'calc':
          css = `calc(${m1}px - ${m2}px)`;
          label = `calc(${m1}px - ${m2}px) = ${m1 - m2}px`;
          break;
        case 'min':
          css = `min(${m1}px, ${m2}px)`;
          label = `min(${m1}px, ${m2}px) = ${Math.min(m1, m2)}px`;
          break;
        case 'max':
          css = `max(${m1}px, ${m2}px)`;
          label = `max(${m1}px, ${m2}px) = ${Math.max(m1, m2)}px`;
          break;
        case 'clamp':
          css = `clamp(${m2}px, ${m1}px, ${m3}px)`;
          const clamped = Math.max(m2, Math.min(m1, m3));
          label = `clamp(${m2}px, ${m1}px, ${m3}px) = ${clamped}px`;
          break;
      }

      box.style.width = css;
      box.style.removeProperty('transform');
      box.style.removeProperty('background');
      document.getElementById('codeOutput').textContent = `width: ${css};\n/* Result: ${label} */`;
    }

    function updateTransform() {
      const tx = parseInt(document.getElementById('tx').value);
      const ty = parseInt(document.getElementById('ty').value);
      const scale = parseFloat(document.getElementById('scale').value);
      const rotate = parseInt(document.getElementById('rotate').value);
      const skewX = parseInt(document.getElementById('skewX').value);
      const skewY = parseInt(document.getElementById('skewY').value);

      document.getElementById('valTx').textContent = tx;
      document.getElementById('valTy').textContent = ty;
      document.getElementById('valScale').textContent = scale.toFixed(1);
      document.getElementById('valRotate').textContent = rotate;
      document.getElementById('valSkewX').textContent = skewX;
      document.getElementById('valSkewY').textContent = skewY;

      const css = `translate(${tx}px, ${ty}px) scale(${scale}) rotate(${rotate}deg) skew(${skewX}deg, ${skewY}deg)`;
      const box = document.getElementById('previewBox');
      box.style.transform = css;
      box.style.removeProperty('width');
      box.style.removeProperty('background');
      document.getElementById('codeOutput').textContent = `transform: ${css};`;
    }

    function updateColor() {
      const func = document.getElementById('colorFunc').value;
      const c1 = parseInt(document.getElementById('c1').value);
      const c2 = parseInt(document.getElementById('c2').value);
      const c3 = parseInt(document.getElementById('c3').value);

      document.getElementById('valC1').textContent = c1;
      document.getElementById('valC2').textContent = c2;
      document.getElementById('valC3').textContent = c3;

      const box = document.getElementById('previewBox');
      let css, label;

      switch (func) {
        case 'rgb':
          css = `rgb(${c1}, ${c2}, ${c3})`;
          label = css;
          break;
        case 'hsl':
          css = `hsl(${c1}, ${c2}%, ${c3}%)`;
          label = css;
          break;
        case 'hwb':
          css = `hwb(${c1} ${c2}% ${100 - c3}%)`;
          label = css;
          break;
      }

      box.style.background = css;
      box.style.removeProperty('width');
      box.style.removeProperty('transform');
      document.getElementById('codeOutput').textContent = `background: ${label};`;
    }

    updateMath();
  </script>
</body>
</html>
