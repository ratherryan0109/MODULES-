<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Navigation Playground</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Courier New', monospace; background: #0f172a; color: #e2e8f0; padding: 1rem; }
    .container { max-width: 1400px; margin: 0 auto; }
    h1 { color: #38bdf8; margin-bottom: 1rem; }
    .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; height: calc(100vh - 80px); }
    @media (max-width: 800px) { .layout { grid-template-columns: 1fr; } }
    .panel { background: #1e293b; border: 1px solid #334155; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
    .panel h2 { background: #334155; padding: 0.5rem 1rem; font-size: 0.8rem; color: #94a3b8; margin: 0; }
    textarea { width: 100%; flex: 1; min-height: 150px; background: #1e293b; color: #e2e8f0; border: none; padding: 1rem; font-family: 'Courier New', monospace; font-size: 0.85rem; resize: vertical; }
    textarea:focus { outline: none; }
    .preview-area { background: white; flex: 1; overflow: auto; padding-bottom: 60px; }
    .controls { display: flex; gap: 0.5rem; padding: 0.5rem 1rem; background: #1e293b; border-top: 1px solid #334155; flex-wrap: wrap; align-items: center; }
    .controls button, .controls label { background: #334155; color: #e2e8f0; border: 1px solid #475569; padding: 0.3rem 0.6rem; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
    .nav-presets { display: flex; gap: 0.25rem; flex-wrap: wrap; }
    .nav-presets button { font-size: 0.65rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1> Responsive Navigation Playground</h1>
    <div class="layout">
      <div style="display:flex;flex-direction:column;gap:1rem;">
        <div class="panel">
          <h2>HTML</h2>
          <textarea id="htmlInput">&lt;nav class="nav"&gt;
  &lt;a href="#" class="logo"&gt;Logo&lt;/a&gt;
  &lt;input type="checkbox" id="menu-toggle" class="menu-toggle"&gt;
  &lt;label for="menu-toggle" class="menu-icon"&gt;☰&lt;/label&gt;
  &lt;ul class="nav-links"&gt;
    &lt;li&gt;&lt;a href="#" class="active"&gt;Home&lt;/a&gt;&lt;/li&gt;
    &lt;li&gt;&lt;a href="#"&gt;About&lt;/a&gt;&lt;/li&gt;
    &lt;li&gt;&lt;a href="#"&gt;Services&lt;/a&gt;&lt;/li&gt;
    &lt;li&gt;&lt;a href="#"&gt;Portfolio&lt;/a&gt;&lt;/li&gt;
    &lt;li&gt;&lt;a href="#"&gt;Contact&lt;/a&gt;&lt;/li&gt;
  &lt;/ul&gt;
&lt;/nav&gt;
&lt;div class="content"&gt;
  &lt;h1&gt;Page Content&lt;/h1&gt;
  &lt;p&gt;Resize the preview or use the presets below to see the navigation respond.&lt;/p&gt;
&lt;/div&gt;</textarea>
        </div>
        <div class="panel">
          <h2>CSS</h2>
          <textarea id="cssInput">* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; min-height: 100vh; }

/* Navigation styles */
.nav {
  display: flex;
  align-items: center;
  background: #1e293b;
  padding: 0 1rem;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  color: white;
  font-weight: bold;
  text-decoration: none;
  font-size: 1.25rem;
}

.nav-links {
  display: flex;
  list-style: none;
  margin-left: auto;
  gap: 0;
}

.nav-links a {
  display: block;
  padding: 1rem;
  color: #94a3b8;
  text-decoration: none;
}

.nav-links a:hover,
.nav-links a.active {
  color: white;
  background: #334155;
}

.menu-toggle { display: none; }
.menu-icon { display: none; }

/* Mobile styles */
@media (max-width: 767px) {
  .menu-icon {
    display: block;
    color: white;
    font-size: 1.5rem;
    cursor: pointer;
    padding: 1rem;
    margin-left: auto;
    user-select: none;
  }

  .nav-links {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    flex-direction: column;
    background: #1e293b;
  }

  .menu-toggle:checked ~ .nav-links {
    display: flex;
  }

  .nav-links a {
    border-top: 1px solid #334155;
  }
}

/* Page content */
.content {
  padding: 2rem;
  color: #1e293b;
}</textarea>
        </div>
      </div>
      <div class="panel">
        <h2>Preview</h2>
        <div class="controls">
          <div class="nav-presets">
            <button onclick="setPreviewWidth('100%')"> Fluid</button>
            <button onclick="setPreviewWidth('375px')"> 375px</button>
            <button onclick="setPreviewWidth('640px')"> 640px</button>
            <button onclick="setPreviewWidth('768px')"> 768px</button>
            <button onclick="setPreviewWidth('1024px')"> 1024px</button>
          </div>
          <span style="font-size:0.75rem;color:#64748b;margin-left:auto;" id="widthLabel">Fluid</span>
        </div>
        <div class="preview-area" id="previewArea"></div>
        <div class="controls">
          <button onclick="render()"> Render</button>
          <label><input type="checkbox" id="liveCheck" checked> Live</label>
        </div>
      </div>
    </div>
  </div>
  <script>
    const htmlInput = document.getElementById('htmlInput');
    const cssInput = document.getElementById('cssInput');
    const preview = document.getElementById('previewArea');

    function render() {
      preview.innerHTML = `<style>${cssInput.value}</style>${htmlInput.value}`;
    }

    function setPreviewWidth(w) {
      document.querySelectorAll('.nav-presets button').forEach(b => b.classList.remove('active'));
      if (w === '100%') {
        preview.style.width = '100%';
        preview.style.margin = '0';
        document.getElementById('widthLabel').textContent = 'Fluid';
      } else {
        preview.style.width = w;
        preview.style.margin = '0 auto';
        document.getElementById('widthLabel').textContent = w;
      }
      document.querySelector(`button[onclick*="${w}"]`).classList.add('active');
      render();
    }

    let debounce;
    function debouncedRender() {
      clearTimeout(debounce);
      debounce = setTimeout(() => {
        if (document.getElementById('liveCheck').checked) render();
      }, 300);
    }
    htmlInput.addEventListener('input', debouncedRender);
    cssInput.addEventListener('input', debouncedRender);

    setPreviewWidth('100%');
  </script>
</body>
</html>
