<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Aspect Ratio - Playground</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Courier New', monospace; background: #1e1e2e; color: #cdd6f4; padding: 1.5rem; }
    h1 { color: #89b4fa; margin-bottom: 1rem; }
    .container { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; max-width: 1400px; margin: 0 auto; }
    @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }
    .panel { background: #313244; border-radius: 12px; padding: 1.5rem; border: 1px solid #45475a; }
    .preview-panel { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 500px; }

    .control-group { margin-bottom: 1rem; }
    .control-group label { display: block; color: #a6e3a1; font-weight: 700; margin-bottom: 0.25rem; font-size: 0.85rem; }
    .control-group select, .control-group input[type="number"], .control-group input[type="text"] { width: 100%; padding: 0.5rem; border-radius: 6px; border: 1px solid #45475a; background: #181825; color: #cdd6f4; font-family: monospace; }
    .control-group input[type="range"] { width: 100%; }

    .row { display: flex; gap: 0.75rem; }
    .row > div { flex: 1; }

    #previewBox {
      background: linear-gradient(135deg, #89b4fa, #cba6f7);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1e1e2e;
      font-weight: 700;
      text-align: center;
      overflow: hidden;
      transition: all 0.3s ease;
      width: 300px;
    }

    #previewBox .content {
      padding: 16px;
      text-align: center;
    }

    .code-output { background: #181825; padding: 1rem; border-radius: 8px; margin-top: 1rem; font-family: monospace; font-size: 0.8rem; white-space: pre-wrap; border: 1px solid #45475a; max-height: 180px; overflow-y: auto; }

    button.primary { background: #89b4fa; color: #1e1e2e; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-weight: 700; margin-top: 0.5rem; width: 100%; }
    button.primary:hover { background: #b4d0fb; }

    .dimension-label { text-align: center; margin-top: 8px; font-size: 0.85rem; color: #a6e3a1; }
  </style>
</head>
<body>
  <h1>CSS Aspect Ratio Playground</h1>
  <div class="container">
    <div class="panel">
      <h2 style="color:#a6e3a1;margin-bottom:1rem;">Controls</h2>

      <div class="control-group">
        <label>Aspect Ratio</label>
        <select id="ratioSelect">
          <option value="16/9">16:9 (Widescreen)</option>
          <option value="4/3">4:3 (Standard)</option>
          <option value="1">1:1 (Square)</option>
          <option value="2/1">2:1 (Panoramic)</option>
          <option value="3/4">3:4 (Portrait)</option>
          <option value="9/16">9:16 (Vertical)</option>
          <option value="21/9">21:9 (Ultrawide)</option>
          <option value="auto" selected>auto (Intrinsic)</option>
        </select>
      </div>

      <div class="control-group">
        <label>Width (px)</label>
        <input type="range" id="widthRange" min="100" max="600" value="300">
        <span id="widthVal">300px</span>
      </div>

      <div class="control-group">
        <label>Object Fit</label>
        <select id="objectFitSelect">
          <option value="fill">fill (stretch)</option>
          <option value="cover" selected>cover (crop)</option>
          <option value="contain">contain (fit)</option>
          <option value="none">none (original)</option>
        </select>
      </div>

      <div class="control-group">
        <label>Content Type</label>
        <select id="contentType">
          <option value="gradient">Gradient</option>
          <option value="text">Text Content</option>
          <option value="image">Image Placeholder</option>
        </select>
      </div>

      <div class="row">
        <div class="control-group">
          <label>Border Radius (px)</label>
          <input type="range" id="radius" min="0" max="50" value="12">
          <span id="radiusVal">12px</span>
        </div>
      </div>

      <button class="primary" id="resetBtn">Reset to Defaults</button>
    </div>
    <div class="panel preview-panel">
      <div id="previewBox">
        <div class="content" id="previewContent">
          300px × 300px<br>
          <span style="font-size:0.75rem;font-weight:400;">aspect-ratio: auto</span>
        </div>
      </div>
      <div class="dimension-label" id="dimLabel">300px × 300px</div>
    </div>
  </div>
  <div class="code-output" id="codeOutput">/* CSS generated by controls */</div>

  <script>
    const box = document.getElementById('previewBox');
    const content = document.getElementById('previewContent');
    const dimLabel = document.getElementById('dimLabel');
    const ratioSelect = document.getElementById('ratioSelect');
    const widthRange = document.getElementById('widthRange');
    const widthVal = document.getElementById('widthVal');
    const objectFitSelect = document.getElementById('objectFitSelect');
    const contentType = document.getElementById('contentType');
    const radius = document.getElementById('radius');
    const radiusVal = document.getElementById('radiusVal');
    const codeOutput = document.getElementById('codeOutput');
    const resetBtn = document.getElementById('resetBtn');

    function update() {
      const ratio = ratioSelect.value;
      const w = parseInt(widthRange.value);
      const of = objectFitSelect.value;
      const ct = contentType.value;
      const r = radius.value;

      widthVal.textContent = w + 'px';
      radiusVal.textContent = r + 'px';

      box.style.width = w + 'px';
      box.style.aspectRatio = ratio;
      box.style.objectFit = of;
      box.style.borderRadius = r + 'px';

      // Calculate displayed dimensions
      let displayW = w;
      let displayH = w;

      if (ratio === 'auto') {
        // For auto, use content-based sizing
        if (ct === 'text') {
          displayH = 120; // approximate text height
        } else if (ct === 'image') {
          displayH = Math.round(w * 3/4); // simulate 4:3 image
        } else {
          displayH = w;
        }
      } else {
        const parts = ratio.split('/');
        const ratioW = parseFloat(parts[0]);
        const ratioH = parts.length > 1 ? parseFloat(parts[1]) : 1;
        displayH = w / (ratioW / ratioH);
      }

      dimLabel.textContent = `${Math.round(displayW)}px × ${Math.round(displayH)}px`;

      // Update content
      let innerHtml = '';
      if (ct === 'gradient') {
        box.style.background = 'linear-gradient(135deg, #89b4fa, #cba6f7)';
        innerHtml = `${Math.round(displayW)}×${Math.round(displayH)}<br><span style="font-size:0.75rem;font-weight:400;">aspect-ratio: ${ratio === 'auto' ? 'auto' : ratio}</span>`;
      } else if (ct === 'text') {
        box.style.background = '#45475a';
        innerHtml = 'Hello World!<br>This text wraps within<br>the aspect-ratio box.';
      } else {
        box.style.background = 'linear-gradient(135deg, #f38ba8, #fab387)';
        innerHtml = `IMG<br><span style="font-size:0.75rem;">${Math.round(displayW)}×${Math.round(displayH)}</span>`;
      }
      content.innerHTML = innerHtml;

      const lines = [
        `.element {`,
        `  width: ${w}px;`,
        `  aspect-ratio: ${ratio === 'auto' ? 'auto' : ratio};`,
        ct !== 'gradient' ? `  object-fit: ${of};` : '',
        `  border-radius: ${r}px;`,
        `}`,
        ``,
        `/* Result: ${Math.round(displayW)}px × ${Math.round(displayH)}px */`
      ];
      codeOutput.textContent = lines.filter(l => l !== '').join('\n');
    }

    [ratioSelect, widthRange, objectFitSelect, contentType, radius].forEach(el => el.addEventListener('input', update));

    resetBtn.addEventListener('click', () => {
      ratioSelect.value = 'auto';
      widthRange.value = '300';
      objectFitSelect.value = 'cover';
      contentType.value = 'gradient';
      radius.value = '12';
      update();
    });

    update();
  </script>
</body>
</html>
