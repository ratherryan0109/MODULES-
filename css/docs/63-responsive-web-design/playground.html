<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Design Playground</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Courier New', monospace; background: #0f172a; color: #e2e8f0; padding: 1rem; }
    .container { max-width: 1400px; margin: 0 auto; }
    h1 { color: #38bdf8; margin-bottom: 1rem; }
    .playground-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 900px) { .playground-layout { grid-template-columns: 1fr; } }
    .editor-panel { background: #1e293b; border: 1px solid #334155; border-radius: 8px; overflow: hidden; }
    .editor-panel h2 { background: #334155; padding: 0.5rem 1rem; font-size: 0.85rem; color: #94a3b8; }
    .editor-panel textarea { width: 100%; min-height: 400px; background: #1e293b; color: #e2e8f0; border: none; padding: 1rem; font-family: 'Courier New', monospace; font-size: 0.9rem; resize: vertical; }
    .editor-panel textarea:focus { outline: none; }
    .preview-panel { background: white; border-radius: 8px; overflow: hidden; }
    .preview-bar { background: #334155; padding: 0.5rem 1rem; display: flex; gap: 0.5rem; align-items: center; }
    .preview-bar span { font-size: 0.8rem; color: #94a3b8; }
    .preview-bar .dot { width: 10px; height: 10px; border-radius: 50%; }
    .preview-bar .dot.r { background: #ef4444; }
    .preview-bar .dot.y { background: #eab308; }
    .preview-bar .dot.g { background: #22c55e; }
    #preview { width: 100%; min-height: 400px; border: none; }
    .controls { display: flex; gap: 0.5rem; padding: 0.5rem 1rem; background: #1e293b; flex-wrap: wrap; }
    .controls button, .controls select { background: #334155; color: #e2e8f0; border: 1px solid #475569; padding: 0.4rem 0.8rem; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
    .controls button:hover { background: #475569; }
    .controls select { background: #334155; }
    .viewports { display: flex; gap: 0.25rem; }
    body.responsive { }
  </style>
</head>
<body>
  <div class="container">
    <h1> CSS Responsive Design Playground</h1>
    <div class="playground-layout">
      <div class="editor-panel">
        <h2>HTML</h2>
        <textarea id="htmlInput" placeholder="Write HTML here...">&lt;div class="container"&gt;
  &lt;header&gt;My Responsive Page&lt;/header&gt;
  &lt;main&gt;
    &lt;div class="card"&gt;Card 1&lt;/div&gt;
    &lt;div class="card"&gt;Card 2&lt;/div&gt;
    &lt;div class="card"&gt;Card 3&lt;/div&gt;
  &lt;/main&gt;
  &lt;footer&gt;Footer Content&lt;/footer&gt;
&lt;/div&gt;</textarea>
      </div>
      <div>
        <div class="editor-panel" style="margin-bottom:1rem;">
          <h2>CSS</h2>
          <textarea id="cssInput" placeholder="Write CSS here...">body { margin: 0; padding: 1rem; font-family: system-ui; }
.container { max-width: 1200px; margin: 0 auto; }
header { background: #3b82f6; color: white; padding: 2rem; text-align: center; border-radius: 8px; margin-bottom: 1rem; font-size: 1.5rem; font-weight: bold; }
main { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1rem; }
.card { background: #f1f5f9; padding: 2rem; text-align: center; border-radius: 8px; font-size: 1.2rem; color: #334155; }
footer { background: #1e293b; color: white; padding: 1rem; text-align: center; border-radius: 8px; }</textarea>
        </div>
        <div class="preview-panel">
          <div class="preview-bar">
            <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
            <span style="margin-left:0.5rem;">Preview</span>
            <div style="margin-left:auto;" class="viewports">
              <button onclick="setWidth('100%')">Fluid</button>
              <button onclick="setWidth('375px')"> 375px</button>
              <button onclick="setWidth('768px')"> 768px</button>
              <button onclick="setWidth('1024px')"> 1024px</button>
              <button onclick="setWidth('1440px')"> 1440px</button>
            </div>
          </div>
          <div id="preview" style="overflow:auto;"></div>
        </div>
      </div>
    </div>
    <div class="controls">
      <button onclick="runCode()"> Run</button>
      <button onclick="resetCode()">Reset</button>
      <label style="color:#94a3b8;font-size:0.8rem;display:flex;align-items:center;gap:0.5rem;">
        <input type="checkbox" id="livePreview" checked> Live Preview
      </label>
    </div>
  </div>
  <script>
    const htmlInput = document.getElementById('htmlInput');
    const cssInput = document.getElementById('cssInput');
    const preview = document.getElementById('preview');

    function runCode() {
      const html = htmlInput.value;
      const css = cssInput.value;
      preview.innerHTML = `<style>${css}</style>${html}`;
    }

    function resetCode() {
      htmlInput.value = `\x3C!-- Write HTML here --\x3E\n\x3Cdiv class="container"\x3E\n  \x3Cheader\x3EMy Responsive Page\x3C/header\x3E\n  \x3Cmain\x3E\n    \x3Cdiv class="card"\x3ECard 1\x3C/div\x3E\n    \x3Cdiv class="card"\x3ECard 2\x3C/div\x3E\n    \x3Cdiv class="card"\x3ECard 3\x3C/div\x3E\n  \x3C/main\x3E\n  \x3Cfooter\x3EFooter Content\x3C/footer\x3E\n\x3C/div\x3E`;
      cssInput.value = `body { margin: 0; padding: 1rem; font-family: system-ui; }\n.container { max-width: 1200px; margin: 0 auto; }\nheader { background: #3b82f6; color: white; padding: 2rem; text-align: center; border-radius: 8px; margin-bottom: 1rem; font-size: 1.5rem; font-weight: bold; }\nmain { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1rem; }\n.card { background: #f1f5f9; padding: 2rem; text-align: center; border-radius: 8px; font-size: 1.2rem; color: #334155; }\nfooter { background: #1e293b; color: white; padding: 1rem; text-align: center; border-radius: 8px; }`;
      runCode();
    }

    function setWidth(width) {
      if (width === '100%') {
        preview.style.width = '100%';
      } else {
        preview.style.width = width;
        preview.style.borderRight = '1px solid #e2e8f0';
      }
    }

    // Auto-run on input change with debounce
    let debounceTimer;
    function debouncedRun() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        if (document.getElementById('livePreview').checked) runCode();
      }, 300);
    }
    htmlInput.addEventListener('input', debouncedRun);
    cssInput.addEventListener('input', debouncedRun);

    // Initial run
    runCode();
  </script>
</body>
</html>
