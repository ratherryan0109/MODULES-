<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Flex Grow Playground</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#eee;padding:20px}
h1{color:#ff6b6b}.subtitle{color:#aaa;margin-bottom:20px}
.layout{display:flex;gap:20px}
.controls{flex:0 0 250px;background:#16213e;padding:20px;border-radius:10px}
.preview{flex:1;background:#16213e;padding:20px;border-radius:10px}
.group{margin-bottom:15px}
.group label{display:block;color:#aaa;font-size:13px;margin-bottom:4px}
.group input[type=range]{width:100%}
#container{display:flex;min-height:100px;background:#2d2d44;border-radius:8px;padding:10px;transition:all .3s}
.item{background:#ff6b6b;padding:20px;border-radius:4px;min-width:50px;text-align:center;transition:all .3s}
.item:nth-child(2){background:#4ecdc4}.item:nth-child(3){background:#45b7d1}
.item:nth-child(4){background:#ffd93d;color:#333}
#code{margin-top:15px;background:#1a1a2e;padding:15px;border-radius:8px;font-family:monospace;font-size:13px;color:#a8e6cf}
</style>
</head>
<body>
<h1>📈 Flex Grow Playground</h1>
<p class="subtitle">Adjust grow values to see proportional distribution</p>
<div class="layout">
<div class="controls">
<h3>Item flex-grow values</h3>
<div class="group"><label>Item 1</label><input type="range" id="g1" min="0" max="5" value="1"></div>
<div class="group"><label>Item 2</label><input type="range" id="g2" min="0" max="5" value="1"></div>
<div class="group"><label>Item 3</label><input type="range" id="g3" min="0" max="5" value="1"></div>
<div class="group"><label>Item 4</label><input type="range" id="g4" min="0" max="5" value="1"></div>
<div class="group"><label>Container Width</label><input type="range" id="width" min="300" max="900" value="600"></div>
<button onclick="reset()" style="background:#6c5ce7;color:#fff;border:none;padding:8px;border-radius:4px;cursor:pointer;width:100%;margin-top:10px">Reset (all 1)</button>
</div>
<div class="preview">
<div id="container"><div class="item" id="i1">1</div><div class="item" id="i2">2</div><div class="item" id="i3">3</div><div class="item" id="i4">4</div></div>
<div id="code">flex-grow: 1, 1, 1, 1</div>
</div>
</div>
<script>
const c=document.getElementById('container'),code=document.getElementById('code');
const items=[document.getElementById('i1'),document.getElementById('i2'),document.getElementById('i3'),document.getElementById('i4')];
document.querySelectorAll('input').forEach(el=>el.addEventListener('input',update));
function update(){
const vals=[document.getElementById('g1').value,document.getElementById('g2').value,document.getElementById('g3').value,document.getElementById('g4').value];
const w=document.getElementById('width').value;
c.style.width=w+'px';
items.forEach((item,i)=>{item.style.flex=`${vals[i]} 1 0`;});
code.textContent=`flex-grow: ${vals.join(', ')};\nflex: ${vals.map(v=>`${v} 1 0`).join(', ')};`;
}
function reset(){['g1','g2','g3','g4'].forEach(id=>document.getElementById(id).value=1);update()}
update();
</script>
</body>
</html>
