<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Playground - SaaS Website</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',sans-serif;background:#1e293b;color:#fff;height:100vh;display:flex;flex-direction:column}.toolbar{background:#0f172a;padding:.5rem 1rem;display:flex;align-items:center;gap:1rem;border-bottom:1px solid #334155}.toolbar h2{font-size:1rem}.toolbar button,.toolbar select{background:#334155;color:#fff;border:none;padding:.4rem .8rem;border-radius:4px;cursor:pointer}.main-split{display:flex;flex:1;overflow:hidden}.editor-pane{flex:1;display:flex;flex-direction:column;border-right:1px solid #334155}.preview-pane{flex:1}iframe{width:100%;height:100%;border:none}textarea{width:100%;flex:1;background:#1e293b;color:#e2e8f0;border:none;padding:1rem;font-family:'Consolas',monospace;font-size:.875rem;resize:none;outline:none}.tabs{display:flex;background:#0f172a;border-bottom:1px solid #334155}.tabs button{background:transparent;color:#94a3b8;border:none;padding:.5rem 1rem;cursor:pointer;border-bottom:2px solid transparent}.tabs button.active{color:#fff;border-bottom-color:#6366f1}@media(max-width:768px){.main-split{flex-direction:column}}</style></head>
<body>
<div class="toolbar"><h2>SaaS Playground</h2><select id="vs"><option value="100%">Responsive</option><option value="375px">Mobile</option><option value="768px">Tablet</option></select><button id="run">&#9654; Run</button><button id="reset">&#8635; Reset</button></div>
<div class="main-split"><div class="editor-pane"><div class="tabs"><button class="active" data-tab="html">HTML</button><button data-tab="css">CSS</button></div>
<textarea id="html"><div style="padding:4rem 2rem;font-family:sans-serif;background:linear-gradient(135deg,#eef2ff,#f0fdfa)">
  <h1 style="font-size:3rem;font-weight:800;color:#0f172a">Scale Your Business</h1>
  <p style="color:#475569;max-width:450px;margin:1rem 0">All-in-one platform for modern teams. Automate workflows and grow faster.</p>
  <div style="display:flex;gap:1rem"><a href="#" style="background:#6366f1;color:white;padding:.75rem 1.75rem;border-radius:8px;text-decoration:none;font-weight:600">Start Free Trial</a></div>
</div></textarea>
<textarea id="css">body{margin:0;font-family:'Inter',sans-serif;background:#f8fafc}</textarea>
</div><div class="preview-pane"><iframe id="preview"></iframe></div></div>
<script>
  const h=document.getElementById('html'),c=document.getElementById('css'),p=document.getElementById('preview'),vs=document.getElementById('vs'),r=document.getElementById('run'),rs=document.getElementById('reset'),tb=document.querySelectorAll('[data-tab]');
  function render(){const d='<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"><style>*,*::before,*::after{box-sizing:border-box}'+c.value+'</style></head><body>'+h.value+'</body></html>';p.src='data:text/html;charset=utf-8,'+encodeURIComponent(d)}
  function reset(){h.value='<div style="padding:4rem 2rem;font-family:sans-serif;background:linear-gradient(135deg,#eef2ff,#f0fdfa)">\n  <h1 style="font-size:3rem;font-weight:800;color:#0f172a">Scale Your Business</h1>\n  <p style="color:#475569;max-width:450px;margin:1rem 0">All-in-one platform for modern teams. Automate workflows and grow faster.</p>\n  <div style="display:flex;gap:1rem"><a href="#" style="background:#6366f1;color:white;padding:.75rem 1.75rem;border-radius:8px;text-decoration:none;font-weight:600">Start Free Trial</a></div>\n</div>';c.value='body{margin:0;font-family:\'Inter\',sans-serif;background:#f8fafc}';render()}
  vs.addEventListener('change',()=>{p.style.width=vs.value;p.style.margin=vs.value==='100%'?'0':'0 auto'});r.addEventListener('click',render);rs.addEventListener('click',reset);
  tb.forEach(b=>{b.addEventListener('click',()=>{tb.forEach(x=>x.classList.remove('active'));b.classList.add('active');document.querySelectorAll('.editor-pane textarea').forEach(t=>t.style.display='none');if(b.dataset.tab==='html')h.style.display='block';if(b.dataset.tab==='css')c.style.display='block'})});h.style.display='block';c.style.display='none';render();
</script></body></html>
