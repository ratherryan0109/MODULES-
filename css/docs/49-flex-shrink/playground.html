<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Flex Shrink Playground</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#eee;padding:20px}
h1{color:#ff6b6b}.subtitle{color:#aaa;margin-bottom:20px}
.layout{display:flex;gap:20px}
.controls{flex:0 0 250px;background:#16213e;padding:20px;border-radius:10px}
.preview{flex:1;background:#16213e;padding:20px;border-radius:10px}
.group{margin-bottom:15px}
.group label{display:block;color:#aaa;font-size:13px;margin-bottom:4px}
.group input{width:100%}
#container{display:flex;min-height:80px;background:#2d2d44;border-radius:8px;padding:10px;transition:all .3s;overflow:hidden}
.item{background:#ff6b6b;padding:15px;border-radius:4px;text-align:center;flex-basis:200px;transition:all .3s}
.item:nth-child(2){background:#4ecdc4}.item:nth-child(3){background:#45b7d1}
#code{margin-top:15px;background:#1a1a2e;padding:15px;border-radius:8px;font-family:monospace;color:#a8e6cf}
</style>
</head>
<body>
<h1>📉 Flex Shrink Playground</h1>
<p class="subtitle">Adjust shrink values (basis: 200px each, 3 items)</p>
<div class="layout">
<div class="controls">
<div class="group"><label>Item 1 - shrink</label><input type="range" id="s1" min="0" max="5" value="1"></div>
<div class="group"><label>Item 2 - shrink</label><input type="range" id="s2" min="0" max="5" value="1"></div>
<div class="group"><label>Item 3 - shrink</label><input type="range" id="s3" min="0" max="5" value="1"></div>
<div class="group"><label>Container Width</label><input type="range" id="width" min="200" max="700" value="400"></div>
</div>
<div class="preview">
<div id="container"><div class="item" id="i1">1</div><div class="item" id="i2">2</div><div class="item" id="i3">3</div></div>
<div id="code">flex-shrink: 1, 1, 1 | Width: 400px</div>
</div>
</div>
<script>
const items=[document.getElementById('i1'),document.getElementById('i2'),document.getElementById('i3')];
document.querySelectorAll('input').forEach(el=>el.addEventListener('input',update));
function update(){
const vals=[document.getElementById('s1').value,document.getElementById('s2').value,document.getElementById('s3').value];
const w=document.getElementById('width').value;
document.getElementById('container').style.width=w+'px';
items.forEach((item,i)=>{item.style.flex=`0 ${vals[i]} 200px`;});
document.getElementById('code').textContent=`flex-shrink: ${vals.join(', ')} | Width: ${w}px`;
}
update();
</script>
</body>
</html>
