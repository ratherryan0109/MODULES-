<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BEM Playground</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 1000px; margin: 0 auto; padding: 2rem; }
    h1 { margin-bottom: 1rem; }
    .editor-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin: 1rem 0; }
    textarea { width: 100%; height: 300px; padding: 1rem; border: 2px solid #ddd; border-radius: 8px; font-family: monospace; font-size: 14px; resize: vertical; }
    .preview { border: 2px solid #ddd; border-radius: 8px; padding: 1.5rem; min-height: 200px; margin: 1rem 0; }
    .controls { display: flex; gap: 0.5rem; margin: 1rem 0; }
    button { padding: 0.5rem 1.5rem; border: none; border-radius: 6px; cursor: pointer; background: #0055CC; color: white; font-weight: 600; }
    .bem-validator { background: #f0f0f0; padding: 1rem; border-radius: 8px; font-family: monospace; font-size: 0.85rem; margin: 1rem 0; }
    .valid { color: green; }
    .invalid { color: red; }
  </style>
</head>
<body>
  <h1>BEM Playground</h1>
  <p>Write BEM HTML/CSS and validate the naming.</p>

  <div class="editor-panel">
    <div><label>HTML (use BEM classes):</label><textarea id="htmlInput"><div class="card card--featured">
  <h2 class="card__title">Card Title</h2>
  <p class="card__body">Card body content goes here.</p>
  <button class="btn btn--primary">Action</button>
</div></textarea></div>
    <div><label>CSS (BEM classes):</label><textarea id="cssInput">.card { border: 1px solid #ddd; border-radius: 8px; padding: 1.5rem; }
.card--featured { border-color: #0055CC; }
.card__title { font-size: 1.25rem; margin-bottom: 0.5rem; }
.card__body { color: #666; }
.btn { display: inline-flex; padding: 0.5rem 1rem; border: none; border-radius: 6px; cursor: pointer; background: #0055CC; color: white; }</textarea></div>
  </div>

  <div class="controls">
    <button onclick="updatePreview()">Update</button>
    <button onclick="validateBEM()">Validate BEM</button>
  </div>

  <div class="bem-validator" id="validatorOutput">BEM validation results will appear here.</div>
  <div class="preview" id="preview"></div>

  <script>
    const htmlInput = document.getElementById('htmlInput');
    const cssInput = document.getElementById('cssInput');
    const preview = document.getElementById('preview');
    const validatorOutput = document.getElementById('validatorOutput');

    function updatePreview() {
      preview.innerHTML = `<style>${cssInput.value}</style>${htmlInput.value}`;
    }

    function validateBEM() {
      const classes = [
        ...htmlInput.value.matchAll(/class="([^"]+)"/g)
      ].flatMap(m => m[1].split(/\s+/)).filter(Boolean);

      const unique = [...new Set(classes)];
      const valid = [];
      const invalid = [];

      unique.forEach(cls => {
        // BEM pattern: block__element--modifier
        if (/^[a-z][a-z0-9]*((-{1,2})?[a-z0-9]+)*(__[a-z][a-z0-9]*((-{1,2})?[a-z0-9]+)*)?(--[a-z][a-z0-9]*((-{1,2})?[a-z0-9]+)*)?$/.test(cls)) {
          valid.push(cls);
        } else {
          invalid.push(cls);
        }
      });

      let html = '<strong>BEM Validation:</strong><br>';
      if (valid.length) html += `<span class="valid">✅ Valid: ${valid.join(', ')}</span><br>`;
      if (invalid.length) html += `<span class="invalid">❌ Invalid: ${invalid.join(', ')}</span><br>`;
      html += `<br>💡 BEM pattern: .block__element--modifier`;
      validatorOutput.innerHTML = html;
    }

    cssInput.addEventListener('input', updatePreview);
    htmlInput.addEventListener('input', updatePreview);
    updatePreview();
  </script>
</body>
</html>
