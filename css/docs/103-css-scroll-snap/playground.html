<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Scroll Snap - Playground</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Courier New', monospace; background: #1e1e2e; color: #cdd6f4; padding: 1.5rem; }
    h1 { color: #89b4fa; margin-bottom: 1rem; }
    .layout { display: grid; grid-template-columns: 320px 1fr; gap: 1.5rem; max-width: 1400px; margin: 0 auto; }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }
    .panel { background: #313244; border-radius: 12px; padding: 1.5rem; border: 1px solid #45475a; }
    .preview-panel { min-height: 500px; }

    .control-group { margin-bottom: 0.75rem; }
    .control-group label { display: block; color: #a6e3a1; font-weight: 700; margin-bottom: 0.25rem; font-size: 0.85rem; }
    .control-group select, .control-group input[type="number"] { width: 100%; padding: 0.4rem; border-radius: 6px; border: 1px solid #45475a; background: #181825; color: #cdd6f4; font-family: monospace; }
    .control-group input[type="range"] { width: 100%; }

    .scroll-container {
      display: flex;
      overflow-x: auto;
      overflow-y: hidden;
      border-radius: 8px;
      background: #181825;
      height: 400px;
      gap: 0;
      -webkit-overflow-scrolling: touch;
    }

    .scroll-item {
      flex: 0 0 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: white;
      transition: all 0.2s;
    }

    .scroll-item:nth-child(1) { background: linear-gradient(135deg, #667eea, #764ba2); }
    .scroll-item:nth-child(2) { background: linear-gradient(135deg, #f093fb, #f5576c); }
    .scroll-item:nth-child(3) { background: linear-gradient(135deg, #4facfe, #00f2fe); }
    .scroll-item:nth-child(4) { background: linear-gradient(135deg, #43e97b, #38f9d7); }
    .scroll-item:nth-child(5) { background: linear-gradient(135deg, #fa709a, #fee140); }
    .scroll-item:nth-child(6) { background: linear-gradient(135deg, #a18cd1, #fbc2eb); }

    .code-output { background: #181825; padding: 1rem; border-radius: 8px; margin-top: 1rem; font-family: monospace; font-size: 0.8rem; white-space: pre-wrap; border: 1px solid #45475a; max-height: 180px; overflow-y: auto; }

    button.primary { background: #89b4fa; color: #1e1e2e; border: none; padding: 0.5rem; border-radius: 6px; cursor: pointer; font-weight: 700; width: 100%; margin-top: 0.5rem; }
    button.primary:hover { background: #b4d0fb; }

    .counter { text-align: center; margin-top: 8px; color: #a6e3a1; font-size: 0.85rem; }
  </style>
</head>
<body>
  <h1>CSS Scroll Snap Playground</h1>
  <div class="layout">
    <div class="panel">
      <h2 style="color:#a6e3a1;margin-bottom:1rem;">Controls</h2>

      <div class="control-group">
        <label>Snap Type (axis)</label>
        <select id="snapAxis">
          <option value="x">X (horizontal)</option>
          <option value="y">Y (vertical)</option>
          <option value="both">Both</option>
          <option value="inline">Inline</option>
          <option value="block">Block</option>
        </select>
      </div>

      <div class="control-group">
        <label>Strictness</label>
        <select id="snapStrictness">
          <option value="mandatory">mandatory (always snap)</option>
          <option value="proximity" selected>proximity (snap when near)</option>
        </select>
      </div>

      <div class="control-group">
        <label>Snap Alignment</label>
        <select id="snapAlign">
          <option value="start">start</option>
          <option value="center">center</option>
          <option value="end">end</option>
        </select>
      </div>

      <div class="control-group">
        <label>scroll-padding (px)</label>
        <input type="range" id="scrollPadding" min="0" max="100" value="0">
        <span id="padVal">0px</span>
      </div>

      <div class="control-group">
        <label>Item Width (% of container)</label>
        <input type="range" id="itemWidth" min="50" max="100" step="5" value="100">
        <span id="widthVal">100%</span>
      </div>

      <div class="control-group">
        <label>Number of Items</label>
        <input type="range" id="itemCount" min="2" max="12" value="6">
        <span id="countVal">6</span>
      </div>

      <button class="primary" id="resetBtn">Reset to Defaults</button>
    </div>
    <div class="panel preview-panel">
      <div class="scroll-container" id="scrollContainer"></div>
      <div class="counter" id="itemCounter">Item 1 of 6</div>
      <div class="code-output" id="codeOutput">/* CSS generated by controls */</div>
    </div>
  </div>

  <script>
    const container = document.getElementById('scrollContainer');
    const snapAxis = document.getElementById('snapAxis');
    const snapStrictness = document.getElementById('snapStrictness');
    const snapAlign = document.getElementById('snapAlign');
    const scrollPadding = document.getElementById('scrollPadding');
    const padVal = document.getElementById('padVal');
    const itemWidth = document.getElementById('itemWidth');
    const widthVal = document.getElementById('widthVal');
    const itemCount = document.getElementById('itemCount');
    const countVal = document.getElementById('countVal');
    const itemCounter = document.getElementById('itemCounter');
    const codeOutput = document.getElementById('codeOutput');
    const resetBtn = document.getElementById('resetBtn');

    const gradients = [
      'linear-gradient(135deg, #667eea, #764ba2)',
      'linear-gradient(135deg, #f093fb, #f5576c)',
      'linear-gradient(135deg, #4facfe, #00f2fe)',
      'linear-gradient(135deg, #43e97b, #38f9d7)',
      'linear-gradient(135deg, #fa709a, #fee140)',
      'linear-gradient(135deg, #a18cd1, #fbc2eb)',
      'linear-gradient(135deg, #fccb90, #d57eeb)',
      'linear-gradient(135deg, #e0c3fc, #8ec5fc)',
      'linear-gradient(135deg, #f5576c, #667eea)',
      'linear-gradient(135deg, #30cfd0, #330867)',
      'linear-gradient(135deg, #a8edea, #fed6e3)',
      'linear-gradient(135deg, #5ee7df, #b490ca)',
    ];

    function buildItems(count) {
      container.innerHTML = '';
      for (let i = 0; i < count; i++) {
        const item = document.createElement('div');
        item.className = 'scroll-item';
        item.textContent = `Item ${i + 1}`;
        item.style.background = gradients[i % gradients.length];
        item.style.flex = `0 0 ${itemWidth.value}%`;
        container.appendChild(item);
      }
    }

    function update() {
      const axis = snapAxis.value;
      const strictness = snapStrictness.value;
      const align = snapAlign.value;
      const pad = scrollPadding.value;
      const width = itemWidth.value;
      const count = parseInt(itemCount.value);

      padVal.textContent = pad + 'px';
      widthVal.textContent = width + '%';
      countVal.textContent = count;

      container.style.scrollSnapType = `${axis} ${strictness}`;
      container.style.scrollPadding = pad + 'px';

      // Rebuild if count or width changed
      const currentItems = container.children.length;
      if (currentItems !== count) {
        buildItems(count);
      } else {
        // Update width and alignment
        for (let item of container.children) {
          item.style.flex = `0 0 ${width}%`;
          item.style.scrollSnapAlign = align;
        }
      }

      // Always update alignment on all children
      for (let item of container.children) {
        item.style.scrollSnapAlign = align;
      }

      // Counter update on scroll
      const updateCounter = () => {
        const scrollLeft = container.scrollLeft;
        const itemW = container.scrollWidth / count;
        const idx = Math.round(scrollLeft / itemW);
        itemCounter.textContent = `Item ${Math.min(idx + 1, count)} of ${count}`;
      };
      container.removeEventListener('scroll', updateCounter);
      container.addEventListener('scroll', updateCounter);
      updateCounter();

      const lines = [
        `.scroll-container {`,
        `  overflow-x: auto;`,
        `  display: flex;`,
        `  scroll-snap-type: ${axis} ${strictness};`,
        pad !== '0' ? `  scroll-padding: ${pad}px;` : '',
        `}`,
        ``,
        `.scroll-item {`,
        `  flex: 0 0 ${width}%;`,
        `  scroll-snap-align: ${align};`,
        `}`,
        ``,
        `/* Items: ${count} · Alignment: ${align} */`
      ];
      codeOutput.textContent = lines.filter(l => l !== '').join('\n');
    }

    [snapAxis, snapStrictness, snapAlign, scrollPadding, itemWidth, itemCount].forEach(el => el.addEventListener('input', update));

    resetBtn.addEventListener('click', () => {
      snapAxis.value = 'x';
      snapStrictness.value = 'proximity';
      snapAlign.value = 'start';
      scrollPadding.value = '0';
      itemWidth.value = '100';
      itemCount.value = '6';
      buildItems(6);
      update();
    });

    // Initial build
    buildItems(6);
    update();
  </script>
</body>
</html>
