<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Playground - Pricing Page</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',sans-serif;background:#1e293b;color:#fff;height:100vh;display:flex;flex-direction:column}.toolbar{background:#0f172a;padding:.5rem 1rem;display:flex;align-items:center;gap:1rem}.toolbar h2{font-size:1rem}.toolbar button,.toolbar select{background:#334155;color:#fff;border:none;padding:.4rem .8rem;border-radius:4px;cursor:pointer}.main-split{display:flex;flex:1;overflow:hidden}.editor-pane{flex:1;display:flex;flex-direction:column;border-right:1px solid #334155}.preview-pane{flex:1;background:#f8fafc}iframe{width:100%;height:100%;border:none}textarea{width:100%;flex:1;background:#1e293b;color:#e2e8f0;border:none;padding:1rem;font-family:'Consolas',monospace;font-size:.875rem;resize:none;outline:none}.tabs{display:flex;background:#0f172a}.tabs button{background:transparent;color:#94a3b8;border:none;padding:.5rem 1rem;cursor:pointer;border-bottom:2px solid transparent}.tabs button.active{color:#fff;border-bottom-color:#6366f1}@media(max-width:768px){.main-split{flex-direction:column}}</style></head>
<body>
<div class="toolbar"><h2>Pricing Playground</h2><select id="vs"><option value="100%">Responsive</option><option value="375px">Mobile</option><option value="768px">Tablet</option></select><button id="run">&#9654; Run</button><button id="reset">&#8635; Reset</button></div>
<div class="main-split"><div class="editor-pane"><div class="tabs"><button class="active" data-tab="html">HTML</button><button data-tab="css">CSS</button></div>
<textarea id="html"><div style="padding:2rem;font-family:sans-serif;text-align:center">
  <h1 style="font-size:2rem;font-weight:800">Choose your plan</h1>
  <div style="display:inline-flex;align-items:center;gap:.75rem;margin:1.5rem 0">
    <span>Monthly</span>
    <div style="width:48px;height:24px;background:#6366f1;border-radius:12px;position:relative;cursor:pointer">
      <div style="width:20px;height:20px;background:white;border-radius:50%;position:absolute;top:2px;right:2px"></div>
    </div>
    <span>Yearly</span>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:1rem;max-width:900px;margin:0 auto">
    <div style="border:1px solid #e2e8f0;border-radius:12px;padding:2rem;background:white">
      <h3 style="font-size:1.125rem">Starter</h3>
      <p style="font-size:2.5rem;font-weight:800">$9</p>
      <button style="background:#6366f1;color:white;padding:.75rem;border:none;border-radius:8px;width:100%;font-weight:600;cursor:pointer">Get Started</button>
    </div>
    <div style="border:2px solid #6366f1;border-radius:12px;padding:2rem;background:white">
      <h3 style="font-size:1.125rem">Professional</h3>
      <p style="font-size:2.5rem;font-weight:800">$29</p>
      <button style="background:#6366f1;color:white;padding:.75rem;border:none;border-radius:8px;width:100%;font-weight:600;cursor:pointer">Get Started</button>
    </div>
  </div>
</div></textarea>
<textarea id="css">body{margin:0;font-family:'Inter',sans-serif;background:#f8fafc;color:#0f172a}</textarea>
</div><div class="preview-pane"><iframe id="preview"></iframe></div></div>
<script>
  const h=document.getElementById('html'),c=document.getElementById('css'),p=document.getElementById('preview'),vs=document.getElementById('vs'),r=document.getElementById('run'),rs=document.getElementById('reset'),tb=document.querySelectorAll('[data-tab]');
  function render(){const d='<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"><style>*,*::before,*::after{box-sizing:border-box}'+c.value+'</style></head><body>'+h.value+'</body></html>';p.src='data:text/html;charset=utf-8,'+encodeURIComponent(d)}
  function reset(){h.value='<div style="padding:2rem;font-family:sans-serif;text-align:center">\n  <h1 style="font-size:2rem;font-weight:800">Choose your plan</h1>\n  <div style="display:inline-flex;align-items:center;gap:.75rem;margin:1.5rem 0">\n    <span>Monthly</span>\n    <div style="width:48px;height:24px;background:#6366f1;border-radius:12px;position:relative;cursor:pointer">\n      <div style="width:20px;height:20px;background:white;border-radius:50%;position:absolute;top:2px;right:2px"></div>\n    </div>\n    <span>Yearly</span>\n  </div>\n  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:1rem;max-width:900px;margin:0 auto">\n    <div style="border:1px solid #e2e8f0;border-radius:12px;padding:2rem;background:white">\n      <h3 style="font-size:1.125rem">Starter</h3>\n      <p style="font-size:2.5rem;font-weight:800">$9</p>\n      <button style="background:#6366f1;color:white;padding:.75rem;border:none;border-radius:8px;width:100%;font-weight:600;cursor:pointer">Get Started</button>\n    </div>\n    <div style="border:2px solid #6366f1;border-radius:12px;padding:2rem;background:white">\n      <h3 style="font-size:1.125rem">Professional</h3>\n      <p style="font-size:2.5rem;font-weight:800">$29</p>\n      <button style="background:#6366f1;color:white;padding:.75rem;border:none;border-radius:8px;width:100%;font-weight:600;cursor:pointer">Get Started</button>\n    </div>\n  </div>\n</div>';c.value='body{margin:0;font-family:\'Inter\',sans-serif;background:#f8fafc;color:#0f172a}';render()}
  vs.addEventListener('change',()=>{p.style.width=vs.value;p.style.margin=vs.value==='100%'?'0':'0 auto'});r.addEventListener('click',render);rs.addEventListener('click',reset);
  tb.forEach(b=>{b.addEventListener('click',()=>{tb.forEach(x=>x.classList.remove('active'));b.classList.add('active');document.querySelectorAll('.editor-pane textarea').forEach(t=>t.style.display='none');if(b.dataset.tab==='html')h.style.display='block';if(b.dataset.tab==='css')c.style.display='block'})});h.style.display='block';c.style.display='none';render();
</script></body></html>
