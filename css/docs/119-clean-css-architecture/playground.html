<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Architecture Playground</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 1000px; margin: 0 auto; padding: 2rem; }
    h1 { margin-bottom: 1rem; }
    textarea { width: 100%; height: 200px; padding: 1rem; border: 2px solid #ddd; border-radius: 8px; font-family: monospace; font-size: 14px; margin: 0.5rem 0; resize: vertical; }
    .preview { border: 2px solid #ddd; border-radius: 8px; padding: 1.5rem; min-height: 200px; margin: 1rem 0; }
    .layer-builder { display: flex; gap: 1rem; flex-wrap: wrap; margin: 1rem 0; }
    .layer-item { background: #f0f0f0; padding: 0.5rem 1rem; border-radius: 6px; cursor: grab; font-size: 0.85rem; border: 1px solid #ccc; }
    button { padding: 0.5rem 1.5rem; background: #0055CC; color: white; border: none; border-radius: 6px; cursor: pointer; margin: 0.5rem; }
  </style>
</head>
<body>
  <h1>CSS Architecture Playground</h1>
  <p>Build CSS layers in correct order and see how cascade is controlled.</p>

  <div class="layer-builder" id="layerBuilder">
    <div class="layer-item" draggable="true">Settings</div>
    <div class="layer-item" draggable="true">Generic (Reset)</div>
    <div class="layer-item" draggable="true">Elements</div>
    <div class="layer-item" draggable="true">Objects</div>
    <div class="layer-item" draggable="true">Components</div>
    <div class="layer-item" draggable="true">Utilities</div>
  </div>

  <div>
    <textarea id="cssInput">@layer settings {
  :root { --primary: #0055CC; --space: 1rem; }
}
@layer components {
  .card { padding: var(--space); border: 1px solid #ddd; border-radius: 8px; font-family: system-ui; }
  .card h2 { color: var(--primary); }
}
@layer utilities {
  .highlight { background: yellow; }
}</textarea>
    <textarea id="htmlInput"><div class="card highlight">
  <h2>Card Title</h2>
  <p>Content with clean layer architecture.</p>
</div></textarea>
    <button onclick="updatePreview()">Update</button>
  </div>

  <div class="preview" id="preview"></div>

  <script>
    const cssInput = document.getElementById('cssInput');
    const htmlInput = document.getElementById('htmlInput');
    const preview = document.getElementById('preview');

    function updatePreview() {
      preview.innerHTML = `<style>${cssInput.value}</style>${htmlInput.value}`;
    }

    // Drag and drop reordering
    document.querySelectorAll('.layer-item').forEach(item => {
      item.addEventListener('dragstart', e => e.dataTransfer.setData('text/plain', null));
      item.addEventListener('dragover', e => e.preventDefault());
      item.addEventListener('drop', e => {
        e.preventDefault();
        const container = document.getElementById('layerBuilder');
        const dragged = document.querySelector('.dragging');
        if (dragged && dragged !== item) {
          container.insertBefore(dragged, item.nextSibling);
        }
      });
    });

    cssInput.addEventListener('input', updatePreview);
    htmlInput.addEventListener('input', updatePreview);
    updatePreview();
  </script>
</body>
</html>
