<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tailwind CSS Playground</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; min-height: 100vh; }
    .split { display: grid; grid-template-columns: 1fr 1fr; gap: 0; min-height: 100vh; }
    .editor { background: #1e1e2e; padding: 1.5rem; display: flex; flex-direction: column; }
    .preview-side { background: #f5f5f5; padding: 1.5rem; overflow: auto; }
    textarea { width: 100%; flex: 1; background: #313244; color: #cdd6f4; border: none; padding: 1rem; border-radius: 8px; font-family: monospace; font-size: 14px; resize: none; }
    h2 { color: #89b4fa; margin-top: 0; }
    button { background: #89b4fa; color: #1e1e2e; border: none; padding: 0.5rem 1.5rem; border-radius: 6px; cursor: pointer; font-weight: 600; margin: 0.5rem 0; align-self: flex-start; }
  </style>
</head>
<body>
  <div class="split">
    <div class="editor">
      <h2 class="text-lg font-bold mb-2">Editor</h2>
      <textarea id="htmlInput"><div class="flex items-center gap-4 p-6 bg-white rounded-xl shadow-lg max-w-md mx-auto mt-8">
  <div class="w-12 h-12 bg-blue-500 rounded-full flex items-center justify-center text-white font-bold text-lg">TW</div>
  <div>
    <h2 class="text-xl font-bold text-gray-900">Tailwind CSS</h2>
    <p class="text-gray-500 text-sm">Edit the HTML to see live updates using Tailwind utilities.</p>
  </div>
</div></textarea>
      <button onclick="updatePreview()">Update Preview</button>
    </div>
    <div class="preview-side">
      <h2 class="text-lg font-bold mb-2 text-gray-900">Preview</h2>
      <div id="preview"></div>
    </div>
  </div>

  <script>
    const htmlInput = document.getElementById('htmlInput');
    const preview = document.getElementById('preview');

    function updatePreview() {
      preview.innerHTML = htmlInput.value;
    }

    htmlInput.addEventListener('input', updatePreview);
    updatePreview();
  </script>
</body>
</html>
