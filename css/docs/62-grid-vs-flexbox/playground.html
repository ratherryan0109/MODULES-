<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Grid vs Flexbox - Playground</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#eee;padding:20px}
h1{color:#ff6b6b}.subtitle{color:#aaa;margin-bottom:20px}
.layout{display:flex;gap:20px;flex-wrap:wrap}
.controls{flex:0 0 280px;background:#16213e;padding:20px;border-radius:10px;align-self:flex-start;position:sticky;top:20px}
.preview{flex:1;min-width:400px;background:#16213e;padding:20px;border-radius:10px}
.group{margin-bottom:14px}
.group label{display:block;color:#aaa;font-size:13px;margin-bottom:4px}
.group select,.group input{width:100%;padding:8px;background:#1a1a2e;color:#eee;border:1px solid #333;border-radius:4px}
.group input[type="range"]{padding:0}
.container-display{display:flex;gap:8px;padding:8px;border-radius:8px;transition:all .3s;min-height:200px;border:1px dashed #555;margin-bottom:10px}
.el{display:flex;align-items:center;justify-content:center;border-radius:4px;font-weight:bold;font-size:13px;padding:15px;min-height:50px;min-width:60px}
#flex-code,#grid-code{background:#1a1a2e;padding:12px;border-radius:6px;font-family:monospace;font-size:12px;white-space:pre;overflow-x:auto;margin-top:8px;min-height:60px}
.code-section{background:#2d2d44;padding:12px;border-radius:6px;margin-top:10px}
.toggle-tabs{display:flex;gap:0;margin-bottom:10px}
.tab{padding:8px 20px;background:#2d2d44;color:#aaa;border:none;cursor:pointer;font-size:13px;border-radius:4px 4px 0 0}
.tab.active{background:#4ecdc4;color:#1a1a2e;font-weight:bold}
.panel{display:none}.panel.active{display:block}
.container-display.grid-mode{display:grid}
#grid-code{color:#a8e6cf}#flex-code{color:#ffd93d}
button{background:#4ecdc4;color:#1a1a2e;border:none;padding:6px 14px;border-radius:4px;cursor:pointer;margin:3px;font-size:12px;font-weight:bold}
button.active{background:#ffd93d;color:#1a1a2e}.btn-reset{background:#ff6b6b;color:#fff;margin-top:10px}
</style>
</head>
<body>
<h1>Grid vs Flexbox Playground</h1>
<p class="subtitle">Build the same layout with both tools and compare</p>
<div class="layout">
<div class="controls">
<div class="group">
<label>Scenario</label>
<select id="scenario"><option value="nav">Nav Bar</option><option value="card-grid">Card Grid (3+ items)</option><option value="two-col">Two-Column Layout</option><option value="centering">Center an Item</option></select>
</div>
<div class="group"><label>Number of Items</label><input type="range" id="items" min="1" max="12" value="4"><div id="items-val">4</div></div>
<div class="group"><label>Gap</label><input type="range" id="gap" min="0" max="40" value="8"><div id="gap-val">8px</div></div>
<div class="group"><label>Container Width</label><select id="width"><option value="100%">Full</option><option value="600px">600px</option><option value="400px">400px</option></select></div>
<button class="btn-reset" onclick="resetPlay()">Reset</button>
</div>
<div class="preview">
<div class="toggle-tabs"><button class="tab active" data-tab="flex">Flexbox</button><button class="tab" data-tab="grid">Grid</button></div>
<div id="flex-panel" class="panel active">
<p style="color:#ffd93d;font-size:13px;margin-bottom:5px">Flexbox solution</p>
<div id="flex-container" class="container-display"></div>
<div id="flex-code">/* Flexbox CSS */</div>
</div>
<div id="grid-panel" class="panel">
<p style="color:#a8e6cf;font-size:13px;margin-bottom:5px">Grid solution</p>
<div id="grid-container" class="container-display grid-mode"></div>
<div id="grid-code">/* Grid CSS */</div>
</div>
</div>
</div>
<script>
const scenario=document.getElementById('scenario'),items=document.getElementById('items'),gap=document.getElementById('gap'),
width=document.getElementById('width'),flexC=document.getElementById('flex-container'),gridC=document.getElementById('grid-container'),
flexCode=document.getElementById('flex-code'),gridCode=document.getElementById('grid-code');
const colors=['#ff6b6b','#4ecdc4','#45b7d1','#a29bfe','#ffd93d','#6c5ce7','#fdcb6e','#e17055','#00cec9','#fd79a8','#636e72','#b2bec3'];

function buildItems(n,container){
container.innerHTML='';
for(let i=1;i<=n;i++){
const el=document.createElement('div');el.className='el';
el.style.background=colors[(i-1)%colors.length];
el.style.color=i%2===0?'#1a1a2e':'#eee';
el.textContent=`Item ${i}`;container.appendChild(el);
}
}

function update(){
const s=scenario.value,n=parseInt(items.value),g=parseInt(gap.value),w=width.value;
flexC.style.width=w;gridC.style.width=w;

switch(s){
case'nav':
flexC.style.display='flex';gridC.style.display='flex';
flexC.style.flexDirection='row';gridC.style.flexDirection='row';
flexC.style.flexWrap='nowrap';gridC.style.flexWrap='nowrap';
flexC.style.alignItems='center';gridC.style.alignItems='center';
flexC.style.justifyContent='space-between';gridC.style.justifyContent='space-between';
flexC.style.gap=g+'px';gridC.style.gap=g+'px';
flexC.style.gridTemplateColumns='';gridC.style.gridTemplateColumns='';
buildItems(n,flexC);buildItems(n,gridC);
flexCode.textContent=`/* Nav bar — Flexbox is ideal */.flex { display: flex; align-items: center; justify-content: space-between; gap: ${g}px; }`;
gridCode.textContent=`/* Grid also works but is overkill */.grid { display: flex; align-items: center; justify-content: space-between; gap: ${g}px; } ⚠ Same as flexbox — Grid is not needed here.`;
break;

case'card-grid':
flexC.style.display='flex';gridC.style.display='grid';
flexC.style.flexDirection='row';gridC.style.flexDirection='';
flexC.style.flexWrap='wrap';gridC.style.flexWrap='';
flexC.style.alignItems='';gridC.style.alignItems='';
flexC.style.justifyContent='';gridC.style.justifyContent='';
flexC.style.gap=g+'px';gridC.style.gap=g+'px';
flexC.style.gridTemplateColumns='';gridC.style.gridTemplateColumns='repeat(auto-fit, minmax(120px, 1fr))';
const flexItems=flexC.querySelectorAll('.el');const gridItems=gridC.querySelectorAll('.el');
buildItems(n,flexC);buildItems(n,gridC);
[...flexC.children].forEach(el=>{el.style.flex='1 1 120px'});
flexCode.textContent=`/* Flexbox — last row items stretch to fill */.flex { display: flex; flex-wrap: wrap; gap: ${g}px; }.flex > * { flex: 1 1 120px; } ⚠ Last row items may stretch unevenly`;
gridCode.textContent=`/* Grid — perfect alignment */.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: ${g}px; } ✅ Items align in both directions`;
break;

case'two-col':
flexC.style.display='flex';gridC.style.display='grid';
flexC.style.flexDirection='row';gridC.style.flexDirection='';
flexC.style.flexWrap='nowrap';gridC.style.flexWrap='';
flexC.style.alignItems='';gridC.style.alignItems='';
flexC.style.justifyContent='';gridC.style.justifyContent='';
flexC.style.gap=g+'px';gridC.style.gap=g+'px';
flexC.style.gridTemplateColumns='';gridC.style.gridTemplateColumns='250px 1fr';
buildItems(Math.min(2,n),flexC);buildItems(Math.min(2,n),gridC);
if(flexC.children[1])flexC.children[1].style.flex='1';
if(gridC.children[1])gridC.children[1].style.flex='';
flexCode.textContent=`/* Flexbox two-column */.flex { display: flex; gap: ${g}px; }.sidebar { flex: 0 0 250px; }.content { flex: 1; }`;
gridCode.textContent=`/* Grid two-column */.grid { display: grid; grid-template-columns: 250px 1fr; gap: ${g}px; }`;
break;

case'centering':
flexC.style.display='flex';gridC.style.display='grid';
flexC.style.alignItems='center';flexC.style.justifyContent='center';
gridC.style.alignItems='center';gridC.style.justifyContent='center';
flexC.style.flexWrap='';gridC.style.flexWrap='';
flexC.style.gap='';gridC.style.gap='';
flexC.style.gridTemplateColumns='';gridC.style.gridTemplateColumns='1fr';
flexC.style.minHeight='200px';gridC.style.minHeight='200px';
buildItems(Math.min(1,n),flexC);buildItems(Math.min(1,n),gridC);
flexCode.textContent=`/* Flexbox centering (simpler) */.flex { display: flex; align-items: center; justify-content: center; min-height: 200px; }`;
gridCode.textContent=`/* Grid centering */.grid { display: grid; place-items: center; min-height: 200px; } ✅ Shorter, but flexbox is more common for this pattern`;
break;
}

document.getElementById('items-val').textContent=String(n);
document.getElementById('gap-val').textContent=g+'px';
}

document.querySelectorAll('.controls select, .controls input').forEach(el=>el.addEventListener('input',update));
document.querySelectorAll('.tab').forEach(tab=>tab.addEventListener('click',function(){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));this.classList.add('active');
document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
document.getElementById(this.dataset.tab+'-panel').classList.add('active');
}));
function resetPlay(){scenario.value='nav';items.value=4;gap.value=8;width.value='100%';update();}
update();
</script>
</body>
</html>
