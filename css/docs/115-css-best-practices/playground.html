<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Best Practices Playground</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; max-width: 1000px; margin: 0 auto; padding: 2rem; }
    h1 { margin-bottom: 1rem; }
    .editor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin: 1rem 0; }
    textarea { width: 100%; height: 300px; padding: 1rem; border: 2px solid #ddd; border-radius: 8px; font-family: monospace; font-size: 14px; resize: vertical; }
    .preview { border: 2px solid #ddd; border-radius: 8px; padding: 1rem; height: 300px; overflow: auto; background: white; }
    .controls { display: flex; gap: 0.5rem; margin: 1rem 0; }
    button { padding: 0.5rem 1.5rem; border: none; border-radius: 6px; cursor: pointer; background: #0055CC; color: white; font-weight: 600; }
    button:hover { opacity: 0.9; }
    .lint-errors { background: #fff5f5; color: #CC2222; padding: 1rem; border-radius: 8px; margin: 1rem 0; font-family: monospace; font-size: 0.85rem; display: none; }
  </style>
</head>
<body>
  <h1>CSS Best Practices Playground</h1>
  <div class="editor-grid">
    <div><label>HTML:</label><textarea id="htmlInput"><div class="card">
  <h2 class="card__title">Hello World</h2>
  <p class="card__body">Edit this content to see live preview.</p>
  <button class="btn btn-primary">Click Me</button>
</div></textarea></div>
    <div><label>CSS:</label><textarea id="cssInput">:root {
  --primary: #0055CC;
  --surface: #f9fafb;
  --border: #e5e7eb;
  --radius: 8px;
  --text: #1a1a1a;
}

.card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 1.5rem;
  border: 1px solid var(--border);
}

.card__title { font-size: 1.25rem; margin-bottom: 0.5rem; }
.card__body { color: #666; margin-bottom: 1rem; }

.btn {
  display: inline-flex;
  align-items: center;
  padding: 0.5rem 1rem;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 1rem;
  min-height: 44px;
}

.btn-primary { background: var(--primary); color: white; }</textarea></div>
  </div>
  <div class="controls">
    <button onclick="updatePreview()">Update Preview</button>
    <button onclick="formatCSS()">Format CSS</button>
  </div>
  <div class="preview" id="preview"></div>

  <script>
    const htmlInput = document.getElementById('htmlInput');
    const cssInput = document.getElementById('cssInput');
    const preview = document.getElementById('preview');

    function updatePreview() {
      const html = htmlInput.value;
      const css = cssInput.value;
      preview.innerHTML = `<style>${css}</style>${html}`;
    }

    function formatCSS() {
      let css = cssInput.value;
      css = css.replace(/\s{2,}/g, ' ');
      css = css.replace(/\{/g, ' {\n  ');
      css = css.replace(/;/g, ';\n  ');
      css = css.replace(/\}/g, '\n}\n');
      css = css.replace(/\n\s+\n/g, '\n');
      cssInput.value = css.trim();
      updatePreview();
    }

    htmlInput.addEventListener('input', updatePreview);
    cssInput.addEventListener('input', updatePreview);
    updatePreview();
  </script>
</body>
</html>
