<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Forms Examples</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; margin: 0; }
    section { background: #fff; padding: 25px; margin-bottom: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); max-width: 600px; }

    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 600; }

    input, textarea, select {
      width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 6px;
      font-size: 1rem; transition: border-color 0.3s, box-shadow 0.3s;
    }
    input:focus, textarea:focus, select:focus {
      outline: none; border-color: #007bff; box-shadow: 0 0 0 3px rgba(0,123,255,0.25);
    }

    input:invalid { border-color: #e74c3c; }
    input:valid { border-color: #2ecc71; }

    .btn {
      padding: 12px 24px; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer;
      transition: background 0.3s, transform 0.1s;
    }
    .btn-primary { background: #007bff; color: #fff; }
    .btn-primary:hover { background: #0056b3; }
    .btn-primary:active { transform: scale(0.98); }

    /* Custom checkbox */
    .checkbox-group { display: flex; align-items: center; gap: 10px; }
    input[type="checkbox"] { width: auto; appearance: none; width: 20px; height: 20px; border: 2px solid #ddd; border-radius: 4px; cursor: pointer; position: relative; }
    input[type="checkbox"]:checked { background: #007bff; border-color: #007bff; }
    input[type="checkbox"]:checked::after { content: "✓"; color: #fff; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 14px; }

    textarea { resize: vertical; min-height: 100px; }
  </style>
</head>
<body>
  <h1>CSS Forms Examples</h1>

  <section>
    <h2>Registration Form</h2>
    <form>
      <div class="form-group">
        <label for="name">Full Name *</label>
        <input type="text" id="name" required placeholder="John Doe">
      </div>
      <div class="form-group">
        <label for="email">Email *</label>
        <input type="email" id="email" required placeholder="john@example.com">
      </div>
      <div class="form-group">
        <label for="country">Country</label>
        <select id="country">
          <option>United States</option>
          <option>Canada</option>
          <option>United Kingdom</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" placeholder="Your message here..."></textarea>
      </div>
      <div class="form-group checkbox-group">
        <input type="checkbox" id="agree" checked>
        <label for="agree" style="margin:0;">I agree to the terms</label>
      </div>
      <button type="submit" class="btn btn-primary">Submit</button>
    </form>
  </section>

  <section>
    <h2>Validation States</h2>
    <form>
      <div class="form-group">
        <label for="req">Required Field</label>
        <input type="text" id="req" required style="border-color: #e74c3c;">
        <small style="color: #e74c3c;">This field is required</small>
      </div>
      <div class="form-group">
        <label for="ok">Valid Field</label>
        <input type="text" id="ok" value="Good value" style="border-color: #2ecc71;">
        <small style="color: #2ecc71;">Looks good!</small>
      </div>
    </form>
  </section>
</body>
</html>
