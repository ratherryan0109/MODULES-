<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>CSS Grid Introduction Playground</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#eee;padding:20px}
h1{color:#ff6b6b}.subtitle{color:#aaa;margin-bottom:20px}
.layout{display:flex;gap:20px}
.controls{flex:0 0 250px;background:#16213e;padding:20px;border-radius:10px}
.preview{flex:1;background:#16213e;padding:20px;border-radius:10px}
.group{margin-bottom:15px}
.group label{display:block;color:#aaa;font-size:13px;margin-bottom:4px}
.group select,.group input[type=range]{width:100%;padding:8px;background:#1a1a2e;color:#eee;border:1px solid #333;border-radius:4px}
#grid-container{display:grid;background:#2d2d44;border-radius:8px;padding:10px;transition:all .3s;min-height:200px}
.grid-item{background:#ff6b6b;padding:20px;border-radius:4px;text-align:center}
.grid-item:nth-child(2n){background:#4ecdc4}.grid-item:nth-child(3n){background:#45b7d1}
#code{margin-top:15px;background:#1a1a2e;padding:15px;border-radius:8px;font-family:monospace;font-size:13px;color:#a8e6cf}
</style>
</head>
<body>
<h1>🧩 CSS Grid Playground</h1>
<p class="subtitle">Experiment with basic grid properties</p>
<div class="layout">
<div class="controls">
<div class="group"><label>Columns</label><input type="range" id="cols" min="1" max="6" value="3"></div>
<div class="group"><label>Rows</label><input type="range" id="rows" min="1" max="5" value="3"></div>
<div class="group"><label>gap</label><input type="range" id="gap" min="0" max="30" value="10"></div>
<div class="group"><label>Container Width</label><input type="range" id="width" min="300" max="900" value="600"></div>
</div>
<div class="preview">
<div id="grid-container"></div>
<div id="code">grid-template-columns: repeat(3, 1fr);</div>
</div>
</div>
<script>
const gc=document.getElementById('grid-container'),code=document.getElementById('code');
document.querySelectorAll('input').forEach(el=>el.addEventListener('input',update));
function update(){
const cols=document.getElementById('cols').value;
const rows=document.getElementById('rows').value;
const g=document.getElementById('gap').value;
const w=document.getElementById('width').value;
gc.style.gridTemplateColumns=`repeat(${cols}, 1fr)`;
gc.style.gridTemplateRows=`repeat(${rows}, 80px)`;
gc.style.gap=g+'px';gc.style.width=w+'px';
const total=cols*rows;
gc.innerHTML='';
for(let i=1;i<=total;i++){
const d=document.createElement('div');d.className='grid-item';d.textContent=i;gc.appendChild(d);
}
code.textContent=`grid-template-columns: repeat(${cols}, 1fr);\ngrid-template-rows: repeat(${rows}, 80px);\ngap: ${g}px;`;
}
update();
</script>
</body>
</html>
