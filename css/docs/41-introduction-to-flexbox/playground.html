<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flexbox Introduction - Playground</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; padding: 2rem; background: #1a1a2e; color: #eee; }
    h1 { margin-bottom: 1rem; color: #e94560; }
    .playground { display: flex; gap: 2rem; flex-wrap: wrap; }
    .editor { flex: 1; min-width: 400px; }
    .preview { flex: 1; min-width: 400px; }
    textarea { width: 100%; height: 300px; background: #16213e; color: #0f3460; padding: 1rem; font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 14px; border: 1px solid #e94560; border-radius: 4px; resize: vertical; }
    iframe { width: 100%; height: 300px; border: 1px solid #e94560; border-radius: 4px; background: white; }
    button { background: #e94560; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 4px; cursor: pointer; margin-top: 1rem; font-size: 1rem; }
    button:hover { background: #c73656; }
    .controls { margin-top: 1rem; }
    label { display: block; margin: 0.5rem 0; color: #aaa; }
    select { background: #16213e; color: #eee; padding: 0.5rem; border: 1px solid #e94560; border-radius: 4px; margin-left: 0.5rem; }
  </style>
</head>
<body>
  <h1>🎨 Flexbox Introduction - Playground</h1>
  <div class="playground">
    <div class="editor">
      <h2>CSS Editor</h2>
      <textarea id="cssInput">/* Try different values! */
.container {
  display: flex;
  background: #e3f2fd;
  padding: 1rem;
}
.item {
  background: #42a5f5;
  color: white;
  padding: 1rem;
  margin: 0.5rem;
  border-radius: 4px;
  text-align: center;
}</textarea>
      <br>
      <button onclick="updatePreview()">Run ▶</button>
    </div>
    <div class="preview">
      <h2>Preview</h2>
      <iframe id="preview"></iframe>
      <div class="controls">
        <label>View: <select onchange="updatePreview()">
          <option value="flex">Flex</option>
          <option value="inline-flex">Inline-Flex</option>
          <option value="block">Block</option>
        </select></label>
      </div>
    </div>
  </div>

  <script>
    function updatePreview() {
      const css = document.getElementById('cssInput').value;
      const view = document.querySelector('select').value;
      const display = view === 'block' ? 'block' : view;
      const doc = document.getElementById('preview').contentDocument;
      doc.open();
      doc.write(`
        <html><head><style>
          body { margin: 0; padding: 1rem; font-family: system-ui, sans-serif; }
          .container { ${css.replace(/display:\s*flex;/, `display: ${display};`)} }
          .item { background: #42a5f5; color: white; padding: 1rem; margin: 0.5rem; border-radius: 4px; text-align: center; }
        </style></head><body>
          <div class="container">
            <div class="item">Item 1</div>
            <div class="item">Item 2</div>
            <div class="item">Item 3</div>
          </div>
        </body></html>
      `);
      doc.close();
    }
    updatePreview();
  </script>
</body>
</html>
