<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Justify Content - Playground</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; padding: 2rem; background: #1a1a2e; color: #eee; }
  h1 { margin-bottom: 1rem; color: #e94560; }
  .layout { display: flex; gap: 2rem; flex-wrap: wrap; }
  .editor { flex: 1; min-width: 400px; }
  .preview { flex: 1; min-width: 400px; }
  textarea { width: 100%; height: 300px; background: #16213e; color: #eee; padding: 1rem; font-family: 'Cascadia Code','Fira Code',monospace; font-size: 14px; border: 1px solid #e94560; border-radius: 4px; resize: vertical; }
  iframe { width: 100%; height: 350px; border: 1px solid #e94560; border-radius: 4px; background: white; }
  button { background: #e94560; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 4px; cursor: pointer; margin-top: 1rem; font-size: 1rem; }
  button:hover { background: #c73656; }
  .controls { margin-top: 1rem; display: flex; gap: 1rem; flex-wrap: wrap; }
  label { color: #aaa; }
  select { background: #16213e; color: #eee; padding: 0.5rem; border: 1px solid #e94560; border-radius: 4px; }
</style></head>
<body>
  <h1>🎨 Justify Content - Playground</h1>
  <div class="layout">
    <div class="editor">
      <h2>CSS Editor</h2>
      <textarea id="cssInput">.container {
  display: flex;
  justify-content: flex-start;
  gap: 0.5rem;
  background: #e3f2fd;
  padding: 1rem;
}
.item {
  background: #42a5f5;
  color: white;
  padding: 1rem;
  border-radius: 4px;
  text-align: center;
}</textarea><br>
      <button onclick="updatePreview()">Run ▶</button>
    </div>
    <div class="preview">
      <h2>Preview</h2>
      <iframe id="preview"></iframe>
      <div class="controls">
        <label>justify-content:
          <select id="jcSelect" onchange="updatePreview()">
            <option value="flex-start">flex-start</option>
            <option value="flex-end">flex-end</option>
            <option value="center">center</option>
            <option value="space-between">space-between</option>
            <option value="space-around">space-around</option>
            <option value="space-evenly">space-evenly</option>
          </select>
        </label>
      </div>
    </div>
  </div>
  <script>
    function updatePreview() {
      const css = document.getElementById('cssInput').value;
      const jc = document.getElementById('jcSelect').value;
      const finalCss = css.replace(/justify-content:\s*\w+-?\w*;/, `justify-content: ${jc};`);
      const doc = document.getElementById('preview').contentDocument;
      doc.open();
      doc.write(`<html><head><style>
        body { margin: 0; padding: 1rem; font-family: system-ui, sans-serif; }
        .container { ${finalCss} }
        .item { background: #42a5f5; color: white; padding: 1rem; border-radius: 4px; text-align: center; }
        .item:nth-child(2) { background: #ff9800; }
        .item:nth-child(3) { background: #4caf50; }
      </style></head><body>
        <div class="container"><div class="item">1</div><div class="item">2</div><div class="item">3</div></div>
        <p style="margin-top:1rem;color:#666;">justify-content: ${jc}</p>
      </body></html>`);
      doc.close();
    }
    updatePreview();
  </script>
</body>
</html>
