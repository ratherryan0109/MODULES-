<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playground - Portfolio Website</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1e293b; color: #fff; height: 100vh; display: flex; flex-direction: column; }
    .toolbar { background: #0f172a; padding: 0.5rem 1rem; display: flex; align-items: center; gap: 1rem; border-bottom: 1px solid #334155; flex-wrap: wrap; }
    .toolbar h2 { font-size: 1rem; font-weight: 600; }
    .toolbar button, .toolbar select { background: #334155; color: #fff; border: none; padding: 0.4rem 0.8rem; border-radius: 4px; cursor: pointer; font-size: 0.875rem; }
    .toolbar button:hover { background: #475569; }
    .main-split { display: flex; flex: 1; overflow: hidden; }
    .editor-pane { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #334155; }
    .preview-pane { flex: 1; background: #fff; position: relative; }
    iframe { width: 100%; height: 100%; border: none; }
    textarea { width: 100%; flex: 1; background: #1e293b; color: #e2e8f0; border: none; padding: 1rem; font-family: 'Consolas', 'Courier New', monospace; font-size: 0.875rem; resize: none; outline: none; tab-size: 2; }
    .tabs { display: flex; background: #0f172a; border-bottom: 1px solid #334155; }
    .tabs button { background: transparent; color: #94a3b8; border: none; padding: 0.5rem 1rem; cursor: pointer; border-bottom: 2px solid transparent; }
    .tabs button.active { color: #fff; border-bottom-color: #8b5cf6; }
    .error-bar { background: #dc2626; color: #fff; padding: 0.25rem 1rem; font-size: 0.8rem; display: none; }
    @media (max-width: 768px) { .main-split { flex-direction: column; } }
  </style>
</head>
<body>
  <div class="toolbar">
    <h2>Portfolio Playground</h2>
    <select id="viewportSelect">
      <option value="100%">Responsive</option>
      <option value="375px">Mobile</option>
      <option value="768px">Tablet</option>
      <option value="1024px">Desktop</option>
    </select>
    <button id="runBtn">&#9654; Run</button>
    <button id="resetBtn">&#8635; Reset</button>
  </div>
  <div class="main-split">
    <div class="editor-pane">
      <div class="tabs">
        <button class="active" data-tab="html">HTML</button>
        <button data-tab="css">CSS</button>
      </div>
      <textarea id="htmlEditor"><section style="padding:2rem;font-family:sans-serif">
  <p style="color:#8b5cf6;font-weight:600">Hi, I'm</p>
  <h1 style="font-size:3rem;font-weight:800;margin:0.5rem 0">Alex Chen</h1>
  <p style="color:#64748b;max-width:500px">Full-stack developer crafting beautiful digital experiences.</p>
  <div style="display:flex;gap:1rem;margin-top:1.5rem">
    <a href="#" style="background:#8b5cf6;color:#fff;padding:0.75rem 1.5rem;border-radius:8px;text-decoration:none">View Work</a>
    <a href="#" style="border:2px solid #e2e8f0;color:#1e293b;padding:0.75rem 1.5rem;border-radius:8px;text-decoration:none">Contact</a>
  </div>
</section></textarea>
      <textarea id="cssEditor">/* Add your portfolio styles here */
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #ffffff;
  color: #0f172a;
}
:root {
  --accent: #8b5cf6;
}</textarea>
    </div>
    <div class="preview-pane">
      <div class="error-bar" id="errorBar"></div>
      <iframe id="preview"></iframe>
    </div>
  </div>
  <script>
    const htmlEditor = document.getElementById('htmlEditor');
    const cssEditor = document.getElementById('cssEditor');
    const preview = document.getElementById('preview');
    const errorBar = document.getElementById('errorBar');
    const viewportSelect = document.getElementById('viewportSelect');
    const runBtn = document.getElementById('runBtn');
    const resetBtn = document.getElementById('resetBtn');
    const tabs = document.querySelectorAll('[data-tab]');

    function render() {
      const html = htmlEditor.value;
      const css = cssEditor.value;
      const doc = `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Preview</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet"><style>*,*::before,*::after{box-sizing:border-box}body{margin:0;font-family:'Inter',sans-serif}${css}</style></head><body>${html}</body></html>`;
      try {
        preview.src = 'data:text/html;charset=utf-8,' + encodeURIComponent(doc);
        errorBar.style.display = 'none';
      } catch (e) {
        errorBar.textContent = 'Error: ' + e.message;
        errorBar.style.display = 'block';
      }
    }

    function resetCode() {
      htmlEditor.value = '<section style="padding:2rem;font-family:sans-serif">\n  <p style="color:#8b5cf6;font-weight:600">Hi, I\'m</p>\n  <h1 style="font-size:3rem;font-weight:800;margin:0.5rem 0">Alex Chen</h1>\n  <p style="color:#64748b;max-width:500px">Full-stack developer crafting beautiful digital experiences.</p>\n  <div style="display:flex;gap:1rem;margin-top:1.5rem">\n    <a href="#" style="background:#8b5cf6;color:#fff;padding:0.75rem 1.5rem;border-radius:8px;text-decoration:none">View Work</a>\n    <a href="#" style="border:2px solid #e2e8f0;color:#1e293b;padding:0.75rem 1.5rem;border-radius:8px;text-decoration:none">Contact</a>\n  </div>\n</section>';
      cssEditor.value = '/* Add your portfolio styles here */\nbody {\n  margin: 0;\n  font-family: \'Inter\', sans-serif;\n  background: #ffffff;\n  color: #0f172a;\n}\n:root {\n  --accent: #8b5cf6;\n}';
      render();
    }

    viewportSelect.addEventListener('change', () => {
      preview.style.width = viewportSelect.value;
      preview.style.margin = viewportSelect.value === '100%' ? '0' : '0 auto';
    });
    runBtn.addEventListener('click', render);
    resetBtn.addEventListener('click', resetCode);
    tabs.forEach(btn => {
      btn.addEventListener('click', () => {
        tabs.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.editor-pane textarea').forEach(t => t.style.display = 'none');
        if (btn.dataset.tab === 'html') htmlEditor.style.display = 'block';
        if (btn.dataset.tab === 'css') cssEditor.style.display = 'block';
      });
    });
    htmlEditor.style.display = 'block';
    cssEditor.style.display = 'none';
    render();
  </script>
</body>
</html>
