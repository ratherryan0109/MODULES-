<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Dropdowns Playground</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    .controls { background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 20px; flex-wrap: wrap; }
    .controls label { display: flex; flex-direction: column; gap: 5px; }
    .demo-area {
      background: #fff; border-radius: 8px; padding: 30px; min-height: 200px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .dropdown-btn {
      padding: 12px 24px; background: #007bff; color: #fff; border: none;
      border-radius: 4px; cursor: pointer; font-size: 1rem;
    }
    .dropdown-container {
      position: relative; display: inline-block;
    }
    .dropdown-menu {
      position: absolute; top: 100%; left: 0; margin-top: 4px;
      background: #fff; border-radius: 4px; box-shadow: 0 8px 16px rgba(0,0,0,0.15);
      min-width: 200px; padding: 8px 0;
      opacity: 0; visibility: hidden; transform: translateY(-5px);
      transition: opacity 0.3s, visibility 0.3s, transform 0.3s;
    }
    .dropdown-container:hover .dropdown-menu {
      opacity: 1; visibility: visible; transform: translateY(0);
    }
    .dropdown-menu a {
      display: block; padding: 10px 16px; color: #333; text-decoration: none;
    }
    .dropdown-menu a:hover { background: #f0f0f0; }
    .dropdown-menu a:active { background: #007bff; color: #fff; }
  </style>
</head>
<body>
  <div class="container">
    <h1>CSS Dropdowns Playground</h1>
    <div class="controls">
      <label>
        Animation Speed (ms):
        <input type="range" id="speedSlider" min="100" max="1000" step="50" value="300">
        <span id="speedValue">300ms</span>
      </label>
      <label>
        Menu Min Width:
        <input type="range" id="widthSlider" min="120" max="400" step="10" value="200">
        <span id="widthValue">200px</span>
      </label>
    </div>
    <div class="demo-area">
      <div class="dropdown-container" id="dropdownContainer">
        <button class="dropdown-btn">Hover to Open ↓</button>
        <div class="dropdown-menu" id="dropdownMenu">
          <a href="#">Profile</a>
          <a href="#">Settings</a>
          <a href="#">Help</a>
          <a href="#">Logout</a>
        </div>
      </div>
    </div>
  </div>
  <script>
    const menu = document.getElementById('dropdownMenu');
    document.getElementById('speedSlider').addEventListener('input', e => {
      const val = e.target.value + 'ms';
      document.getElementById('speedValue').textContent = val;
      menu.style.transitionDuration = val;
    });
    document.getElementById('widthSlider').addEventListener('input', e => {
      const val = e.target.value + 'px';
      document.getElementById('widthValue').textContent = val;
      menu.style.minWidth = val;
    });
  </script>
</body>
</html>
