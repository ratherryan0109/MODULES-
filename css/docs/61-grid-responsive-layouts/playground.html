<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Grid Responsive Layouts - Playground</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#eee;padding:20px}
h1{color:#ff6b6b}.subtitle{color:#aaa;margin-bottom:20px}
.layout{display:flex;gap:20px;flex-wrap:wrap}
.controls{flex:0 0 300px;background:#16213e;padding:20px;border-radius:10px;align-self:flex-start;position:sticky;top:20px}
.preview{flex:1;min-width:400px;background:#16213e;padding:20px;border-radius:10px}
.group{margin-bottom:14px}
.group label{display:block;color:#aaa;font-size:13px;margin-bottom:4px}
.group select,.group input{width:100%;padding:8px;background:#1a1a2e;color:#eee;border:1px solid #333;border-radius:4px}
.group input[type="range"]{padding:0}
.grid-container{display:grid;gap:8px;padding:8px;border-radius:8px;transition:all .3s;min-height:200px}
.el{display:flex;align-items:center;justify-content:center;border-radius:6px;font-weight:bold;font-size:14px;padding:20px;min-height:60px}
#css-code{margin-top:15px;background:#1a1a2e;padding:15px;border-radius:8px;font-family:monospace;font-size:13px;color:#a8e6cf;white-space:pre;overflow-x:auto}
#viewport-width{position:sticky;top:0;background:#16213e;padding:10px;border-radius:6px;margin-bottom:15px;font-size:13px;color:#aaa}
button{background:#4ecdc4;color:#1a1a2e;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;margin:3px;font-weight:bold;font-size:12px;border:1px solid transparent}
button.active{background:#ffd93d;color:#1a1a2e}.btn-reset{background:#ff6b6b;color:#fff;margin-top:10px}
</style>
</head>
<body>
<h1>Grid Responsive Playground</h1>
<p class="subtitle">Resize the preview or use preset widths to see responsive behavior</p>
<div class="layout">
<div class="controls">
<div class="group"><label>Keyword</label><select id="keyword"><option value="auto-fit">auto-fit</option><option value="auto-fill">auto-fill</option></select></div>
<div class="group"><label>Min Column Width</label><input type="range" id="min-width" min="100" max="400" value="200"><div id="min-val">200px</div></div>
<div class="group"><label>Max Column Width</label><select id="max-width"><option value="1fr">1fr (fill space)</option><option value="auto">auto (content-size)</option><option value="300px">300px (fixed)</option></select></div>
<div class="group"><label>Number of Items</label><input type="range" id="items" min="1" max="20" value="6"><div id="items-val">6</div></div>
<div class="group"><label>Gap</label><input type="range" id="gap" min="0" max="40" value="8"><div id="gap-val">8px</div></div>
<div class="group"><label>Preset widths</label><div><button class="active" data-w="1200">1200px</button><button data-w="900">900px</button><button data-w="700">700px</button><button data-w="500">500px</button><button data-w="375">375px</button></div></div>
<button class="btn-reset" onclick="resetPlay()">Reset</button>
</div>
<div class="preview" id="preview-panel">
<div id="viewport-width">Viewport width: 1200px</div>
<div id="grid" class="grid-container"></div>
<div id="css-code">/* CSS will appear here */</div>
</div>
</div>
<script>
const previewPanel=document.getElementById('preview-panel'),grid=document.getElementById('grid'),code=document.getElementById('css-code'),vp=document.getElementById('viewport-width');
const keyword=document.getElementById('keyword'),minWidth=document.getElementById('min-width'),maxWidth=document.getElementById('max-width'),items=document.getElementById('items'),gap=document.getElementById('gap');
const colors=['#ff6b6b','#4ecdc4','#45b7d1','#a29bfe','#ffd93d','#6c5ce7','#fdcb6e','#e17055','#00cec9','#fd79a8','#636e72','#b2bec3'];
const observer=new ResizeObserver(([e])=>{vp.textContent=`Viewport width: ${Math.round(e.contentRect.width)}px`;update();});
observer.observe(previewPanel);

function update(){
const kw=keyword.value,mw=parseInt(minWidth.value),mxW=maxWidth.value,n=parseInt(items.value),g=parseInt(gap.value);
grid.style.gridTemplateColumns=`repeat(${kw}, minmax(${mw}px, ${mxW}))`;
grid.style.gap=g+'px';
grid.innerHTML='';
for(let i=1;i<=n;i++){
const el=document.createElement('div');el.className='el';el.style.background=colors[(i-1)%colors.length];el.style.color=i%2===0?'#1a1a2e':'#eee';el.textContent=`Item ${i}`;grid.appendChild(el);
}
document.getElementById('min-val').textContent=mw+'px';
document.getElementById('items-val').textContent=String(n);
document.getElementById('gap-val').textContent=g+'px';
code.textContent=`.grid {\n  display: grid;\n  grid-template-columns: repeat(${kw}, minmax(${mw}px, ${mxW}));\n  gap: ${g}px;\n}\n\n/* ${n} items · auto-${kw} · min:${mw}px · max:${mxW} */`;
}
document.querySelectorAll('.controls select, .controls input').forEach(el=>el.addEventListener('input',update));
document.querySelectorAll('[data-w]').forEach(btn=>btn.addEventListener('click',function(){document.querySelectorAll('[data-w]').forEach(b=>b.classList.remove('active'));this.classList.add('active');previewPanel.style.width=this.dataset.w+'px'}));
function resetPlay(){keyword.value='auto-fit';minWidth.value=200;maxWidth.value='1fr';items.value=6;gap.value=8;document.querySelectorAll('[data-w]').forEach(b=>b.classList.remove('active'));previewPanel.style.width='';update();}
update();
</script>
</body>
</html>
