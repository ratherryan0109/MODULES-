<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Scale - Playground</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Courier New', monospace; background: #1e1e2e; color: #cdd6f4; padding: 2rem; }
    h1 { color: #89b4fa; margin-bottom: 1rem; }
    .container { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; max-width: 1200px; margin: 0 auto; }
    @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
    .panel { background: #313244; border-radius: 12px; padding: 1.5rem; border: 1px solid #45475a; }
    .preview-panel { display: flex; align-items: center; justify-content: center; min-height: 400px; overflow: hidden; }
    label { display: block; margin: 0.75rem 0 0.25rem; color: #a6e3a1; font-weight: 700; }
    input[type="range"] { width: 100%; }
    select { width: 100%; padding: 0.5rem; border-radius: 6px; border: 1px solid #45475a; background: #181825; color: #cdd6f4; }
    .demo-box {
      width: 150px; height: 150px; border-radius: 12px; background: #89b4fa;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: #1e1e2e; transition: scale 0.3s ease;
    }
    .code-output { background: #181825; padding: 1rem; border-radius: 8px; margin-top: 1rem; font-size: 0.85rem; white-space: pre-wrap; border: 1px solid #45475a; }
    button { background: #89b4fa; color: #1e1e2e; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-weight: 700; margin-top: 1rem; }
    button:hover { background: #b4d0fb; }
    .row { display: flex; gap: 1rem; }
    .row > div { flex: 1; }
  </style>
</head>
<body>
  <h1>CSS Scale Playground</h1>
  <div class="container">
    <div class="panel">
      <h2 style="color:#a6e3a1;margin-bottom:1rem;">Controls</h2>

      <label>Scale X</label>
      <input type="range" id="scaleX" min="-2" max="3" step="0.05" value="1">
      <span id="scaleXVal">1</span>

      <label>Scale Y</label>
      <input type="range" id="scaleY" min="-2" max="3" step="0.05" value="1">
      <span id="scaleYVal">1</span>

      <label>Transform Origin</label>
      <select id="origin">
        <option value="center">center</option>
        <option value="top left">top left</option>
        <option value="top right">top right</option>
        <option value="bottom left">bottom left</option>
        <option value="bottom right">bottom right</option>
      </select>

      <label>Transition Duration (s)</label>
      <input type="range" id="transDur" min="0" max="2" step="0.1" value="0.3">
      <span id="transDurVal">0.3s</span>

      <button id="resetBtn">Reset</button>
    </div>
    <div class="panel preview-panel">
      <div id="previewBox" class="demo-box">Scale</div>
    </div>
  </div>
  <div class="code-output" id="codeOutput">scale: 1;</div>

  <script>
    const box = document.getElementById('previewBox');
    const sX = document.getElementById('scaleX');
    const sY = document.getElementById('scaleY');
    const origin = document.getElementById('origin');
    const tDur = document.getElementById('transDur');
    const code = document.getElementById('codeOutput');
    const resetBtn = document.getElementById('resetBtn');

    function update() {
      const x = parseFloat(sX.value);
      const y = parseFloat(sY.value);

      document.getElementById('scaleXVal').textContent = x;
      document.getElementById('scaleYVal').textContent = y;
      document.getElementById('transDurVal').textContent = tDur.value + 's';

      box.style.transition = `scale ${tDur.value}s ease`;
      box.style.transformOrigin = origin.value;
      box.style.scale = `${x} ${y}`;

      code.textContent = `scale: ${x} ${y};\ntransform-origin: ${origin.value};\ntransition: scale ${tDur.value}s ease;`;
    }

    [sX, sY, origin, tDur].forEach(el => el.addEventListener('input', update));
    resetBtn.addEventListener('click', () => {
      sX.value = 1; sY.value = 1;
      origin.value = 'center';
      tDur.value = 0.3;
      update();
    });
    update();
  </script>
</body>
</html>
