<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Alignment - Playground</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; background: #1a1a2e; color: #eee; }
    .top-bar { background: #16213e; padding: 15px 20px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
    .top-bar h1 { font-size: 20px; }
    .top-bar label { font-size: 14px; display: flex; align-items: center; gap: 8px; }
    .top-bar select { padding: 6px 12px; border-radius: 4px; border: none; font-size: 14px; }
    .main { display: flex; flex: 1; }
    .editor-panel { flex: 1; display: flex; flex-direction: column; }
    .preview-panel { flex: 1; background: white; position: relative; overflow: hidden; }
    .controls { background: #0f3460; padding: 10px 20px; display: flex; gap: 10px; }
    .controls button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; background: #e94560; color: white; font-weight: bold; }
    .controls button:hover { background: #c73650; }
    #code { flex: 1; background: #1e1e1e; color: #d4d4d4; border: none; padding: 20px; font-family: 'Consolas', monospace; font-size: 14px; resize: none; outline: none; tab-size: 2; }
    #preview { width: 100%; height: 100%; border: none; }
    .label { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; padding: 4px 10px; border-radius: 4px; font-size: 12px; }
  </style>
</head>
<body>
  <div class="top-bar">
    <h1>🎯 CSS Alignment Playground</h1>
    <label>Method: <select id="methodSelect">
      <option value="text">text-align: center</option>
      <option value="margin">margin: auto</option>
      <option value="flex">Flexbox</option>
      <option value="grid">Grid (place-items)</option>
      <option value="absolute">Absolute + transform</option>
    </select></label>
  </div>
  <div class="main">
    <div class="editor-panel">
      <div class="controls">
        <button onclick="applyCode()">▶ Run</button>
        <button onclick="resetCode()">↺ Reset</button>
        <label><input type="checkbox" id="autoUpdate" checked> Auto-run</label>
      </div>
      <textarea id="code">
<style>
  .container {
    height: 250px;
    border: 2px dashed #999;
    border-radius: 8px;
    margin: 30px;
    background: #f8f9fa;
    text-align: center;
  }
  .box {
    display: inline-block;
    width: 150px;
    height: 80px;
    background: #e94560;
    color: white;
    border-radius: 8px;
    font-weight: bold;
  }
</style>
<div class="container">
  <div class="box">Target</div>
</div></textarea>
    </div>
    <div class="preview-panel">
      <iframe id="preview"></iframe>
      <div class="label">Alignment Demo</div>
    </div>
  </div>

  <script>
    const codeEl = document.getElementById('code');
    const preview = document.getElementById('preview');
    const methodSelect = document.getElementById('methodSelect');

    const templates = {
      text: `<style>\n  .container {\n    height: 250px;\n    border: 2px dashed #999;\n    border-radius: 8px;\n    margin: 30px;\n    background: #f8f9fa;\n    text-align: center;\n  }\n  .box {\n    display: inline-block;\n    width: 150px;\n    height: 80px;\n    background: #e94560;\n    color: white;\n    border-radius: 8px;\n    font-weight: bold;\n    vertical-align: middle;\n  }\n</style>\n<div class="container">\n  <div class="box">text-align: center</div>\n</div>`,
      margin: `<style>\n  .container {\n    border: 2px dashed #999;\n    border-radius: 8px;\n    margin: 30px;\n    background: #f8f9fa;\n  }\n  .box {\n    width: 150px;\n    height: 80px;\n    background: #4a90d9;\n    color: white;\n    border-radius: 8px;\n    font-weight: bold;\n    margin: 60px auto;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n  }\n</style>\n<div class="container">\n  <div class="box">margin: auto</div>\n</div>`,
      flex: `<style>\n  .container {\n    height: 250px;\n    border: 2px dashed #999;\n    border-radius: 8px;\n    margin: 30px;\n    background: #f8f9fa;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n  }\n  .box {\n    width: 150px;\n    height: 80px;\n    background: #2ecc71;\n    color: white;\n    border-radius: 8px;\n    font-weight: bold;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n  }\n</style>\n<div class="container">\n  <div class="box">Flexbox</div>\n</div>`,
      grid: `<style>\n  .container {\n    height: 250px;\n    border: 2px dashed #999;\n    border-radius: 8px;\n    margin: 30px;\n    background: #f8f9fa;\n    display: grid;\n    place-items: center;\n  }\n  .box {\n    width: 150px;\n    height: 80px;\n    background: #9c27b0;\n    color: white;\n    border-radius: 8px;\n    font-weight: bold;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n  }\n</style>\n<div class="container">\n  <div class="box">Grid</div>\n</div>`,
      absolute: `<style>\n  .container {\n    height: 250px;\n    border: 2px dashed #999;\n    border-radius: 8px;\n    margin: 30px;\n    background: #f8f9fa;\n    position: relative;\n  }\n  .box {\n    width: 150px;\n    height: 80px;\n    background: #ff9800;\n    color: white;\n    border-radius: 8px;\n    font-weight: bold;\n    position: absolute;\n    top: 50%;\n    left: 50%;\n    transform: translate(-50%, -50%);\n    display: flex;\n    align-items: center;\n    justify-content: center;\n  }\n</style>\n<div class=\"container\">\n  <div class=\"box\">Absolute</div>\n</div>`
    };

    function applyCode() {
      const method = methodSelect.value;
      const html = '<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body>' + templates[method] + '</body></html>';
      preview.srcdoc = html;
    }

    function resetCode() {
      methodSelect.value = 'flex';
      applyCode();
    }

    methodSelect.addEventListener('change', applyCode);
    codeEl.addEventListener('input', () => {
      if (document.getElementById('autoUpdate').checked) {
        clearTimeout(window._runTimer);
        window._runTimer = setTimeout(applyCode, 300);
      }
    });
    applyCode();
  </script>
</body>
</html>
