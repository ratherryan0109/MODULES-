
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JavaScript Mastery Course</title>
<meta name="description" content="Interactive JavaScript Mastery Course - 155 modules covering everything from fundamentals to advanced projects">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #d97706;
  --primary-dark: #b45309;
  --primary-light: #fde68a;
  --bg: #f8fafc;
  --surface: #ffffff;
  --text: #1e293b;
  --text-secondary: #475569;
  --text-muted: #94a3b8;
  --success: #16a34a;
  --error: #dc2626;
  --warning: #d97706;
  --glass-bg: rgba(255,255,255,0.7);
  --glass-border: rgba(0,0,0,0.06);
  --glass-shadow: 0 8px 32px rgba(217,119,6,0.1);
  --radius: 16px;
  --transition: 0.3s ease;
}
html { scroll-behavior: smooth; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow: hidden;
}
.blob {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  z-index: 0;
  pointer-events: none;
}
.blob-1 { width: 500px; height: 500px; background: rgba(217,119,6,0.06); top: -200px; left: -150px; animation: floatBlob 10s ease-in-out infinite 0s; }
.blob-2 { width: 400px; height: 400px; background: rgba(217,119,6,0.04); top: -100px; right: -100px; animation: floatBlob 10s ease-in-out infinite -2.5s; }
.blob-3 { width: 450px; height: 450px; background: rgba(217,119,6,0.06); bottom: -150px; left: -100px; animation: floatBlob 10s ease-in-out infinite -5s; }
.blob-4 { width: 350px; height: 350px; background: rgba(217,119,6,0.04); bottom: -80px; right: -80px; animation: floatBlob 10s ease-in-out infinite -7.5s; }
@keyframes floatBlob {
  0%, 100% { transform: translate(0,0) scale(1); }
  25% { transform: translate(30px,-50px) scale(1.1); }
  50% { transform: translate(-20px,20px) scale(0.9); }
  75% { transform: translate(40px,30px) scale(1.05); }
}
.glass {
  background: var(--glass-bg);
  backdrop-filter: blur(15px);
  border: 1px solid var(--glass-border);
}
.glass-card {
  background: var(--glass-bg);
  backdrop-filter: blur(15px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 2rem;
  transition: all var(--transition);
}
.glass-card:hover {
  box-shadow: var(--glass-shadow);
  border-color: rgba(217,119,6,0.2);
}
.app { display: flex; height: 100vh; position: relative; z-index: 1; }
.app-header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 60px;
  display: flex; align-items: center; gap: 1rem;
  padding: 0 1.5rem;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(0,0,0,0.06);
}
.app-header h1 {
  font-size: 1.15rem; font-weight: 700;
  color: var(--primary); flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.app-header .js-badge {
  background: var(--primary);
  color: #fff;
  font-weight: 700;
  padding: 2px 10px;
  border-radius: 6px;
  font-size: 0.7rem;
}
.app-header .progress-badge {
  font-size: 0.8rem; color: var(--text-secondary);
  background: rgba(0,0,0,0.04); padding: 4px 12px;
  border-radius: 20px; border: 1px solid rgba(0,0,0,0.06);
  white-space: nowrap;
}
.hamburger {
  display: none; background: none; border: none;
  font-size: 1.5rem; color: var(--text); cursor: pointer;
}
.sidebar {
  width: 300px; flex-shrink: 0;
  margin-top: 60px;
  padding: 1rem;
  overflow-y: auto;
  height: calc(100vh - 60px);
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(12px);
  border-right: 1px solid rgba(0,0,0,0.06);
  transition: transform 0.3s ease;
  z-index: 50;
}
.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: rgba(217,119,6,0.2); border-radius: 3px; }
.sidebar .sidebar-label {
  font-size: 0.7rem; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--text-muted);
  padding: 0.5rem 0.75rem 0.25rem;
}
.sidebar .section-label {
  font-size: 0.65rem; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--primary);
  padding: 0.75rem 0.75rem 0.25rem;
  font-weight: 700;
  opacity: 0.7;
}
.module-item {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.5rem 0.75rem; border-radius: 10px;
  cursor: pointer; transition: all var(--transition);
  border-left: 3px solid transparent;
  text-decoration: none; color: var(--text-secondary);
  font-size: 0.82rem; line-height: 1.3;
}
.module-item:hover {
  background: rgba(217,119,6,0.06);
  transform: translateX(2px);
  color: var(--text);
}
.module-item.active {
  background: rgba(217,119,6,0.1);
  border-left-color: var(--primary);
  color: var(--primary);
  font-weight: 600;
}
.module-item .num {
  font-size: 0.65rem; font-weight: 700; color: var(--text-muted);
  width: 24px; text-align: right; flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}
.module-item.active .num { color: var(--primary); }
.module-item .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text-muted); flex-shrink: 0;
  transition: all var(--transition);
}
.module-item.active .dot { background: var(--primary); box-shadow: 0 0 8px rgba(217,119,6,0.3); }
.module-item.visited .dot { background: var(--success); }
.content {
  flex: 1; margin-top: 60px;
  height: calc(100vh - 60px);
  overflow-y: auto;
  padding: 1.5rem 2rem 4rem;
}
.content::-webkit-scrollbar { width: 8px; }
.content::-webkit-scrollbar-track { background: transparent; }
.content::-webkit-scrollbar-thumb { background: rgba(217,119,6,0.15); border-radius: 4px; }
.tab-bar {
  display: flex; gap: 0.25rem;
  margin-bottom: 1.5rem; padding: 4px;
  background: rgba(0,0,0,0.03);
  backdrop-filter: blur(10px);
  border-radius: 12px;
  border: 1px solid rgba(0,0,0,0.06);
  overflow-x: auto; white-space: nowrap;
}
.tab-bar::-webkit-scrollbar { height: 3px; }
.tab-bar::-webkit-scrollbar-thumb { background: rgba(217,119,6,0.2); border-radius: 2px; }
.tab-btn {
  padding: 0.6rem 1.2rem; border: none; border-radius: 8px;
  background: transparent; color: var(--text-secondary);
  font-size: 0.82rem; font-weight: 600;
  cursor: pointer; transition: all var(--transition);
  font-family: inherit; flex-shrink: 0;
}
.tab-btn:hover { color: var(--primary); background: rgba(217,119,6,0.06); }
.tab-btn.active {
  background: rgba(217,119,6,0.12);
  color: var(--primary);
  box-shadow: 0 2px 8px rgba(217,119,6,0.15);
}
.content-panel { display: none; }
.content-panel.active { display: block; }
.lesson h1 { font-size: clamp(1.8rem,4vw,2.8rem); color: var(--primary); margin-bottom: 0.75rem; font-weight: 800; letter-spacing: -0.02em; }
.lesson h2 { font-size: 1.4rem; color: var(--text); margin: 1.5rem 0 0.5rem; font-weight: 700; }
.lesson h3 { font-size: 1.15rem; color: var(--text-secondary); margin: 1.2rem 0 0.4rem; font-weight: 600; }
.lesson p { margin-bottom: 0.8rem; line-height: 1.7; color: var(--text); }
.lesson ul, .lesson ol { margin: 0.5rem 0 1rem 1.5rem; line-height: 1.7; }
.lesson li { margin-bottom: 0.25rem; }
.lesson strong { color: var(--primary-dark); font-weight: 700; }
.lesson em { font-style: italic; color: var(--text-secondary); }
.lesson a { color: var(--primary); text-decoration: underline; text-underline-offset: 2px; }
.lesson a:hover { color: var(--primary-dark); }
.lesson blockquote {
  border-left: 4px solid var(--primary);
  padding: 0.75rem 1rem; margin: 1rem 0;
  background: rgba(217,119,6,0.06);
  border-radius: 0 8px 8px 0;
  color: var(--text-secondary);
}
.lesson pre {
  background: #f1f5f9;
  border-radius: 10px; padding: 1rem; overflow-x: auto;
  margin: 0.75rem 0; border: 1px solid rgba(0,0,0,0.06);
}
.lesson code {
  font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  font-size: 0.85em;
}
.lesson p code, .lesson li code {
  background: rgba(217,119,6,0.1);
  padding: 2px 6px; border-radius: 4px;
  color: var(--primary);
}
.lesson table {
  width: 100%; border-collapse: separate; border-spacing: 0;
  margin: 1rem 0; border-radius: 10px; overflow: hidden;
  border: 1px solid rgba(0,0,0,0.06);
}
.lesson th, .lesson td {
  padding: 0.65rem 1rem; text-align: left;
  border-bottom: 1px solid rgba(0,0,0,0.04);
}
.lesson th { background: rgba(217,119,6,0.08); font-weight: 700; color: var(--primary); }
.lesson tr:last-child td { border-bottom: none; }
.lesson tr:hover td { background: rgba(0,0,0,0.02); }
.lesson img { max-width: 100%; border-radius: 10px; margin: 1rem 0; }
.lesson hr { border: none; height: 1px; background: rgba(0,0,0,0.06); margin: 1.5rem 0; }
.examples-content iframe.example-frame {
  width: 100%; border: none; border-radius: 10px;
  background: transparent; min-height: 300px;
  margin-bottom: 1rem;
}
.examples-content .example-container { margin-bottom: 1.5rem; }
.quiz-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.quiz-header .score { font-weight: 700; color: var(--primary); }
.quiz-question {
  margin-bottom: 1rem; padding: 1.25rem;
  border-radius: 12px;
  background: var(--surface);
  border: 1px solid rgba(0,0,0,0.06);
}
.quiz-question .q-text { font-weight: 600; margin-bottom: 0.75rem; font-size: 1rem; }
.quiz-question .q-num { color: var(--text-muted); font-size: 0.8rem; font-weight: 700; margin-right: 0.5rem; }
.quiz-option {
  display: block; width: 100%; text-align: left;
  padding: 0.6rem 1rem; margin-bottom: 0.4rem;
  border-radius: 8px; border: 1px solid rgba(0,0,0,0.08);
  background: transparent;
  cursor: pointer; transition: all var(--transition);
  font-family: inherit; font-size: 0.9rem; color: var(--text);
}
.quiz-option:hover { background: rgba(217,119,6,0.06); border-color: rgba(217,119,6,0.2); }
.quiz-option.selected { background: rgba(217,119,6,0.1); border-color: var(--primary); }
.quiz-option.correct { background: rgba(22,163,74,0.1); border-color: var(--success); color: #16a34a; }
.quiz-option.wrong { background: rgba(220,38,38,0.06); border-color: var(--error); color: #dc2626; }
.quiz-option:disabled { cursor: default; opacity: 0.85; }
.quiz-explanation {
  margin-top: 0.5rem; padding: 0.75rem 1rem;
  border-radius: 8px; background: var(--surface);
  border-left: 3px solid var(--primary);
  font-size: 0.85rem; color: var(--text-secondary);
  display: none;
}
.quiz-explanation.show { display: block; }
.challenge-card {
  margin-bottom: 1.5rem; padding: 1.5rem;
  border-radius: 12px;
  background: var(--surface);
  border: 1px solid rgba(0,0,0,0.06);
}
.challenge-card .challenge-tag {
  display: inline-block; padding: 2px 10px; border-radius: 12px;
  font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.05em; margin-bottom: 0.5rem;
}
.challenge-card.easy .challenge-tag { background: rgba(22,163,74,0.1); color: #16a34a; }
.challenge-card.medium .challenge-tag { background: rgba(217,119,6,0.1); color: #d97706; }
.challenge-card.hard .challenge-tag { background: rgba(220,38,38,0.08); color: #dc2626; }
.challenge-card .c-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.4rem; }
.challenge-card .c-desc { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 0.75rem; line-height: 1.5; }
.challenge-card pre {
  background: #f1f5f9; border-radius: 8px; padding: 0.75rem; overflow-x: auto;
  font-size: 0.82rem; border: 1px solid rgba(0,0,0,0.06);
  max-height: 200px; overflow-y: auto;
}
.challenge-card .solution-btn {
  margin-top: 0.5rem; padding: 0.4rem 1rem; border: 1px solid var(--primary);
  background: transparent; color: var(--primary); border-radius: 8px;
  cursor: pointer; font-weight: 600; font-size: 0.8rem;
  transition: all var(--transition); font-family: inherit;
}
.challenge-card .solution-btn:hover { background: var(--primary); color: #fff; }
.challenge-card .solution-content { display: none; margin-top: 0.75rem; }
.challenge-card .solution-content.show { display: block; }
.resources-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1rem;
}
.resource-card {
  padding: 1.2rem; border-radius: 12px;
  background: var(--surface);
  border: 1px solid rgba(0,0,0,0.06);
  transition: all var(--transition);
  text-decoration: none; color: var(--text); display: block;
}
.resource-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(217,119,6,0.08);
  border-color: rgba(217,119,6,0.15);
}
.resource-card .rc-type {
  display: inline-block; padding: 2px 8px; border-radius: 8px;
  font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
  margin-bottom: 0.4rem; letter-spacing: 0.05em;
}
.resource-card .rc-type.documentation { background: rgba(37,99,235,0.1); color: #2563eb; }
.resource-card .rc-type.video { background: rgba(220,38,38,0.06); color: #dc2626; }
.resource-card .rc-type.article { background: rgba(217,119,6,0.06); color: #d97706; }
.resource-card .rc-type.tutorial { background: rgba(22,163,74,0.1); color: #16a34a; }
.resource-card .rc-type.course { background: rgba(124,58,237,0.1); color: #7c3aed; }
.resource-card .rc-type.newsletter { background: rgba(236,72,153,0.1); color: #ec4899; }
.resource-card .rc-title { font-weight: 600; font-size: 0.9rem; }
.resource-card .rc-url { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem; word-break: break-all; }
.videos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 1.25rem; }
.video-card {
  border-radius: 12px; overflow: hidden;
  background: var(--surface);
  border: 1px solid rgba(0,0,0,0.06);
  transition: all var(--transition);
}
.video-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(217,119,6,0.08); }
.video-card .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; }
.video-card .video-wrapper iframe {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  border: none;
}
.video-card .v-info { padding: 0.75rem 1rem; }
.video-card .v-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.2rem; }
.video-card .v-channel { font-size: 0.8rem; color: var(--text-secondary); }
.video-card .v-desc { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.3rem; line-height: 1.4; }
.nav-buttons {
  display: flex; justify-content: space-between; gap: 1rem;
  margin-top: 2rem; padding-top: 1.5rem;
  border-top: 1px solid rgba(0,0,0,0.06);
}
.nav-btn {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.7rem 1.5rem; border: none; border-radius: 10px;
  font-weight: 700; font-size: 0.85rem; font-family: inherit;
  cursor: pointer; transition: all var(--transition);
  letter-spacing: 0.02em;
}
.nav-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
.nav-btn.primary {
  background: linear-gradient(135deg, #d97706, #b45309);
  color: #fff;
}
.nav-btn.primary:hover:not(:disabled) {
  transform: translateY(-3px);
  box-shadow: 0 8px 25px rgba(217,119,6,0.35);
}
.nav-btn.secondary {
  background: rgba(0,0,0,0.04);
  color: var(--text);
  border: 1px solid rgba(0,0,0,0.08);
}
.nav-btn.secondary:hover:not(:disabled) {
  transform: translateY(-3px);
  background: rgba(0,0,0,0.04);
}
.nav-btn .arrow { font-size: 1.1rem; }
.loading-spinner {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 3rem; gap: 1rem;
  color: var(--text-muted);
}
.loading-spinner .spinner {
  width: 40px; height: 40px; border: 3px solid rgba(217,119,6,0.1);
  border-top-color: var(--primary);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error-state { text-align: center; padding: 3rem; color: var(--text-muted); }
.error-state .error-icon { font-size: 3rem; margin-bottom: 0.5rem; }
.error-state h3 { color: var(--text); margin-bottom: 0.5rem; }
.error-state p { font-size: 0.9rem; }
.error-state .server-hint {
  margin-top: 0.75rem; padding: 0.75rem 1rem;
  background: rgba(0,0,0,0.04); border-radius: 8px;
  font-family: 'Cascadia Code', 'Fira Code', monospace;
  font-size: 0.82rem; border: 1px solid rgba(0,0,0,0.08);
  display: inline-block;
}
.empty-state { text-align: center; padding: 3rem; color: var(--text-muted); }
.empty-state .empty-icon { font-size: 3rem; margin-bottom: 0.5rem; }
@media (max-width: 768px) {
  .sidebar {
    position: fixed; left: 0; top: 60px; bottom: 0;
    transform: translateX(-100%); width: 280px;
    background: rgba(248,250,252,0.98);
    backdrop-filter: blur(20px);
    z-index: 200;
  }
  .sidebar.open { transform: translateX(0); }
  .hamburger { display: block; }
  .content { padding: 1rem; }
  .resources-grid { grid-template-columns: 1fr; }
  .videos-grid { grid-template-columns: 1fr; }
  .tab-btn { padding: 0.5rem 0.9rem; font-size: 0.78rem; }
  .nav-buttons { flex-direction: column; }
  .nav-btn { justify-content: center; }
  .glass-card { padding: 1.25rem; }
  .sidebar-overlay { display: none; position: fixed; inset: 0; z-index: 199; background: rgba(0,0,0,0.5); }
  .sidebar-overlay.show { display: block; }
}
@media (max-width: 480px) {
  .content { padding: 0.75rem; }
  .app-header { padding: 0 0.75rem; }
  .app-header h1 { font-size: 1rem; }
  .progress-badge { font-size: 0.7rem; padding: 2px 8px; }
}
</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>
<div class="blob blob-4"></div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<header class="app-header glass">
  <button class="hamburger" id="hamburgerBtn" aria-label="Toggle modules menu">☰</button>
  <span class="js-badge">JS</span>
  <h1>JavaScript Mastery Course</h1>
  <span class="progress-badge" id="progressBadge">0 / 155</span>
</header>
<div class="app">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-label">Modules</div>
    <div id="moduleList"></div>
  </nav>
  <main class="content" id="content">
    <div class="tab-bar" id="tabBar">
      <button class="tab-btn active" data-tab="lesson">Lesson</button>
      <button class="tab-btn" data-tab="examples">Examples</button>
      <button class="tab-btn" data-tab="quiz">Quiz</button>
      <button class="tab-btn" data-tab="challenges">Challenges</button>
      <button class="tab-btn" data-tab="cheatsheet">Cheatsheet</button>
      <button class="tab-btn" data-tab="project">Project</button>
      <button class="tab-btn" data-tab="resources">Resources</button>
      <button class="tab-btn" data-tab="videos">Videos</button>
    </div>
    <div id="panel-lesson" class="content-panel lesson active"></div>
    <div id="panel-examples" class="content-panel examples-content"></div>
    <div id="panel-quiz" class="content-panel"></div>
    <div id="panel-challenges" class="content-panel"></div>
    <div id="panel-cheatsheet" class="content-panel lesson"></div>
    <div id="panel-project" class="content-panel lesson"></div>
    <div id="panel-resources" class="content-panel"></div>
    <div id="panel-videos" class="content-panel"></div>
    <div class="nav-buttons">
      <button class="nav-btn secondary" id="prevBtn"><span class="arrow">◀</span> Previous</button>
      <button class="nav-btn primary" id="nextBtn">Next <span class="arrow">▶</span></button>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
const COURSE_PATH = 'JavaScript Mastery Course/';
const modules = [
  {num:"01",title:"Introduction to JavaScript",folder:"01-Introduction-to-JavaScript",section:"JS Fundamentals"},
  {num:"02",title:"JS Setup & Environment",folder:"02-Setting-Up-Development-Environment",section:"JS Fundamentals"},
  {num:"03",title:"JavaScript Syntax",folder:"03-JavaScript-Variables-and-Constants",section:"JS Fundamentals"},
  {num:"04",title:"Variables",folder:"04-JavaScript-Data-Types",section:"JS Fundamentals"},

let currentIndex = 0;

function renderSidebar() {
  let currentSection = '';
  moduleList.innerHTML = modules.map((m, i) => {
    let sectionHtml = '';
    if (m.section !== currentSection) {
      currentSection = m.section;
      sectionHtml = `<div class="section-label">${m.section}</div>`;
    }
    return sectionHtml + `
      <a class="module-item" href="#" data-index="${i}" data-folder="${m.folder}">
        <span class="num">${m.num}</span>
        <span class="dot"></span>
        <span>${m.title}</span>
      </a>
    `;
  }).join('');
  updateSidebar();
}
function updateSidebar() {
  document.querySelectorAll('.module-item').forEach((el, i) => {
    el.classList.toggle('active', i === currentIndex);
    if (visited.has(i)) el.classList.add('visited');
    else el.classList.remove('visited');
  });
  const active = document.querySelector('.module-item.active');
  if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + currentTab).classList.add('active');
    if (currentTab !== 'lesson') loadTabContent(currentTab);
  });
});
function switchTab(tab) {
  const btn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
  if (btn) btn.click();
}
prevBtn.addEventListener('click', () => { if (currentIndex > 0) goToModule(currentIndex - 1); });
nextBtn.addEventListener('click', () => { if (currentIndex < modules.length - 1) goToModule(currentIndex + 1); });
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft' && currentIndex > 0) goToModule(currentIndex - 1);
  if (e.key === 'ArrowRight' && currentIndex < modules.length - 1) goToModule(currentIndex + 1);
});
moduleList.addEventListener('click', (e) => {
  const item = e.target.closest('.module-item');
  if (!item) return;
  e.preventDefault();
  const idx = parseInt(item.dataset.index);
  goToModule(idx);
  if (window.innerWidth <= 768) closeSidebar();
});
hamburgerBtn.addEventListener('click', () => {
  sidebar.classList.toggle('open');
  sidebarOverlay.classList.toggle('show');
});
sidebarOverlay.addEventListener('click', closeSidebar);
function closeSidebar() {
  sidebar.classList.remove('open');
  sidebarOverlay.classList.remove('show');
}
function updateProgress() {
  progressBadge.textContent = visited.size + ' / ' + modules.length;
}
async function fetchText(path) {
  const res = await fetch(path);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return await res.text();
}
async function fetchJSON(path) {
  const res = await fetch(path);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return await res.json();
}
async function goToModule(index) {
  if (index < 0 || index >= modules.length) return;
  currentIndex = index;
  visited.add(index);
  updateSidebar();
  updateProgress();
  prevBtn.disabled = index === 0;
  nextBtn.disabled = index === modules.length - 1;
  window.location.hash = 'module-' + modules[index].num;
  document.querySelectorAll('.content-panel').forEach(p => {
    p.classList.remove('active');
    if (p.id === 'panel-lesson') p.classList.add('active');
  });
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.tab-btn[data-tab="lesson"]').classList.add('active');
  currentTab = 'lesson';
  const panels = ['lesson','examples','quiz','challenges','cheatsheet','project','resources','videos'];
  panels.forEach(p => {
    document.getElementById('panel-' + p).innerHTML = '<div class="loading-spinner"><div class="spinner"></div><span>Loading...</span></div>';
  });
  try {
    const md = await fetchText(COURSE_PATH + modules[index].folder + '/lesson.md');
    const html = marked.parse(md);
    document.getElementById('panel-lesson').innerHTML = html;
    document.querySelectorAll('#panel-lesson pre code').forEach(block => {
      hljs.highlightElement(block);
    });
  } catch(e) {
    document.getElementById('panel-lesson').innerHTML = serverErrorHTML();
  }
}
function serverErrorHTML() {
  return '<div class="error-state"><div class="error-icon">🔒</div><h3>Content Not Accessible</h3><p>This viewer needs a local server to load module files.</p><div class="server-hint">npx serve .<br><span style="color:var(--text-muted)">or</span><br>python -m http.server 8000</div><p style="margin-top:0.75rem;font-size:0.85rem;">Then open <strong>http://localhost:8000</strong> in your browser.</p></div>';
}
async function loadTabContent(tab) {
  const panel = document.getElementById('panel-' + tab);
  const m = modules[currentIndex];
  const cacheKey = m.folder + '/' + tab;
  if (cache[cacheKey]) {
    panel.innerHTML = cache[cacheKey];
    if (tab === 'quiz') initQuiz();
    return;
  }
  panel.innerHTML = '<div class="loading-spinner"><div class="spinner"></div><span>Loading...</span></div>';
  try {
    let html = '';
    switch(tab) {
      case 'examples': {
        const text = await fetchText(COURSE_PATH + m.folder + '/examples.html');
        const parser = new DOMParser();
        const doc = parser.parseFromString(text, 'text/html');
        const bodyContent = doc.body.innerHTML;
        const styles = doc.querySelectorAll('style');
        let styleHtml = '';
        styles.forEach(s => styleHtml += s.outerHTML);
        const exampleContainers = doc.querySelectorAll('.example, .example-box, .example-card');
        if (exampleContainers.length > 0) {
          html = styleHtml + Array.from(exampleContainers).map(el => {
            const clone = el.cloneNode(true);
            const preBlocks = clone.querySelectorAll('pre');
            preBlocks.forEach(pre => {
              const code = pre.querySelector('code');
              if (code) { try { hljs.highlightElement(code); } catch(e) {} }
            });
            return '<div class="example-container glass-card">' + clone.innerHTML + '</div>';
          }).join('');
        } else {
          html = styleHtml + '<div class="glass-card">' + bodyContent + '</div>';
        }
        break;
      }
      case 'quiz': {
        const data = await fetchJSON(COURSE_PATH + m.folder + '/quiz.json');
        html = renderQuiz(data);
        break;
      }
      case 'challenges': {
        const data = await fetchJSON(COURSE_PATH + m.folder + '/challenges.json');
        html = renderChallenges(data);
        break;
      }
      case 'cheatsheet': {
        const md = await fetchText(COURSE_PATH + m.folder + '/cheatsheet.md');
        html = marked.parse(md);
        break;
      }
      case 'project': {
        const md = await fetchText(COURSE_PATH + m.folder + '/project.md');
        html = marked.parse(md);
        break;
      }
      case 'resources': {
        const data = await fetchJSON(COURSE_PATH + m.folder + '/resources.json');
        html = renderResources(data);
        break;
      }
      case 'videos': {
        const data = await fetchJSON(COURSE_PATH + m.folder + '/video.json');
        html = renderVideos(data);
        break;
      }
    }
    cache[cacheKey] = html;
    panel.innerHTML = html;
    if (tab === 'quiz') initQuiz();
    panel.querySelectorAll('pre code').forEach(block => {
      try { hljs.highlightElement(block); } catch(e) {}
    });
  } catch(e) {
    panel.innerHTML = '<div class="error-state"><div class="error-icon">⚠️</div><h3>Could not load ' + tab + '</h3><p>' + e.message + '</p></div>';
  }
}
function renderQuiz(data) {
  if (!data || data.length === 0) return '<div class="empty-state"><div class="empty-icon">📝</div><p>No quiz questions available for this module.</p></div>';
  quizAnswered = {};
  quizDataCache = data;
  let html = '<div class="quiz-header glass" style="padding:0.75rem 1rem;border-radius:10px;margin-bottom:1rem;"><span>📝 Module Quiz</span><span class="score" id="quizScore">0 / ' + data.length + '</span></div>';
  data.forEach((q, i) => {
    html += '<div class="quiz-question" data-q="' + i + '"><div class="q-text"><span class="q-num">Q' + (i+1) + '.</span> ' + q.question + '</div>';
    html += q.options.map((opt, oi) => {
      const letter = String.fromCharCode(97 + oi);
      return '<button class="quiz-option" data-q="' + i + '" data-opt="' + letter + '">' + letter + ') ' + opt + '</button>';
    }).join('');
    html += '<div class="quiz-explanation" data-q="' + i + '">' + (q.explanation || '') + '</div></div>';
  });
  return html;
}
function initQuiz() {
  document.querySelectorAll('.quiz-option').forEach(btn => {
    btn.addEventListener('click', () => handleQuizAnswer(btn));
  });
}
function handleQuizAnswer(btn) {
  const qIdx = btn.dataset.q;
  if (quizAnswered[qIdx]) return;
  quizAnswered[qIdx] = true;
  const questionDiv = btn.closest('.quiz-question');
  const allOptions = questionDiv.querySelectorAll('.quiz-option');
  const explanation = questionDiv.querySelector('.quiz-explanation');
  allOptions.forEach(opt => opt.disabled = true);
  const qData = getQuizData();
  if (!qData || !qData[qIdx]) return;
  const correct = qData[qIdx].answer;
  const selected = btn.dataset.opt;
  if (selected === correct) { btn.classList.add('correct'); }
  else {
    btn.classList.add('wrong');
    allOptions.forEach(opt => { if (opt.dataset.opt === correct) opt.classList.add('correct'); });
  }
  explanation.classList.add('show');
  updateQuizScore();
}
function getQuizData() {
  return quizDataCache;
}
function updateQuizScore() {
  const scoreEl = document.getElementById('quizScore');
  if (!scoreEl) return;
  const correct = document.querySelectorAll('.quiz-option.correct').length;
  const total = document.querySelectorAll('.quiz-question').length;
  scoreEl.textContent = correct + ' / ' + total;
}

  if (!data || data.length === 0) return '<div class="empty-state"><div class="empty-icon">🏆</div><p>No challenges available for this module.</p></div>';
  return data.map(c => {
    const level = c.difficulty || 'medium';
    return '<div class="challenge-card ' + level + '"><span class="challenge-tag">' + level + '</span><div class="c-title">' + (c.title || level + ' challenge') + '</div><div class="c-desc">' + (c.description || '') + '</div><pre><code>' + escapeHTML(c.starterCode || '') + '</code></pre><button class="solution-btn" data-level="' + level + '">Show Solution</button><div class="solution-content" data-level="' + level + '"><pre><code>' + escapeHTML(c.solution || '') + '</code></pre></div></div>';
  }).join('');
}
function renderResources(data) {
  if (!data || data.length === 0) return '<div class="empty-state"><div class="empty-icon">📚</div><p>No resources listed for this module.</p></div>';
  return '<div class="resources-grid">' + data.map(r => '<a class="resource-card" href="' + r.url + '" target="_blank" rel="noopener"><span class="rc-type ' + (r.type||'article') + '">' + (r.type||'article') + '</span><div class="rc-title">' + r.title + '</div><div class="rc-url">' + r.url + '</div></a>').join('') + '</div>';
}
function renderVideos(data) {
  const videos = Array.isArray(data) ? data : (data && data.videos);
  if (!videos || videos.length === 0) return '<div class="empty-state"><div class="empty-icon">🎬</div><p>No video tutorials for this module.</p></div>';
  return '<div class="videos-grid">' + videos.map(v => '<div class="video-card"><div class="video-wrapper"><iframe src="' + v.url + '" title="' + escapeHTML(v.title) + '" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen loading="lazy"></iframe></div><div class="v-info"><div class="v-title">' + v.title + '</div><div class="v-channel">' + (v.channel || '') + '</div>' + (v.description ? '<div class="v-desc">' + v.description + '</div>' : '') + '</div></div>').join('') + '</div>';
}
function escapeHTML(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
function handleHash() {
  const hash = window.location.hash;
  if (hash && hash.startsWith('#module-')) {
    const num = hash.replace('#module-', '');
    const idx = modules.findIndex(m => m.num === num);
    if (idx >= 0 && idx !== currentIndex) { goToModule(idx); return true; }
  }
  return false;
}
window.addEventListener('hashchange', handleHash);
document.addEventListener('click', (e) => {
  if (e.target.classList.contains('solution-btn')) {
    const level = e.target.dataset.level;
    const content = e.target.parentElement.querySelector('.solution-content');
    if (content) {
      content.classList.toggle('show');
      e.target.textContent = content.classList.contains('show') ? 'Hide Solution' : 'Show Solution';
      content.querySelectorAll('pre code').forEach(block => { try { hljs.highlightElement(block); } catch(err) {} });
    }
  }
});
renderSidebar();
if (!handleHash()) { goToModule(0); }
content.addEventListener('click', () => { if (window.innerWidth <= 768 && sidebar.classList.contains('open')) closeSidebar(); });
</script>
